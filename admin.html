<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI - Admin Inventory Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .ali-red { background-color: #e11d48; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 ali-red rounded-xl flex items-center justify-center text-white font-black italic">A</div>
            <div>
                <h1 class="text-xl font-black tracking-tight italic uppercase">Admin Panel</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Inventory & Stock Control</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="showAddModal()" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-rose-600 transition-all">+ Produk Baru</button>
            <button onclick="location.href='owner.html'" class="p-2 text-slate-400 hover:text-slate-900"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></button>
        </div>
    </header>

    <main class="flex-1 flex flex-col p-8 overflow-hidden">
        
        <div class="flex flex-wrap gap-4 mb-6">
            <div class="flex-1 min-w-[300px] relative">
                <input type="text" id="admin-search" placeholder="Cari nama barang atau barcode..." 
                    class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-rose-500 font-bold text-slate-700 shadow-sm">
                <svg class="w-5 h-5 absolute left-4 top-3.5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <select id="filter-status" onchange="fetchProducts()" class="bg-white border border-slate-200 px-6 py-3 rounded-2xl font-bold text-slate-500 outline-none">
                <option value="all">Semua Status</option>
                <option value="low">Stok Rendah</option>
                <option value="out">Stok Habis</option>
            </select>
        </div>

        <div class="flex-1 bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 sticky top-0 z-10">
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                            <th class="p-6">Produk</th>
                            <th>Kategori</th>
                            <th>Harga Modal</th>
                            <th>Harga Jual</th>
                            <th class="text-center">Stok</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body" class="divide-y divide-slate-100 font-bold text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="product-modal" class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 id="modal-title" class="text-2xl font-black mb-8 italic uppercase tracking-tighter">Edit Produk</h2>
            <form id="product-form" class="grid grid-cols-2 gap-6">
                <div class="col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Barcode</label>
                    <input type="text" name="Barcode" id="form-barcode" class="w-full bg-slate-50 p-3 rounded-xl border-none mt-1 outline-none focus:ring-2 focus:ring-rose-500">
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Nama Barang</label>
                    <input type="text" name="Nama_Barang" class="w-full bg-slate-50 p-3 rounded-xl border-none mt-1 outline-none focus:ring-2 focus:ring-rose-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Kategori</label>
                    <select name="Kategori" class="w-full bg-slate-50 p-3 rounded-xl border-none mt-1 outline-none focus:ring-2 focus:ring-rose-500">
                        <option value="Barang">Barang</option>
                        <option value="Pulsa">Pulsa</option>
                        <option value="Token">Token</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Satuan</label>
                    <input type="text" name="Satuan" placeholder="Pcs, Pack, dll" class="w-full bg-slate-50 p-3 rounded-xl border-none mt-1 outline-none focus:ring-2 focus:ring-rose-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Harga Beli (HPP)</label>
                    <input type="number" name="Harga_Beli" class="w-full bg-slate-50 p-3 rounded-xl border-none mt-1 outline-none focus:ring-2 focus:ring-rose-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Harga Jual</label>
                    <input type="number" name="Harga_Jual" class="w-full bg-slate-50 p-3 rounded-xl border-none mt-1 outline-none focus:ring-2 focus:ring-rose-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Stok Sekarang</label>
                    <input type="number" name="Stok_Sekarang" class="w-full bg-slate-50 p-3 rounded-xl border-none mt-1 outline-none focus:ring-2 focus:ring-rose-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Minimal Stok</label>
                    <input type="number" name="Stok_Minimal" class="w-full bg-slate-50 p-3 rounded-xl border-none mt-1 outline-none focus:ring-2 focus:ring-rose-500">
                </div>
                <div class="col-span-2 flex gap-4 mt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">Batal</button>
                    <button type="submit" class="flex-1 py-4 ali-red text-white rounded-2xl font-bold shadow-lg shadow-rose-500/20">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzPkjgNLIU_nqqi01210aukznvC7rXWXTLdsIOQKmQa2t4Qskzg80jfQlPfeWHKxn524Q/exec";
        let allProducts = [];

        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('ali_user'));
            if (!user || (user.role.toLowerCase() !== 'admin' && user.role.toLowerCase() !== 'owner')) {
                window.location.href = "index.html";
            }
            fetchProducts();
        };

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}?action=getProducts`);
                allProducts = await res.json();
                renderTable(allProducts);
            } catch (e) { alert("Gagal mengambil data produk"); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('product-table-body');
            const filter = document.getElementById('filter-status').value;
            
            let filtered = data;
            if (filter === 'low') filtered = data.filter(p => p.Stok_Sekarang <= p.Stok_Minimal && p.Stok_Sekarang > 0);
            if (filter === 'out') filtered = data.filter(p => p.Stok_Sekarang <= 0);

            tbody.innerHTML = filtered.map(p => `
                <tr class="hover:bg-slate-50/50 transition-all">
                    <td class="p-6">
                        <div class="text-slate-900">${p.Nama_Barang}</div>
                        <div class="text-[9px] text-slate-400 uppercase tracking-tighter">${p.Barcode}</div>
                    </td>
                    <td><span class="px-3 py-1 bg-slate-100 rounded-lg text-[10px] uppercase">${p.Kategori}</span></td>
                    <td class="text-slate-400">Rp ${p.Harga_Beli.toLocaleString()}</td>
                    <td class="ali-red-text">Rp ${p.Harga_Jual.toLocaleString()}</td>
                    <td class="text-center">
                        <div class="${p.Stok_Sekarang <= p.Stok_Minimal ? 'text-rose-500' : 'text-slate-900'}">${p.Stok_Sekarang}</div>
                        <div class="text-[8px] text-slate-300">Min: ${p.Stok_Minimal}</div>
                    </td>
                    <td class="text-center">
                        <button onclick='editProduct(${JSON.stringify(p)})' class="p-2 text-slate-400 hover:text-slate-900 transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('admin-search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.Nama_Barang.toLowerCase().includes(val) || p.Barcode.toString().includes(val));
            renderTable(filtered);
        };

        function showAddModal() {
            document.getElementById('modal-title').innerText = "Tambah Produk Baru";
            document.getElementById('form-barcode').disabled = false;
            document.getElementById('product-form').reset();
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function editProduct(p) {
            document.getElementById('modal-title').innerText = "Edit Produk";
            document.getElementById('product-modal').classList.remove('hidden');
            document.getElementById('form-barcode').disabled = true;
            
            const form = document.getElementById('product-form');
            for (let key in p) {
                if (form.elements[key]) form.elements[key].value = p[key];
            }
        }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const formData = new FormData(e.target);
            const product = Object.fromEntries(formData.entries());
            
            // Masukkan kembali barcode jika di-disable
            product.Barcode = document.getElementById('form-barcode').value;

            btn.innerText = "MENYIMPAN...";
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'updateProduct', product: product })
                });
                const result = await res.json();
                if(result.status === 'success') {
                    alert("Produk Berhasil Disimpan!");
                    closeModal();
                    fetchProducts();
                }
            } catch (err) { alert("Error menyimpan data"); }
            btn.innerText = "Simpan Perubahan";
            btn.disabled = false;
        };

        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }
    </script>
</body>
</html>
