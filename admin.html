<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI Admin - Stock Control</title>
    <script>
        // SATPAM: Memastikan hanya Admin yang bisa masuk
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session || session.role.toLowerCase().trim() !== 'admin') {
            window.location.href = "index.html"; 
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .table-container { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-slate-800">
                    ADMIN <span class="text-rose-500 underline decoration-4">STOCK</span>
                </h1>
                <p id="admin-info" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1 italic"></p>
            </div>
            <div class="flex gap-4">
                <button onclick="fetchAdminData()" class="px-6 py-3 bg-white border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all">Refresh Data</button>
                <button onclick="logout()" class="px-6 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-600 transition-all">Logout</button>
            </div>
        </header>

        <div class="bg-white rounded-[2.5rem] table-container border border-slate-100 overflow-hidden">
            
            <div class="p-8 border-b border-slate-50 bg-slate-50/50 flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                    <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest italic">Inventory Live Monitoring</span>
                </div>
                <div class="relative w-full md:w-80">
                    <input type="text" id="search" oninput="renderTable()" placeholder="Cari Nama Barang..." 
                           class="w-full p-4 pl-6 bg-white border-2 border-slate-100 rounded-2xl text-xs font-bold outline-none focus:border-rose-500 transition-all">
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50/80 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="p-8">Produk & Barcode</th>
                            <th>Kategori</th>
                            <th>HPP / Modal</th>
                            <th>Stok Saat Ini</th>
                            <th class="text-right p-8">Status</th>
                        </tr>
                    </thead>
                    <tbody id="product-body" class="divide-y divide-slate-50 font-bold text-slate-700 text-sm">
                        </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-8 text-center text-[9px] font-black text-slate-300 uppercase tracking-[0.5em]">
            ALI POS System &copy; 2026
        </footer>
    </div>

    <script>
        // PENTING: GANTI DENGAN URL /exec ANDA
        const API_URL = "https://script.google.com/macros/s/AKfycbzngfS166yOXl0-zRa7lHC2pijAvpfgPWQ5UAKl3D4J8B9DjCh4OoYclmGGw6mn-0NJYg/exec"; 
        let products = [];

        // Inisialisasi Nama Admin
        document.getElementById('admin-info').innerText = "Logged in as: " + session.nama;

        async function fetchAdminData() {
            const tbody = document.getElementById('product-body');
            tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400 italic">Memuat data inventory...</td></tr>';
            
            try {
                const res = await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ action: "getAdminData" })
                });
                const r = await res.json();
                
                if(r.status === "success") {
                    products = r.products;
                    renderTable();
                } else {
                    alert("Gagal mengambil data dari server.");
                }
            } catch (e) {
                console.error("Error Fetching:", e);
                alert("Koneksi gagal! Pastikan Apps Script sudah di-deploy.");
            }
        }

        function renderTable() {
            const search = document.getElementById('search').value.toLowerCase();
            const tbody = document.getElementById('product-body');
            
            // Filter data berdasarkan nama (Kolom ke-2 / Indeks 1)
            const filtered = products.filter(p => p[1].toLowerCase().includes(search));

            if(filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-rose-400 italic font-bold text-xs uppercase tracking-widest">Data barang tidak ditemukan</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(p => {
                // Menyesuaikan indeks dengan screenshot Spreadsheet Produk Anda:
                // p[0] = Barcode
                // p[1] = Nama Produk
                // p[2] = Kategori
                // p[3] = Harga Modal (D)
                // p[5] = Stok Minimal (F)
                // p[6] = Stok Sekarang (G)
                // p[7] = Satuan (H)
                
                const stokSekarang = Number(p[6]) || 0;
                const stokMinimal = Number(p[5]) || 0;
                const hargaModal = Number(p[3]) || 0;
                const isKritis = stokSekarang <= stokMinimal;

                return `
                <tr class="hover:bg-slate-50 transition-all group">
                    <td class="p-8">
                        <div class="text-slate-900 font-extrabold group-hover:text-rose-500 transition-colors">${p[1]}</div>
                        <div class="text-[9px] text-slate-300 font-black uppercase tracking-tighter">${p[0]}</div>
                    </td>
                    <td>
                        <span class="bg-slate-100 text-slate-400 px-3 py-1 rounded-lg text-[9px] uppercase font-black tracking-widest">
                            ${p[2]}
                        </span>
                    </td>
                    <td class="text-slate-400 text-xs tracking-tighter italic">
                        Rp ${hargaModal.toLocaleString()}
                    </td>
                    <td class="text-base ${isKritis ? 'text-rose-500 font-black' : 'text-slate-800'}">
                        ${stokSekarang} <span class="text-[10px] text-slate-300 font-normal uppercase">${p[7]}</span>
                    </td>
                    <td class="text-right p-8 italic">
                        ${isKritis 
                            ? '<span class="bg-rose-100 text-rose-500 px-4 py-2 rounded-full text-[9px] font-black uppercase animate-pulse border border-rose-200">Wajib Re-Stock</span>' 
                            : '<span class="bg-emerald-50 text-emerald-500 px-4 py-2 rounded-full text-[9px] font-black uppercase opacity-60">Stok Aman</span>'}
                    </td>
                </tr>
                `;
            }).join('');
        }

        function logout() {
            sessionStorage.removeItem('ali_session_v4');
            window.location.href = "index.html";
        }

        // Jalankan fetch saat halaman dimuat
        window.onload = fetchAdminData;
    </script>
</body>
</html>
