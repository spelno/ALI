<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }</style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm">
            <div>
                <h1 class="text-2xl font-black italic uppercase text-slate-800 tracking-tighter">Admin <span class="text-rose-500">Inventory</span></h1>
                <p id="admin-name" class="text-xs font-bold text-slate-400">Memuat profil...</p>
            </div>
            <button onclick="window.top.location.href='?page=index'" class="text-slate-400 font-bold hover:text-rose-500 transition-all text-sm">KELUAR</button>
        </header>

        <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="p-6">Produk</th>
                        <th>Kategori</th>
                        <th>Harga Jual</th>
                        <th class="text-center">Stok</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-50 font-bold text-slate-700">
                    <tr><td colspan="5" class="p-10 text-center text-slate-300">Mengambil data produk...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('ali_user'));
            if(!user) window.top.location.href = "?page=index";
            document.getElementById('admin-name').innerText = "Petugas: " + user.nama;
            loadData();
        };

        function loadData() {
            google.script.run.withSuccessHandler(data => {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td class="p-6"><div>${p.Nama_Barang}</div><div class="text-[9px] text-slate-300 uppercase">${p.Barcode}</div></td>
                        <td><span class="bg-slate-100 px-2 py-1 rounded text-[10px]">${p.Kategori}</span></td>
                        <td class="text-rose-500">Rp ${Number(p.Harga_Jual).toLocaleString()}</td>
                        <td class="text-center ${Number(p.Stok_Sekarang) <= Number(p.Stok_Minimal) ? 'text-rose-500' : ''}">${p.Stok_Sekarang}</td>
                        <td class="text-center"><button class="text-slate-300 hover:text-slate-900">Edit</button></td>
                    </tr>
                `).join('');
            }).getProducts();
        }
    </script>
</body>
</html>
