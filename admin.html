<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .tab-btn { padding: 12px 24px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: #94a3b8; border-bottom: 3px solid transparent; transition: 0.3s; cursor: pointer; }
        .tab-active { color: #e11d48; border-color: #e11d48; }
        .card { background: white; border-radius: 24px; border: 1px solid #f1f5f9; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-8">
                <div class="py-5 font-black text-rose-600 text-xl italic tracking-tighter">ADMIN PANEL</div>
                <div class="flex">
                    <div onclick="switchTab('dash')" id="btn-dash" class="tab-btn tab-active">Dashboard</div>
                    <div onclick="switchTab('prod')" id="btn-prod" class="tab-btn">Produk & Stok</div>
                    <div onclick="switchTab('hist')" id="btn-hist" class="tab-btn">Riwayat</div>
                    <div onclick="switchTab('sett')" id="btn-sett" class="tab-btn">Pengaturan</div>
                </div>
            </div>
            <button onclick="window.top.location.href='https://script.google.com/macros/s/AKfycbz7X8Kz4psfi-Govu5oR-HtpaHJPjBzPsC0GtFzPTLl_eKrI-0gUZFPQ1rYXX2fSM-xQA/exec'" class="text-xs font-bold uppercase text-slate-400 hover:text-rose-600">Keluar</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        
        <div id="tab-dash" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card border-l-4 border-l-emerald-500">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Omzet Hari Ini</p>
                    <h2 id="stat-omzet" class="text-3xl font-black text-slate-800 tracking-tighter">Rp 0</h2>
                </div>
                <div class="card border-l-4 border-l-blue-500">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Transaksi Hari Ini</p>
                    <h2 id="stat-trans" class="text-3xl font-black text-slate-800 tracking-tighter">0</h2>
                </div>
                <div class="card border-l-4 border-l-rose-500 bg-rose-50/20">
                    <p class="text-[10px] font-bold text-rose-400 uppercase tracking-widest mb-1">Stok Kritis</p>
                    <h2 id="stat-kritis" class="text-3xl font-black text-rose-600 tracking-tighter">0</h2>
                </div>
            </div>
        </div>

        <div id="tab-prod" class="hidden card overflow-hidden p-0">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <h3 class="font-bold uppercase italic text-slate-800">Manajemen Inventori</h3>
                <div class="relative">
                    <input type="text" id="search-prod" oninput="filterTable()" placeholder="Cari nama/barcode..." class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm outline-none focus:border-rose-400 w-64 shadow-sm">
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase border-b">
                        <tr>
                            <th class="p-5">Barcode</th>
                            <th class="p-5">Nama Barang</th>
                            <th class="p-5 text-center">Stok (Edit Langsung)</th>
                            <th class="p-5 text-right">Harga Jual</th>
                            <th class="p-5 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y text-sm font-semibold">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="tab-hist" class="hidden card overflow-hidden p-0">
            <div class="p-6 border-b font-bold uppercase italic text-slate-800 bg-slate-50/50 flex justify-between">
                <span>100 Transaksi Terakhir</span>
                <span class="text-[10px] text-slate-400 uppercase italic">Urutan Terbaru</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase border-b">
                        <tr><th class="p-5">Waktu</th><th class="p-5">Invoice</th><th class="p-5">Produk</th><th class="p-5 text-center">Qty</th><th class="p-5 text-right">Total</th></tr>
                    </thead>
                    <tbody id="history-body" class="divide-y">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="tab-sett" class="hidden max-w-2xl mx-auto space-y-6">
            <div class="card space-y-6">
                <div class="border-b pb-4 flex items-center justify-between">
                    <h3 class="font-bold uppercase italic text-slate-800">Pengaturan Toko</h3>
                    <span class="bg-rose-100 text-rose-600 text-[10px] px-2 py-1 rounded font-bold uppercase">Struk & Identitas</span>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Nama Toko</label>
                        <input type="text" id="set-name" class="w-full border border-slate-200 rounded-xl p-3 mt-1 outline-none focus:border-rose-400 font-bold bg-slate-50">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Alamat Lengkap</label>
                        <input type="text" id="set-addr" class="w-full border border-slate-200 rounded-xl p-3 mt-1 outline-none focus:border-rose-400 font-bold bg-slate-50">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Pesan Penutup (Footer)</label>
                        <input type="text" id="set-foot" class="w-full border border-slate-200 rounded-xl p-3 mt-1 outline-none focus:border-rose-400 font-bold bg-slate-50">
                    </div>
                </div>
                <button id="btn-save-settings" onclick="saveSettings()" class="w-full bg-rose-600 text-white font-black py-4 rounded-xl hover:bg-rose-700 transition shadow-lg shadow-rose-100 uppercase italic">Simpan Perubahan</button>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz7X8Kz4psfi-Govu5oR-HtpaHJPjBzPsC0GtFzPTLl_eKrI-0gUZFPQ1rYXX2fSM-xQA/exec"; 
        let allProducts = [];

        window.onload = () => { 
            loadStats(); 
            loadProducts(); 
            loadHistory(); 
            loadSettings(); 
        };

        function switchTab(t) {
            ['dash', 'prod', 'hist', 'sett'].forEach(id => {
                document.getElementById('tab-' + id).classList.add('hidden');
                document.getElementById('btn-' + id).classList.remove('tab-active');
            });
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('btn-' + t).classList.add('tab-active');
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}?action=getAdminStats`);
                const d = await res.json();
                document.getElementById('stat-omzet').innerText = `Rp ${d.omzet.toLocaleString()}`;
                document.getElementById('stat-trans').innerText = d.transaksi;
                document.getElementById('stat-kritis').innerText = d.stokKritis;
            } catch (e) { console.error("Gagal ambil stats"); }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}?action=getProducts`);
                allProducts = await res.json();
                renderProductTable(allProducts);
            } catch (e) { console.error("Gagal ambil produk"); }
        }

        function renderProductTable(data) {
            document.getElementById('table-body').innerHTML = data.map(p => {
                const isLow = p.Stok <= p.Stok_Minimal;
                return `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-5 font-mono text-xs text-slate-400">${p.Barcode}</td>
                    <td class="p-5 uppercase">${p.Nama_Barang}</td>
                    <td class="p-5 text-center">
                        <input type="number" onchange="updateItem('${p.Barcode}', 'stock', this.value)" value="${p.Stok}" class="w-20 text-center border rounded-lg p-1.5 ${isLow ? 'bg-rose-50 text-rose-600 font-bold border-rose-300' : 'border-slate-200'}">
                    </td>
                    <td class="p-5 text-right italic font-bold">
                        <input type="number" onchange="updateItem('${p.Barcode}', 'price', this.value)" value="${p.Harga_Jual}" class="w-28 text-right border border-slate-200 rounded-lg p-1.5">
                    </td>
                    <td class="p-5 text-center">
                        <span id="status-${p.Barcode}" class="text-[9px] font-bold uppercase text-slate-300 tracking-tighter italic">Tersimpan</span>
                    </td>
                </tr>`;
            }).join('');
        }

        async function updateItem(bc, type, val) {
            const statusEl = document.getElementById(`status-${bc}`);
            statusEl.innerText = "Saving...";
            statusEl.classList.remove('text-slate-300');
            statusEl.classList.add('text-rose-500');

            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "updateProduct", barcode: bc, type: type, value: val }) 
                });
                statusEl.innerText = "Tersimpan";
                statusEl.classList.replace('text-rose-500', 'text-emerald-500');
                setTimeout(() => statusEl.classList.replace('text-emerald-500', 'text-slate-300'), 2000);
                loadStats(); 
            } catch (e) { 
                statusEl.innerText = "Error!";
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(`${API_URL}?action=getHistory`);
                const data = await res.json();
                document.getElementById('history-body').innerHTML = data.map(r => `
                    <tr class="hover:bg-slate-50 italic">
                        <td class="p-5 text-slate-400 text-xs">${new Date(r[0]).toLocaleString('id-ID')}</td>
                        <td class="p-5 font-bold text-slate-600">${r[1]}</td>
                        <td class="p-5 uppercase">${r[3]}</td>
                        <td class="p-5 text-center font-black">x${r[4]}</td>
                        <td class="p-5 text-right font-bold text-rose-600">Rp ${r[6].toLocaleString()}</td>
                    </tr>`).join('');
            } catch (e) { console.error("Gagal ambil riwayat"); }
        }

        async function loadSettings() {
            try {
                const res = await fetch(`${API_URL}?action=getSettings`);
                const d = await res.json();
                document.getElementById('set-name').value = d.storeName;
                document.getElementById('set-addr').value = d.address;
                document.getElementById('set-foot').value = d.footer;
            } catch (e) { console.error("Gagal ambil pengaturan"); }
        }

        async function saveSettings() {
            const btn = document.getElementById('btn-save-settings');
            btn.disabled = true;
            btn.innerText = "MENYIMPAN...";
            
            const body = {
                action: "updateSettings",
                storeName: document.getElementById('set-name').value,
                address: document.getElementById('set-addr').value,
                footer: document.getElementById('set-foot').value
            };
            
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(body) });
                alert("Pengaturan Berhasil Diperbarui!");
            } catch (e) {
                alert("Gagal menyimpan!");
            } finally {
                btn.disabled = false;
                btn.innerText = "SIMPAN PERUBAHAN";
            }
        }

        function filterTable() {
            const val = document.getElementById('search-prod').value.toLowerCase();
            const filtered = allProducts.filter(p => p.Nama_Barang.toLowerCase().includes(val) || p.Barcode.toString().includes(val));
            renderProductTable(filtered);
        }
    </script>
</body>
</html>
