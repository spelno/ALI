<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI Admin - Stock</title>
    <script>
        // SATPAM ADMIN: Harus Login sebagai Admin
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session || session.role.toLowerCase().trim() !== 'admin') {
            window.location.href = "index.html"; 
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }</style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-slate-800 underline decoration-rose-500">ADMIN <span class="text-rose-500">STOCK</span></h1>
                <p id="admin-name" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1 italic"></p>
            </div>
            <button onclick="logout()" class="text-[10px] font-black text-slate-300 hover:text-rose-500 uppercase tracking-widest">Logout</button>
        </header>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest italic">Live Inventory Status</span>
                <input type="text" id="search" oninput="renderTable()" placeholder="Cari Nama Barang..." class="p-2 border rounded-xl text-xs font-bold outline-none focus:ring-2 focus:ring-rose-500/20 transition-all">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr><th class="p-6">Produk</th><th>Kategori</th><th>Stok</th><th class="text-right p-6">Status</th></tr>
                    </thead>
                    <tbody id="product-body" class="divide-y divide-slate-50 font-bold text-slate-700 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzngfS166yOXl0-zRa7lHC2pijAvpfgPWQ5UAKl3D4J8B9DjCh4OoYclmGGw6mn-0NJYg/exec"; // GANTI INI
        let products = [];

        async function fetchAdminData() {
            document.getElementById('admin-name').innerText = "Operator: " + session.nama;
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getAdminData" })});
                const r = await res.json();
                if(r.status === "success") {
                    products = r.products;
                    renderTable();
                }
            } catch (e) { console.log(e); }
        }

        function renderTable() {
            const search = document.getElementById('search').value.toLowerCase();
            const tbody = document.getElementById('product-body');
            const filtered = products.filter(p => p[1].toLowerCase().includes(search));

            tbody.innerHTML = filtered.map(p => {
                const isKritis = Number(p[6]) <= Number(p[5]);
                return `
                <tr class="hover:bg-slate-50/80 transition-all">
                    <td class="p-6"><div>${p[1]}</div><div class="text-[9px] text-slate-300 uppercase">${p[0]}</div></td>
                    <td><span class="bg-slate-100 px-2 py-1 rounded text-[9px] uppercase">${p[2]}</span></td>
                    <td class="${isKritis ? 'text-rose-500' : 'text-slate-700'}">${p[6]} ${p[7]}</td>
                    <td class="text-right p-6 italic">
                        ${isKritis ? '<span class="text-rose-500 animate-pulse text-[10px] font-black uppercase">Re-stock!</span>' : '<span class="text-emerald-500 text-[10px] font-black uppercase">Aman</span>'}
                    </td>
                </tr>
                `;
            }).join('');
        }

        function logout() {
            sessionStorage.removeItem('ali_session_v4');
            window.location.href = "index.html";
        }
        window.onload = fetchAdminData;
    </script>
</body>
</html>
