<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Admin Control</title>
    
    <script>
        // PERBAIKAN: Cek role tanpa peduli huruf besar atau kecil (case-insensitive)
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session || session.role.toLowerCase() !== "admin") { 
            window.location.replace("index.html"); 
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* Teks Nama Produk Utuh */
        .text-full { white-space: normal; word-break: break-word; overflow-wrap: break-word; }
    </style>
</head>
<body class="p-4">

    <div class="h-full grid grid-cols-12 gap-4">
        
        <main class="col-span-8 flex flex-col glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl">
            <header class="p-8 border-b border-white/50 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter text-slate-900 uppercase">ALI <span class="text-rose-600">ADMIN</span></h1>
                    <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mt-1">Sistem Kendali Utama</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="window.location.href='kasir.html'" class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-600 transition-all shadow-lg">Buka Kasir ➔</button>
                    <button onclick="logout()" class="p-2 text-slate-300 hover:text-rose-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto custom-scroll p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black italic text-xs uppercase tracking-[0.2em] text-slate-400">Database Produk</h3>
                    <input type="text" id="search" onkeyup="filterAdmin()" placeholder="Cari barang..." class="bg-white/50 border-none px-6 py-3 rounded-xl text-xs font-bold outline-none focus:ring-2 focus:ring-rose-500 w-64 shadow-sm">
                </div>
                
                <div id="admin-list" class="space-y-3">
                    </div>
            </div>
        </main>

        <aside class="col-span-4 flex flex-col glass-panel rounded-[2.5rem] overflow-hidden shadow-xl">
            <div class="p-6 bg-rose-600/5 border-b border-rose-100 flex justify-between items-center">
                <h3 class="font-black italic text-[10px] uppercase text-rose-600 tracking-widest">Stok Menipis (<span id="count-low">0</span>)</h3>
            </div>
            <div id="low-stock-list" class="flex-1 overflow-y-auto custom-scroll p-6 space-y-3">
                </div>
        </aside>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxrJ3CEUi6noMxD-7dDdPieSNHg_1pcvG-V37rpQsGzv8itNAOus2x_hICslTeHXJx3aA/exec"; 
        let allProducts = [];

        window.onload = function() { loadData(); };

        async function loadData() {
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getAdminData" }) });
                const r = await res.json();
                if(r.status === "success") {
                    allProducts = r.products;
                    renderAdmin(allProducts);
                }
            } catch(e) { console.error("Gagal Muat"); }
        }

        function renderAdmin(products) {
            const container = document.getElementById('admin-list');
            const lowContainer = document.getElementById('low-stock-list');
            
            // Render List Utama
            container.innerHTML = products.map(p => {
                const hrg = String(p[6]).replace(/[^0-9]/g, '');
                const stok = Number(p[7]);
                return `
                <div class="flex items-center justify-between p-5 bg-white/60 border border-white rounded-[1.5rem] shadow-sm">
                    <div class="flex-1 pr-4">
                        <p class="text-xs font-black text-slate-800 uppercase text-full leading-tight">${p[1]}</p>
                        <p class="text-[10px] font-bold text-slate-400 mt-2 uppercase">Rp ${Number(hrg).toLocaleString('id-ID')} | Stok: ${stok}</p>
                    </div>
                    <button class="w-10 h-10 bg-slate-100 rounded-xl text-slate-400 hover:bg-rose-500 hover:text-white transition-all font-black">+</button>
                </div>`;
            }).join('');

            // Render List Stok Menipis (Khusus < 5)
            const lowItems = products.filter(p => Number(p[7]) < 5);
            document.getElementById('count-low').innerText = lowItems.length;
            
            lowContainer.innerHTML = lowItems.length ? lowItems.map(p => `
                <div class="p-4 bg-white border border-rose-100 rounded-2xl flex justify-between items-center">
                    <p class="text-[10px] font-black text-slate-700 uppercase text-full leading-tight flex-1 pr-2">${p[1]}</p>
                    <span class="text-rose-600 font-black text-xs">${p[7]}</span>
                </div>
            `).join('') : `<p class="text-[10px] italic text-center text-slate-300 mt-10 uppercase font-black">Semua stok aman</p>`;
        }

        function filterAdmin() {
            const q = document.getElementById('search').value.toLowerCase();
            const f = allProducts.filter(p => p[1].toLowerCase().includes(q));
            renderAdmin(f);
        }

        function logout() {
            sessionStorage.removeItem('ali_session_v4');
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
