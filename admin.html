<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI - Admin Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .ali-red { background-color: #e11d48; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 ali-red rounded-xl flex items-center justify-center text-white font-black">A</div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-slate-800">Admin Inventory</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openModal()" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-rose-600 transition-all">+ Produk</button>
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-rose-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg></button>
        </div>
    </header>

    <main class="flex-1 p-8 overflow-hidden flex flex-col">
        <div class="flex gap-4 mb-6">
            <input type="text" id="admin-search" oninput="filterData()" placeholder="Cari Barcode atau Nama..." class="flex-1 p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-rose-500 font-bold">
            <select id="filter-stok" onchange="filterData()" class="p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500">
                <option value="all">Semua Stok</option>
                <option value="low">Stok Menipis</option>
                <option value="out">Stok Habis</option>
            </select>
        </div>

        <div class="flex-1 bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 sticky top-0 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="p-6">Produk</th>
                        <th>Kategori</th>
                        <th>Harga Beli</th>
                        <th>Harga Jual</th>
                        <th class="text-center">Stok</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="product-table" class="divide-y divide-slate-50 font-bold text-slate-700">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="product-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-white w-full max-w-lg p-10 rounded-[2.5rem] shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-black mb-8 italic uppercase">Detail Produk</h2>
            <form id="product-form" class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Barcode</label>
                    <input type="text" name="Barcode" id="f-barcode" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold">
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Nama Barang</label>
                    <input type="text" name="Nama_Barang" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Kategori</label>
                    <select name="Kategori" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold">
                        <option value="Barang">Barang</option>
                        <option value="Pulsa">Pulsa</option>
                        <option value="Token">Token</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Satuan</label>
                    <input type="text" name="Satuan" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Harga Beli</label>
                    <input type="number" name="Harga_Beli" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Harga Jual</label>
                    <input type="number" name="Harga_Jual" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Stok</label>
                    <input type="number" name="Stok_Sekarang" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Min. Stok</label>
                    <input type="number" name="Stok_Minimal" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold">
                </div>
                <div class="col-span-2 flex gap-3 mt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">Batal</button>
                    <button type="submit" class="flex-1 py-4 ali-red text-white rounded-2xl font-bold">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzPkjgNLIU_nqqi01210aukznvC7rXWXTLdsIOQKmQa2t4Qskzg80jfQlPfeWHKxn524Q/exec"; // GANTI INI
        let allProducts = [];

        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('ali_user'));
            if (!user || (user.role.toLowerCase() !== 'admin' && user.role.toLowerCase() !== 'owner')) window.location.href = "index.html";
            fetchData();
        };

        async function fetchData() {
            const res = await fetch(`${API_URL}?action=getProducts`);
            allProducts = await res.json();
            renderTable(allProducts);
        }

        function renderTable(data) {
            const tbody = document.getElementById('product-table');
            tbody.innerHTML = data.map(p => `
                <tr class="hover:bg-slate-50 border-b border-slate-50">
                    <td class="p-6">
                        <div class="text-slate-900">${p.Nama_Barang}</div>
                        <div class="text-[9px] text-slate-400">${p.Barcode}</div>
                    </td>
                    <td><span class="px-2 py-1 bg-slate-100 rounded-md text-[10px] uppercase">${p.Kategori}</span></td>
                    <td class="text-slate-400 text-sm">Rp ${Number(p.Harga_Beli).toLocaleString()}</td>
                    <td class="ali-red-text">Rp ${Number(p.Harga_Jual).toLocaleString()}</td>
                    <td class="text-center ${Number(p.Stok_Sekarang) <= Number(p.Stok_Minimal) ? 'text-rose-600 animate-pulse' : ''}">${p.Stok_Sekarang}</td>
                    <td class="text-center">
                        <button onclick='editProduct(${JSON.stringify(p)})' class="text-slate-300 hover:text-slate-900 transition-all font-bold">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            const s = document.getElementById('admin-search').value.toLowerCase();
            const f = document.getElementById('filter-stok').value;
            let filtered = allProducts.filter(p => p.Nama_Barang.toLowerCase().includes(s) || p.Barcode.toString().includes(s));
            if(f === 'low') filtered = filtered.filter(p => Number(p.Stok_Sekarang) <= Number(p.Stok_Minimal));
            if(f === 'out') filtered = filtered.filter(p => Number(p.Stok_Sekarang) <= 0);
            renderTable(filtered);
        }

        function openModal() {
            document.getElementById('modal-title').innerText = "Tambah Produk";
            document.getElementById('product-form').reset();
            document.getElementById('f-barcode').disabled = false;
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function editProduct(p) {
            document.getElementById('modal-title').innerText = "Edit Produk";
            document.getElementById('f-barcode').disabled = true;
            const form = document.getElementById('product-form');
            for (let key in p) { if(form.elements[key]) form.elements[key].value = p[key]; }
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const product = Object.fromEntries(formData.entries());
            product.Barcode = document.getElementById('f-barcode').value; // Ambil manual jika disabled

            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateProduct', product: product }) });
            alert("Berhasil!");
            closeModal();
            fetchData();
        };

        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
