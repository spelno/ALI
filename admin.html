<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .nav-active { background: #e11d48; color: white; box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        input:focus, select:focus { border-color: #e11d48 !important; outline: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-24 bg-white border-r flex flex-col items-center py-8 gap-8 z-50">
        <div class="w-12 h-12 ali-gradient rounded-2xl flex items-center justify-center text-white font-black italic shadow-lg">A</div>
        <nav class="flex flex-col gap-6">
            <button onclick="switchTab('inventory')" id="nav-inventory" class="p-4 rounded-2xl nav-active flex items-center justify-center transition-all">
                <span class="text-[10px] font-black uppercase italic tracking-widest">STOK</span>
            </button>
            <button onclick="switchTab('settings')" id="nav-settings" class="p-4 rounded-2xl text-slate-400 flex items-center justify-center transition-all hover:text-rose-500">
                <span class="text-[10px] font-black uppercase italic tracking-widest">SET</span>
            </button>
        </nav>
        <button onclick="logout()" class="mt-auto p-4 text-rose-500 font-black text-[10px] uppercase italic hover:scale-110 transition-all">Keluar</button>
    </aside>

    <main class="flex-1 flex flex-col p-10 overflow-hidden">
        
        <header class="flex justify-between items-center mb-10">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Admin Control Panel</p>
                <h2 class="text-3xl font-black text-slate-800 uppercase italic tracking-tighter">Halo, <span id="display-nama" class="text-rose-600">...</span></h2>
            </div>
        </header>

        <section id="tab-inventory" class="flex flex-col flex-1 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <input type="text" id="search-inventory" oninput="filterInventory()" placeholder="Cari nama barang..." 
                    class="w-80 p-4 bg-white border border-slate-200 rounded-2xl font-bold shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase italic">Menampilkan <span id="count-prod" class="text-rose-600">0</span> Produk</p>
            </div>
            
            <div class="bg-white rounded-[2.5rem] border shadow-sm flex-1 overflow-hidden flex flex-col">
                <div class="grid grid-cols-5 p-6 border-b text-[10px] font-black uppercase tracking-widest text-slate-400">
                    <div class="col-span-1">Barcode</div>
                    <div class="col-span-2">Nama Barang</div>
                    <div class="col-span-1 text-center">Stok</div>
                    <div class="col-span-1 text-right">Harga Jual</div>
                </div>
                <div id="inventory-list" class="flex-1 overflow-y-auto p-2 custom-scrollbar">
                    </div>
            </div>
        </section>

        <section id="tab-settings" class="hidden flex-1 overflow-y-auto pr-4 custom-scrollbar">
            <div class="max-w-2xl bg-white rounded-[3rem] border p-12 shadow-sm space-y-8">
                <h3 class="text-xl font-black uppercase italic tracking-widest text-slate-800 border-b pb-4">Konfigurasi Toko</h3>
                
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Nama Toko (B2)</label>
                        <input type="text" id="set-name" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Lebar Kertas (B5)</label>
                        <select id="set-paper" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold">
                            <option value="58mm">58mm (Kecil)</option>
                            <option value="80mm">80mm (Besar)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Alamat Toko (B3)</label>
                    <input type="text" id="set-address" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Footer Struk (B4)</label>
                    <textarea id="set-footer" rows="3" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold"></textarea>
                </div>

                <button onclick="simpanPengaturan()" id="btn-save-settings" 
                    class="ali-gradient text-white font-black py-5 px-10 rounded-2xl shadow-xl shadow-rose-200 uppercase italic tracking-widest active:scale-95 transition-all text-sm">
                    Simpan Perubahan
                </button>
            </div>
        </section>

    </main>

    <script>
        /** 1. SATPAM & SESSION **/
        const SCRIPT_URL = "<?= scriptUrl ?>";
        let sessionData = JSON.parse(localStorage.getItem('ali_user_session'));
        let inventoryData = [];

        window.onload = () => {
            if (!sessionData || sessionData.role !== 'admin') {
                alert("Area Terbatas!");
                logout();
                return;
            }
            document.getElementById('display-nama').innerText = sessionData.nama;
            loadSemuaData();
        };

        /** 2. AMBIL DATA DARI SERVER **/
        function loadSemuaData() {
            // Ambil Produk
            google.script.run.withSuccessHandler(res => {
                inventoryData = res;
                renderInventory(res);
            }).getGlobalData("products");

            // Ambil Pengaturan (B2-B5)
            google.script.run.withSuccessHandler(s => {
                document.getElementById('set-name').value = s.storeName;
                document.getElementById('set-address').value = s.address;
                document.getElementById('set-footer').value = s.footer;
                document.getElementById('set-paper').value = s.paperSize;
            }).getGlobalData("settings");
        }

        /** 3. LOGIKA INVENTORY **/
        function renderInventory(data) {
            const list = document.getElementById('inventory-list');
            document.getElementById('count-prod').innerText = data.length;
            list.innerHTML = data.map(p => `
                <div class="grid grid-cols-5 p-6 border-b border-slate-50 items-center hover:bg-slate-50 transition-colors rounded-2xl">
                    <div class="col-span-1 font-bold text-rose-500 text-xs">${p.Barcode}</div>
                    <div class="col-span-2 font-black uppercase italic text-sm">${p.Nama_Barang}</div>
                    <div class="col-span-1 text-center font-bold">
                        <span class="px-3 py-1 rounded-full ${p.Stok <= 5 ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-600'} text-[10px]">
                            ${p.Stok}
                        </span>
                    </div>
                    <div class="col-span-1 text-right font-black italic">Rp ${p.Harga_Jual.toLocaleString()}</div>
                </div>
            `).join('');
        }

        function filterInventory() {
            const val = document.getElementById('search-inventory').value.toLowerCase();
            const filtered = inventoryData.filter(p => p.Nama_Barang.toLowerCase().includes(val) || p.Barcode.toString().includes(val));
            renderInventory(filtered);
        }

        /** 4. LOGIKA SIMPAN PENGATURAN (API POST) **/
        async function simpanPengaturan() {
            const btn = document.getElementById('btn-save-settings');
            const data = {
                action: "updateSettings",
                storeName: document.getElementById('set-name').value,
                address: document.getElementById('set-address').value,
                footer: document.getElementById('set-footer').value,
                paperSize: document.getElementById('set-paper').value
            };

            btn.innerText = "MENYIMPAN...";
            btn.disabled = true;

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await res.json();
                if (result.status === "success") {
                    alert("Pengaturan B2-B5 Berhasil Diperbarui!");
                    location.reload();
                }
            } catch (e) {
                alert("Gagal terhubung ke server!");
                btn.innerText = "Simpan Perubahan";
                btn.disabled = false;
            }
        }

        /** 5. NAVIGATION HELPER **/
        function switchTab(tab) {
            document.getElementById('tab-inventory').classList.add('hidden');
            document.getElementById('tab-settings').classList.add('hidden');
            document.getElementById('nav-inventory').classList.replace('nav-active', 'text-slate-400');
            document.getElementById('nav-settings').classList.replace('nav-active', 'text-slate-400');
            
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('nav-' + tab).classList.replace('text-slate-400', 'nav-active');
        }

        function logout() { localStorage.removeItem('ali_user_session'); window.location.href = SCRIPT_URL; }
    </script>
</body>
</html>
