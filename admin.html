<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Admin Center</title>
    
    <script>
        // PROTEKSI LEBIH AMAN & STABIL
        const rawSession = sessionStorage.getItem('ali_session_v4');
        const session = rawSession ? JSON.parse(rawSession) : null;

        // Cek apakah session ada DAN role-nya adalah admin (tanpa peduli huruf besar/kecil)
        if (!session || !session.role || session.role.toLowerCase() !== "admin") { 
            console.log("Akses Ditolak: Role tidak sesuai atau session kosong.");
            window.location.replace("index.html"); 
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; height: 100vh; overflow: hidden; }
        .glass-dark { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 10px; }
        .text-full { white-space: normal; word-break: break-word; }
    </style>
</head>
<body class="p-4">

    <div class="h-full grid grid-cols-12 gap-4">
        
        <main class="col-span-8 flex flex-col glass-dark rounded-[2.5rem] overflow-hidden shadow-2xl">
            <header class="p-8 border-b border-white/5 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase">ALI <span class="text-rose-600">ADMIN</span></h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Status: <span class="text-rose-500 italic">Authorized Access</span></p>
                </div>
                <div class="flex gap-4">
                    <button onclick="window.location.href='kasir.html'" class="bg-rose-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-700 transition-all shadow-lg shadow-rose-900/20">Buka Kasir ➔</button>
                    <button onclick="logout()" class="p-2 text-slate-500 hover:text-rose-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto custom-scroll p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black italic text-xs uppercase tracking-[0.2em] text-slate-500">Database Master Produk</h3>
                    <input type="text" id="search" onkeyup="filterAdmin()" placeholder="Cari barang..." class="bg-slate-800 border-none px-6 py-3 rounded-xl text-xs font-bold text-white outline-none focus:ring-2 focus:ring-rose-600 w-64 shadow-inner">
                </div>
                
                <div id="admin-list" class="space-y-3">
                    </div>
            </div>
        </main>

        <aside class="col-span-4 flex flex-col glass-dark rounded-[2.5rem] overflow-hidden shadow-xl">
            <div class="p-6 bg-rose-600/5 border-b border-white/5 flex justify-between items-center">
                <h3 class="font-black italic text-[10px] uppercase text-rose-600 tracking-widest">Stok Menipis (<span id="count-low">0</span>)</h3>
            </div>
            <div id="low-stock-list" class="flex-1 overflow-y-auto custom-scroll p-6 space-y-3">
                </div>
        </aside>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxrJ3CEUi6noMxD-7dDdPieSNHg_1pcvG-V37rpQsGzv8itNAOus2x_hICslTeHXJx3aA/exec"; // Pastikan ini URL /exec yang benar
        let allProducts = [];

        window.onload = function() { loadData(); };

        async function loadData() {
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getAdminData" }) });
                const r = await res.json();
                if(r.status === "success") {
                    allProducts = r.products;
                    renderAdmin(allProducts);
                }
            } catch(e) { console.error("Gagal Muat Data dari Sheets"); }
        }

        function renderAdmin(products) {
            const container = document.getElementById('admin-list');
            const lowContainer = document.getElementById('low-stock-list');
            
            // Render Database Utama
            container.innerHTML = products.map(p => {
                const hrg = Number(p[4]); // Harga Jual di Kolom E (Indeks 4)
                const stok = Number(p[7]); // Stok Sekarang di Kolom H (Indeks 7)
                return `
                <div class="flex items-center justify-between p-5 bg-slate-800/40 border border-white/5 rounded-[1.5rem] hover:border-rose-600/30 transition-all">
                    <div class="flex-1 pr-4">
                        <p class="text-xs font-black text-white uppercase text-full leading-tight">${p[1]}</p>
                        <p class="text-[10px] font-bold text-slate-500 mt-2 uppercase tracking-tighter">Rp ${hrg.toLocaleString('id-ID')} | Stok: ${stok}</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="w-10 h-10 bg-slate-800 rounded-xl text-slate-500 hover:bg-rose-600 hover:text-white transition-all font-black">+</button>
                    </div>
                </div>`;
            }).join('');

            // Filter Radar Stok Rendah (di bawah 5)
            const lowItems = products.filter(p => Number(p[7]) < 5);
            document.getElementById('count-low').innerText = lowItems.length;
            
            lowContainer.innerHTML = lowItems.length ? lowItems.map(p => `
                <div class="p-4 bg-slate-800/60 border border-rose-900/30 rounded-2xl flex justify-between items-center">
                    <p class="text-[10px] font-black text-slate-300 uppercase text-full leading-tight flex-1 pr-2">${p[1]}</p>
                    <span class="text-rose-600 font-black text-xs">${p[7]}</span>
                </div>
            `).join('') : `<p class="text-[10px] italic text-center text-slate-600 mt-10 uppercase font-black">Persediaan Aman</p>`;
        }

        function filterAdmin() {
            const q = document.getElementById('search').value.toLowerCase();
            const f = allProducts.filter(p => p[1].toLowerCase().includes(q));
            renderAdmin(f);
        }

        function logout() {
            sessionStorage.clear();
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
