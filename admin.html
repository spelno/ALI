<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 100% !important; color: black; }
        }
    </style>
</head>
<body class="p-8 min-h-screen">

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-2xl font-black uppercase italic tracking-tighter">Admin <span class="text-rose-500">Panel</span></h1>
        <div class="flex gap-4">
            <button onclick="openReprint()" class="px-6 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase italic">Reprint Nota</button>
            <button onclick="location.reload()" class="px-6 py-3 bg-rose-600/20 text-rose-500 rounded-xl text-[10px] font-black uppercase italic">Logout</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="glass p-8 rounded-[2rem]">
            <p class="text-[10px] font-black text-slate-400 uppercase italic mb-2">Omzet Hari Ini</p>
            <h2 id="txt-sales" class="text-3xl font-black italic">Rp 0</h2>
        </div>
    </main>

    <div id="modal-reprint" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[200] flex items-center justify-center p-4">
        <div class="bg-white text-slate-900 w-full max-w-sm p-10 rounded-[3rem]">
            <h3 class="text-center font-black uppercase italic mb-6">Cetak Ulang Nota</h3>
            <input type="text" id="input-inv" placeholder="ID Invoice (INV-...)" class="w-full p-4 bg-slate-100 rounded-xl font-bold text-center outline-none mb-6">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="document.getElementById('modal-reprint').classList.add('hidden')" class="text-slate-400 font-bold uppercase text-[10px]">Batal</button>
                <button onclick="fetchPrint()" id="btn-search" class="ali-gradient py-4 text-white rounded-xl font-black uppercase italic text-[10px]">Cetak</button>
            </div>
        </div>
    </div>

    <div id="modal-receipt" onclick="this.classList.add('hidden')" class="hidden fixed inset-0 bg-black/90 z-[300] flex items-center justify-center p-6">
        <div id="receipt-print-area" class="bg-white p-8 font-mono text-[11px] text-slate-800 rounded shadow-2xl">
            <div class="text-center mb-4">
                <h2 class="font-bold text-lg uppercase" id="r-store-name">...</h2>
                <p id="r-address">...</p>
                <div class="border-b border-dashed my-4 border-slate-300"></div>
            </div>
            <div class="flex justify-between"><span>Inv:</span><span id="r-inv" class="font-bold"></span></div>
            <div id="r-items" class="space-y-2 my-4"></div>
            <div class="border-t border-dashed pt-4">
                <div class="flex justify-between font-bold"><span>TOTAL:</span><span id="r-total"></span></div>
            </div>
            <div class="text-center italic mt-6 border-t border-dashed pt-4 border-slate-300" id="r-footer">...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1EKtMiInb5-NqqoaOJzPzNcSRhLmgcfWqmQfIPQkamq1yWUym8aeBv2WvWQyz_NDnLw/exec";
        let storeSettings = {};

        window.onload = async () => {
            const res = await fetch(SCRIPT_URL + "?action=settings");
            storeSettings = await res.json();
            document.getElementById('receipt-print-area').style.width = (storeSettings.Lebar_Kertas || 58) + "mm";
            
            const stats = await fetch(SCRIPT_URL + "?action=ownerFullStats");
            const d = await stats.json();
            document.getElementById('txt-sales').innerText = "Rp " + d.sales.toLocaleString();
        };

        function openReprint() { document.getElementById('modal-reprint').classList.remove('hidden'); }

        async function fetchPrint() {
            const inv = document.getElementById('input-inv').value;
            const btn = document.getElementById('btn-search');
            btn.innerText = "Mencari...";
            
            const res = await fetch(SCRIPT_URL + "?action=getTransaction&inv=" + inv);
            const d = await res.json();
            
            if(d.status === "success") {
                document.getElementById('modal-reprint').classList.add('hidden');
                document.getElementById('modal-receipt').classList.remove('hidden');
                document.getElementById('r-store-name').innerText = storeSettings.Nama_Toko;
                document.getElementById('r-address').innerText = storeSettings.Alamat_Toko;
                document.getElementById('r-footer').innerText = storeSettings.Footer_Struk;
                document.getElementById('r-inv').innerText = d.invoice;
                document.getElementById('r-total').innerText = "Rp " + d.total.toLocaleString();
                document.getElementById('r-items').innerHTML = d.items.map(i => `<div class="flex justify-between"><span>${i.nama} x${i.qty}</span><span>${i.sub.toLocaleString()}</span></div>`).join('');
                setTimeout(() => { window.print(); }, 500);
            } else { alert("Not Found"); }
            btn.innerText = "Cetak";
        }
    </script>
</body>
</html>
