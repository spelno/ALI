<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }</style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm">
            <h1 class="text-2xl font-black italic uppercase text-slate-800">Inventory <span class="text-rose-500">System</span></h1>
            <button onclick="location.href='index.html'" class="text-xs font-bold text-slate-300 hover:text-rose-500 uppercase">Logout</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-l-8 border-emerald-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Produk</p>
                <h2 id="count-all" class="text-4xl font-black italic text-slate-800">0</h2>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-l-8 border-rose-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-rose-500">Stok Kritis</p>
                <h2 id="count-low" class="text-4xl font-black italic text-rose-500">0</h2>
            </div>
            <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-xl flex items-center justify-center">
                <button class="text-white font-black uppercase text-xs tracking-widest hover:scale-105 transition-all">+ Tambah Barang</button>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="p-6">Produk</th>
                        <th>Kategori</th>
                        <th>Harga Jual</th>
                        <th class="text-center">Stok</th>
                        <th class="text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-50 font-bold text-slate-700 text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwO5xgXJK55TMBH6G8MuMVwdNxni2jwGj8MvV5yR3LO-AYfWWEsvgsCMlQnWusg9f-UPg/exec"; 
        
        async function loadData() {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getProducts" })});
            const result = await res.json();
            if(result.status === "success") {
                const data = result.data;
                document.getElementById('count-all').innerText = data.length;
                const lowStock = data.filter(p => Number(p.Stok_Sekarang) <= Number(p.Stok_Minimal));
                document.getElementById('count-low').innerText = lowStock.length;

                document.getElementById('table-body').innerHTML = data.map(p => `
                    <tr>
                        <td class="p-6"><div>${p.Nama_Barang}</div><div class="text-[9px] text-slate-300 uppercase">${p.Barcode}</div></td>
                        <td><span class="bg-slate-100 px-2 py-1 rounded text-[10px]">${p.Kategori}</span></td>
                        <td class="text-rose-500 italic font-black">Rp ${Number(p.Harga_Jual).toLocaleString()}</td>
                        <td class="text-center">${p.Stok_Sekarang}</td>
                        <td class="text-center">
                            ${Number(p.Stok_Sekarang) <= Number(p.Stok_Minimal) ? '<span class="text-rose-500 text-[10px] uppercase font-black animate-pulse">Re-stock!</span>' : '<span class="text-emerald-500 text-[10px] uppercase font-black">Aman</span>'}
                        </td>
                    </tr>
                `).join('');
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
