<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI - Admin Inventory (Professional)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .ali-red { background-color: #e11d48; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center z-10 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 ali-red rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-rose-500/20">A</div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-slate-800">Inventory <span class="text-rose-500">System</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-display" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Memuat Sesi...</span>
            <button onclick="logout()" class="p-2 text-slate-300 hover:text-rose-600 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-1 p-8 overflow-hidden flex flex-col">
        <div class="flex gap-4 mb-6">
            <input type="text" id="search-input" oninput="renderTable()" placeholder="Cari barcode atau nama..." class="flex-1 p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-rose-500 font-bold shadow-sm">
            <button onclick="fetchData()" class="px-6 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all">REFRESH</button>
        </div>

        <div class="flex-1 bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 sticky top-0 border-b z-20">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="p-6">Produk</th>
                        <th>Kategori</th>
                        <th>Harga Jual</th>
                        <th class="text-center">Stok</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="product-table-body" class="divide-y divide-slate-50 font-bold text-slate-700">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // PENTING: Masukkan URL Deployment Apps Script Anda di sini
        const API_URL = "https://script.google.com/macros/s/AKfycbxF8kn_Rsj5TtJOcyKnis8iAXYOC5JOcvNfgu2f3-VZaaDfgMrQAitg280ZR5GJgJh65g/exec"; 
        let rawData = [];

        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('ali_user'));
            if (!user || user.role !== 'admin') {
                window.location.href = "index.html"; // Pastikan index.html ada di GitHub
                return;
            }
            document.getElementById('user-display').innerText = user.nama;
            fetchData();
        };

        // Fungsi Utama: Mengambil data dari API Apps Script
        async function fetchData() {
            const tbody = document.getElementById('product-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400 animate-pulse uppercase font-black tracking-widest">Menghubungkan ke Database...</td></tr>';

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getProducts" })
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    rawData = result.data;
                    renderTable();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-rose-500 font-bold">GAGAL MEMUAT DATA! Pastikan API Aktif.</td></tr>';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('product-table-body');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = rawData.filter(p => 
                p.Nama_Barang.toLowerCase().includes(search) || 
                p.Barcode.toString().includes(search)
            );

            tbody.innerHTML = filtered.map(p => `
                <tr class="hover:bg-slate-50 border-b border-slate-50 transition-colors">
                    <td class="p-6">
                        <div class="text-slate-900">${p.Nama_Barang}</div>
                        <div class="text-[9px] text-slate-300 uppercase tracking-tighter">${p.Barcode}</div>
                    </td>
                    <td><span class="px-2 py-1 bg-slate-100 rounded-md text-[10px] uppercase text-slate-500">${p.Kategori}</span></td>
                    <td class="text-rose-500 italic">Rp ${Number(p.Harga_Jual).toLocaleString()}</td>
                    <td class="text-center ${Number(p.Stok_Sekarang) <= Number(p.Stok_Minimal) ? 'text-rose-600 font-black underline' : ''}">${p.Stok_Sekarang}</td>
                    <td class="text-center">
                        <button onclick="alert('Fitur Edit segera hadir!')" class="text-slate-300 hover:text-slate-900 font-bold text-xs uppercase tracking-widest">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
