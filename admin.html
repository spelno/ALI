<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-5">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIv5TIc1e4yWI12pM_VN6bHHlsFHnKUyCEgFCyRMN3RfhQYvC-TkvrF6mkoQaOpjWuAg/exec";
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user || user.role !== "admin"){
  location="index.html";
}
</script>

<div class="flex justify-between mb-4">
  <h2 class="text-2xl font-bold">Approval Panel</h2>
  <button onclick="logout()" class="bg-gray-400 text-white px-3 py-1 rounded">Logout</button>
</div>

<div id="list"></div>

<script>
async function load(){
  let res = await fetch(API_URL+"?action=getPendingApproval");
  let data = await res.json();

  list.innerHTML = data.map(a=>`
    <div class="bg-white p-4 mb-3 rounded shadow">
      <b>${a.aksi}</b> - ${a.requestBy}
      <br>
      <button onclick="approve('${a.id}')"
        class="bg-green-500 text-white p-2 mt-2 rounded">
        Approve
      </button>
    </div>
  `).join("");
}

async function approve(id){
  await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"approveAction",
      approval_id:id,
      approved_by:user.nama
    })
  });

  load();
}

function logout(){
  sessionStorage.clear();
  location="index.html";
}

load();
setInterval(load,3000);
</script>

</body>
</html>
