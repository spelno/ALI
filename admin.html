<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Premium</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#333;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
.toast.show{opacity:1;}
</style>

</head>

<body class="bg-gray-100 p-6">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIv5TIc1e4yWI12pM_VN6bHHlsFHnKUyCEgFCyRMN3RfhQYvC-TkvrF6mkoQaOpjWuAg/exec";
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user || user.role !== "admin"){
  location="index.html";
}
</script>

<div id="toast" class="toast"></div>

<div class="flex justify-between mb-6">
  <h2 class="text-2xl font-bold">🔐 Approval Center</h2>
  <button onclick="logout()" class="bg-gray-400 text-white px-3 py-1 rounded">Logout</button>
</div>

<div id="list" class="grid grid-cols-2 gap-4"></div>

<script>
function toast(msg,color="#333"){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.background=color;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

async function load(){
  let res = await fetch(API_URL+"?action=getPendingApproval");
  let data = await res.json();

  list.innerHTML = data.map(a=>`
    <div class="bg-white p-4 rounded-xl shadow">
      <div class="font-bold text-lg">${a.aksi}</div>
      <div class="text-sm text-gray-500">${a.requestBy}</div>

      <button onclick="approve('${a.id}')"
        class="mt-3 bg-green-500 text-white px-3 py-1 rounded">
        ✔ Approve
      </button>
    </div>
  `).join("");
}

async function approve(id){
  await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"approveAction",
      approval_id:id,
      approved_by:user.nama
    })
  });

  toast("Disetujui","green");
  load();
}

function logout(){
  sessionStorage.clear();
  location="index.html";
}

load();
setInterval(load,3000);
</script>

</body>
</html>
