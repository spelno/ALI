<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ALI Owner - Business Intelligence</title>
    <script>
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session || session.role.toLowerCase().trim() !== 'owner') window.location.href = "index.html"; 
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-rose-500">ALI <span class="text-white">EXECUTIVE</span></h1>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em]">Net Profit Intelligence</p>
            </div>
            <div class="flex gap-4">
                <button onclick="openModal()" class="bg-emerald-500 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-500/20">Catat Biaya</button>
                <button onclick="logout()" class="p-4 glass rounded-2xl text-[10px] font-black uppercase hover:bg-rose-500 transition-all border-none">Exit</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-gradient-to-br from-rose-500 to-rose-900 p-10 rounded-[3rem] shadow-2xl">
                    <p class="text-white/50 text-[10px] font-black uppercase mb-2 tracking-widest">Laba Bersih Riil</p>
                    <h2 id="profit" class="text-4xl font-black italic tracking-tighter text-shadow">Rp 0</h2>
                    <p id="margin" class="mt-4 text-[10px] font-bold uppercase opacity-60 italic">0% Efisiensi</p>
                </div>
                <div class="glass p-8 rounded-[2.5rem]">
                    <h3 class="text-rose-500 text-[10px] font-black uppercase mb-6 italic tracking-widest">Top 5 Best Sellers</h3>
                    <div id="top-products" class="space-y-4 text-xs font-bold text-slate-300 italic">Memuat data...</div>
                </div>
            </div>
            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-[2rem]"><p class="text-slate-500 text-[9px] font-black uppercase mb-1">Gross Omzet</p><h4 id="omzet" class="text-xl font-black">Rp 0</h4></div>
                    <div class="glass p-8 rounded-[2rem]"><p class="text-slate-500 text-[9px] font-black uppercase mb-1">Total Biaya OPEX</p><h4 id="biaya" class="text-xl font-black text-rose-400">Rp 0</h4></div>
                </div>
                <div class="glass p-10 rounded-[3.5rem] flex flex-col md:flex-row items-center gap-10">
                    <div class="w-56 h-56"><canvas id="chartD"></canvas></div>
                    <div class="flex-1 space-y-4 w-full">
                        <div class="p-6 rounded-2xl bg-white/5"><p class="text-[9px] text-slate-500 uppercase tracking-widest">Items Sold</p><h5 id="items" class="text-2xl font-black italic">0</h5></div>
                        <div class="p-6 rounded-2xl bg-white/5"><p class="text-[9px] text-slate-500 uppercase tracking-widest">Last Cashier Active</p><h5 id="lc" class="text-xl font-black text-emerald-500">---</h5></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modalExpense" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center p-6 z-50">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md border-rose-500/30 shadow-2xl">
            <h3 class="text-xl font-black italic uppercase mb-6 text-rose-500">Catat <span class="text-white">Pengeluaran</span></h3>
            <div class="space-y-4">
                <input type="text" id="exDesc" placeholder="Deskripsi (Contoh: Token Listrik)" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 font-bold text-sm">
                <select id="exCat" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 font-black uppercase text-[10px] tracking-widest text-slate-400">
                    <option value="Operasional">Operasional</option>
                    <option value="Gaji">Gaji Karyawan</option>
                    <option value="Lain-lain">Lain-lain</option>
                </select>
                <input type="number" id="exAmount" placeholder="Jumlah (Rp)" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 font-bold text-sm">
                <div class="flex gap-4 mt-6">
                    <button onclick="closeModal()" class="flex-1 p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest opacity-40">Batal</button>
                    <button onclick="submitExpense()" id="btnEx" class="flex-1 bg-rose-500 text-white p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "Uhttps://script.google.com/macros/s/AKfycbxYoMNJZl1gXI-n6SqacT5hmob6VSa6a0J6GXiIzKb0pttHC41vmzOk-kH4C7dIi6M3mQ/exec";
        let chart;

        async function init() {
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getOwnerReport" })});
                const r = await res.json();
                if(r.status === "success") {
                    const d = r.data;
                    document.getElementById('profit').innerText = "Rp " + d.profit.toLocaleString();
                    document.getElementById('omzet').innerText = "Rp " + d.omzet.toLocaleString();
                    document.getElementById('biaya').innerText = "Rp " + d.biaya.toLocaleString();
                    document.getElementById('items').innerText = d.totalItems.toLocaleString();
                    document.getElementById('margin').innerText = d.margin + "% Efisiensi";
                    document.getElementById('lc').innerText = d.lastCashier;
                    document.getElementById('top-products').innerHTML = d.topProducts.map((p,i)=>`<div><span class="text-rose-500">#${i+1}</span> ${p.nama} (${p.qty} Pcs)</div>`).join('');
                    renderChart(d.omzet, d.profit);
                }
            } catch(e) {}
        }

        function renderChart(o,p) {
            const ctx = document.getElementById('chartD').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [p, o-p], backgroundColor: ['#f43f5e', 'rgba(255,255,255,0.05)'], borderWidth: 0 }] }, options: { cutout: '85%' }});
        }

        function openModal() { document.getElementById('modalExpense').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modalExpense').classList.add('hidden'); }

        async function submitExpense() {
            const desc = document.getElementById('exDesc').value, amount = document.getElementById('exAmount').value, cat = document.getElementById('exCat').value, btn = document.getElementById('btnEx');
            if(!desc || !amount) return alert("Isi lengkap!");
            btn.innerText = "SAVING..."; btn.disabled = true;
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "addExpense", desc, cat, amount, admin: session.nama })});
                const r = await res.json();
                if(r.status === "success") { alert("Berhasil!"); closeModal(); init(); }
            } catch(e) {}
            btn.innerText = "SIMPAN"; btn.disabled = false;
        }

        function logout() { sessionStorage.removeItem('ali_session_v4'); window.location.href = "index.html"; }
        window.onload = init;
    </script>
</body>
</html>
