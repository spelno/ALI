<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owner Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIv5TIc1e4yWI12pM_VN6bHHlsFHnKUyCEgFCyRMN3RfhQYvC-TkvrF6mkoQaOpjWuAg/exec;
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user || user.role !== "owner"){
  location="index.html";
}
</script>

<div class="flex justify-between mb-6">
  <h2 class="text-2xl font-bold">📊 Owner Dashboard</h2>
  <button onclick="logout()" class="bg-gray-400 text-white px-3 py-1 rounded">Logout</button>
</div>

<div class="grid grid-cols-3 gap-5 mb-6">
  <div class="bg-white p-5 rounded-xl shadow">
    <h3>Total Sales</h3>
    <p id="sales" class="text-2xl font-bold text-green-600"></p>
  </div>

  <div class="bg-white p-5 rounded-xl shadow">
    <h3>Transaksi</h3>
    <p id="trx" class="text-2xl font-bold text-blue-600"></p>
  </div>

  <div class="bg-white p-5 rounded-xl shadow">
    <h3>Rata-rata</h3>
    <p id="avg" class="text-2xl font-bold text-purple-600"></p>
  </div>
</div>

<div class="bg-white p-5 rounded-xl shadow">
  <h3 class="mb-3 font-bold">Insight</h3>
  <div id="insight"></div>
</div>

<script>
async function load(){
  let res = await fetch(API_URL+"?action=ownerFullStats");
  let d = await res.json();

  sales.innerText = d.sales;
  trx.innerText = d.transaksi;
  avg.innerText = Math.round(d.rata2);

  insight.innerHTML = `
    Hari ini ada ${d.transaksi} transaksi<br>
    Total penjualan Rp ${d.sales}
  `;
}

function logout(){
  sessionStorage.clear();
  location="index.html";
}

load();
setInterval(load,5000);
</script>

</body>
</html>
