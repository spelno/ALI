<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes of OD - Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-6 lg:p-12 min-h-screen">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <div>
            <p class="text-[10px] font-black text-rose-500 uppercase tracking-[0.4em] mb-1 italic">Notes of OD Intelligence</p>
            <h1 class="text-3xl font-black uppercase italic tracking-tighter">Business <span class="text-rose-500">Overview</span></h1>
        </div>
        <button onclick="logout()" class="text-[10px] font-bold text-slate-500 uppercase border border-slate-700 px-6 py-2 rounded-full hover:bg-rose-600 transition-all">Keluar</button>
    </header>

    <main class="max-w-6xl mx-auto space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-8 rounded-[3rem]">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Omzet Hari Ini</p>
                <h2 id="txt-sales" class="text-4xl font-black italic tracking-tighter">Rp 0</h2>
            </div>
            <div class="glass-card p-8 rounded-[3rem]">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Biaya Operasional</p>
                <h2 id="txt-expense" class="text-4xl font-black italic tracking-tighter text-rose-500">Rp 0</h2>
            </div>
            <div class="ali-gradient p-8 rounded-[3rem] shadow-2xl">
                <p class="text-[10px] font-black text-white/60 uppercase tracking-widest mb-4">Laba Bersih</p>
                <h2 id="txt-profit" class="text-4xl font-black italic tracking-tighter">Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card p-10 rounded-[3.5rem] h-[500px] flex flex-col">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-8 italic">History Pengeluaran</h3>
                <div id="expense-list" class="flex-1 overflow-y-auto pr-4 space-y-4 custom-scrollbar">
                    </div>
            </div>

            <div class="glass-card p-10 rounded-[3.5rem] h-[500px] flex flex-col">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-8 italic">Barang Harus Re-Stok</h3>
                <div id="low-stock-list" class="flex-1 overflow-y-auto pr-4 space-y-4 custom-scrollbar">
                    </div>
                <button onclick="loadOwnerData()" class="mt-8 w-full bg-white/5 py-4 rounded-2xl text-[10px] font-black uppercase border border-white/5 hover:bg-white/10 transition-all">Sinkron Ulang</button>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwiNW5vNecg58Ygss7QXbzNgPN7g1-Vv3y406lgQW07GytmpCwVSHqqvDuksY1QyEickA/exec";

        window.onload = () => {
            const session = JSON.parse(localStorage.getItem('ali_session'));
            if (!session || session.role !== 'owner') window.location.href = "index.html";
            loadOwnerData();
        };

        async function loadOwnerData() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=ownerFullStats");
                const d = await res.json();

                document.getElementById('txt-sales').innerText = "Rp " + d.sales.toLocaleString();
                document.getElementById('txt-expense').innerText = "Rp " + d.expense.toLocaleString();
                document.getElementById('txt-profit').innerText = "Rp " + d.profit.toLocaleString();

                const expDiv = document.getElementById('expense-list');
                expDiv.innerHTML = d.expenses.length === 0 ? `<p class="text-slate-600 text-center py-20 italic">Tidak ada pengeluaran</p>` :
                    d.expenses.map(e => `
                        <div class="p-5 bg-white/5 rounded-2xl border border-white/5 flex justify-between items-center">
                            <div><p class="text-[9px] font-black text-rose-500 uppercase mb-1">${e.kategori}</p><p class="font-bold text-sm uppercase italic text-slate-300">${e.info}</p></div>
                            <span class="font-black text-lg italic tracking-tighter">- ${e.jumlah.toLocaleString()}</span>
                        </div>
                    `).join('');

                const stockDiv = document.getElementById('low-stock-list');
                stockDiv.innerHTML = d.lowStock.length === 0 ? `<p class="text-slate-600 text-center py-20 italic">Semua stok aman</p>` :
                    d.lowStock.map(p => `
                        <div class="p-5 bg-rose-500/10 rounded-2xl border border-rose-500/20 flex justify-between items-center">
                            <span class="font-black uppercase italic text-xs text-rose-500">${p.nama}</span>
                            <span class="text-[10px] font-bold uppercase text-white">Sisa: ${p.stok}</span>
                        </div>
                    `).join('');
            } catch (err) { console.error(err); }
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
