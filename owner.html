<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI Owner - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        .neon-border { border-left: 4px solid #f43f5e; box-shadow: -10px 0 20px -10px rgba(244, 63, 94, 0.3); }
        #modal { transition: 0.3s; opacity: 0; pointer-events: none; transform: scale(0.95); }
        #modal.active { opacity: 1; pointer-events: auto; transform: scale(1); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-4">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter uppercase text-white">ALI <span class="text-rose-500 underline">OWNER</span></h1>
                <p id="clock" class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mt-2 italic"></p>
            </div>
            <div class="flex gap-4">
                <button onclick="fetchData()" class="p-4 glass rounded-2xl hover:bg-white/5 font-black text-[10px] uppercase tracking-widest">Refresh</button>
                <button onclick="location.href='index.html'" class="p-4 bg-rose-500 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-rose-500/20">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
            <div class="lg:col-span-5 space-y-6">
                <div class="glass p-10 rounded-[3rem] neon-border">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-3 tracking-widest">Estimasi Profit</p>
                    <h2 id="profit" class="text-5xl font-black text-rose-500 italic tracking-tighter">Rp 0</h2>
                    <div id="margin" class="text-emerald-500 text-[10px] font-bold mt-2 uppercase tracking-widest">Margin 0%</div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-8 rounded-[2.5rem]">
                        <p class="text-slate-500 text-[9px] font-black uppercase mb-2">Total Omzet</p>
                        <h3 id="omzet" class="text-xl font-bold italic tracking-tighter">Rp 0</h3>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem]">
                        <p class="text-slate-500 text-[9px] font-black uppercase mb-2">Item Terjual</p>
                        <h3 id="items" class="text-xl font-bold italic tracking-tighter text-emerald-500">0</h3>
                    </div>
                </div>
                <button onclick="toggleModal()" class="w-full py-6 glass rounded-3xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-white/5 transition-all">Lihat History Transaksi</button>
            </div>

            <div class="lg:col-span-7 glass rounded-[4rem] p-12 flex flex-col items-center justify-center min-h-[400px]">
                <h3 class="text-[10px] font-black uppercase text-slate-600 mb-10 tracking-[0.5em]">Profitability Ratio</h3>
                <div class="w-64 h-64"><canvas id="chart"></canvas></div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-xl">
        <div class="bg-slate-900 w-full max-w-xl h-[80vh] rounded-[3rem] border border-white/5 p-10 flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Recent <span class="text-rose-500">History</span></h2>
                <button onclick="toggleModal()" class="text-slate-500 hover:text-white font-bold">&times; CLOSE</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto pr-2 space-y-4">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyUfnbfn_A0D7Gnop7CBjGzmBwuPbt-5KurG1YoWbazcgWKExqLQB4z-agQPZrtUctFtw/exec"; // GANTI INI
        let chart;

        function updateClock() {
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'2-digit', month:'long', year:'numeric'}) + " | " + n.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        async function fetchData() {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getOwnerReport" })});
            const r = await res.json();
            if(r.status === "success") {
                const d = r.data;
                document.getElementById('profit').innerText = "Rp " + d.profit.toLocaleString();
                document.getElementById('omzet').innerText = "Rp " + d.omzet.toLocaleString();
                document.getElementById('items').innerText = d.totalItems.toLocaleString();
                document.getElementById('margin').innerText = "Margin Keuntungan " + d.margin + "%";
                
                renderHistory(d.history);
                renderChart(d.omzet, d.profit);
            }
        }

        function renderHistory(history) {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="p-6 bg-white/5 rounded-2xl flex justify-between items-center">
                    <div><p class="text-[9px] text-slate-500 font-black uppercase mb-1">${h.waktu}</p><p class="font-bold text-slate-200">${h.nama}</p></div>
                    <div class="text-lg font-black italic text-rose-500">Rp ${h.total.toLocaleString()}</div>
                </div>
            `).join('');
        }

        function renderChart(o, p) {
            const ctx = document.getElementById('chart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: [p, o-p], backgroundColor: ['#f43f5e', 'rgba(255,255,255,0.03)'], borderWidth: 0 }] },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        }

        function toggleModal() { document.getElementById('modal').classList.toggle('active'); }
        window.onload = () => { updateClock(); fetchData(); };
    </script>
</body>
</html>
