<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI Owner - Executive Intelligence</title>
    <script>
        // SATPAM: Proteksi akses Owner
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session || session.role.toLowerCase().trim() !== 'owner') {
            window.location.href = "index.html"; 
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: white;
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border: 1px solid rgba(244, 63, 94, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -20px rgba(244, 63, 94, 0.3);
        }
        .text-gradient {
            background: linear-gradient(to right, #fb7185, #e11d48);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .neon-dot {
            box-shadow: 0 0 15px #f43f5e;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <nav class="flex justify-between items-center mb-16">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-rose-500 rounded-2xl flex items-center justify-center font-black italic text-2xl shadow-lg shadow-rose-500/40 rotate-3">A</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase italic">ALI <span class="text-rose-500">OWNER</span></h1>
                    <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500 tracking-[0.3em] uppercase">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full neon-dot"></span> System Live
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="hidden md:block text-right">
                    <p id="owner-name" class="font-bold text-sm text-slate-200">Executive</p>
                    <p class="text-[9px] text-slate-500 font-black uppercase">Verified Access</p>
                </div>
                <button onclick="logout()" class="px-6 py-3 glass-card rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-500 transition-all">Exit</button>
            </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-8">
                <div class="glass-card p-10 rounded-[3.5rem] relative overflow-hidden group">
                    <div class="absolute -right-10 -top-10 w-40 h-40 bg-rose-500/10 rounded-full blur-3xl group-hover:bg-rose-500/20 transition-all"></div>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] mb-4">Total Net Profit</p>
                    <h2 id="profit" class="text-6xl font-extrabold italic tracking-tighter text-white mb-4 text-gradient">Rp 0</h2>
                    <div class="flex items-center gap-2 text-emerald-400 text-[10px] font-bold uppercase tracking-widest">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        <span id="margin-val">0% Margin</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="glass-card p-8 rounded-[2.5rem]">
                        <p class="text-slate-500 text-[9px] font-black uppercase tracking-widest mb-3">Gross Omzet</p>
                        <h3 id="omzet" class="text-2xl font-bold italic tracking-tighter">Rp 0</h3>
                    </div>
                    <div class="glass-card p-8 rounded-[2.5rem]">
                        <p class="text-slate-500 text-[9px] font-black uppercase tracking-widest mb-3">Qty Sold</p>
                        <h3 id="items" class="text-2xl font-bold italic tracking-tighter text-emerald-500">0</h3>
                    </div>
                </div>

                <button onclick="fetchData()" class="w-full py-6 glass-card rounded-3xl font-black text-[10px] uppercase tracking-[0.3em] hover:bg-white/5 active:scale-95 transition-all shadow-xl">
                    Sync Live Database
                </button>
            </div>

            <div class="lg:col-span-7 glass-card rounded-[4rem] p-12 flex flex-col items-center justify-center relative min-h-[500px]">
                <div class="absolute top-12 left-12">
                    <h3 class="text-xs font-black uppercase tracking-[0.5em] text-slate-500 italic">Profitability Ratio</h3>
                </div>
                
                <div class="relative w-72 h-72">
                    <canvas id="chart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Efficiency</span>
                        <span id="eff-val" class="text-3xl font-black italic">0%</span>
                    </div>
                </div>

                <div class="mt-12 flex gap-8">
                    <div class="flex items-center gap-3">
                        <span class="w-3 h-3 bg-rose-500 rounded-full shadow-[0_0_10px_#f43f5e]"></span>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Profit</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-3 h-3 bg-white/10 rounded-full"></span>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">HPP / Modal</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzngfS166yOXl0-zRa7lHC2pijAvpfgPWQ5UAKl3D4J8B9DjCh4OoYclmGGw6mn-0NJYg/exec"; // GANTI DENGAN URL /exec ANDA
        let chart;

        document.getElementById('owner-name').innerText = session.nama;

        async function fetchData() {
            try {
                const res = await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ action: "getOwnerReport" })
                });
                const r = await res.json();
                
                if(r.status === "success") {
                    const d = r.data;
                    document.getElementById('profit').innerText = "Rp " + d.profit.toLocaleString();
                    document.getElementById('omzet').innerText = "Rp " + d.omzet.toLocaleString();
                    document.getElementById('items').innerText = d.totalItems.toLocaleString();
                    document.getElementById('margin-val').innerText = d.margin + "% Profit Margin";
                    document.getElementById('eff-val').innerText = d.margin + "%";
                    
                    renderChart(d.omzet, d.profit);
                }
            } catch (e) {
                console.error(e);
                alert("Gagal Sinkronisasi Data.");
            }
        }

        function renderChart(o, p) {
            const ctx = document.getElementById('chart').getContext('2d');
            if(chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [p, o - p],
                        backgroundColor: ['#f43f5e', 'rgba(255, 255, 255, 0.05)'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    cutout: '88%',
                    plugins: { legend: { display: false } },
                    animation: { animateScale: true, duration: 2000 }
                }
            });
        }

        function logout() {
            sessionStorage.removeItem('ali_session_v4');
            window.location.href = "index.html";
        }

        window.onload = fetchData;
    </script>
</body>
</html>
