<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-3xl font-black italic tracking-tighter">ALI <span class="text-rose-500">EXECUTIVE</span></h1>
            <button onclick="window.top.location.href='?page=index'" class="bg-white/5 px-6 py-2 rounded-xl font-bold text-xs hover:bg-rose-500 transition-all">LOGOUT</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white/5 p-10 rounded-[3rem] border border-white/5">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Estimasi Laba Bersih</p>
                <h2 id="profit" class="text-5xl font-black text-rose-500 tracking-tighter italic">Rp 0</h2>
            </div>
            <div class="bg-white/5 p-10 rounded-[3rem] border border-white/5">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Total Omzet</p>
                <h2 id="omzet" class="text-4xl font-black tracking-tighter italic text-slate-200">Rp 0</h2>
            </div>
        </div>

        <div class="bg-white/5 p-10 rounded-[3rem] border border-white/5 flex flex-col items-center">
            <h3 class="text-xs font-black uppercase text-slate-500 mb-8 tracking-widest text-center">Komposisi Keuangan</h3>
            <div class="w-48 h-48"><canvas id="chart"></canvas></div>
            <button onclick="loadOwnerData()" class="mt-8 text-rose-500 font-black text-xs uppercase tracking-widest hover:text-white transition-all underline">Segarkan Data</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('ali_user'));
            if(!user || user.role.toLowerCase() !== 'owner') window.top.location.href = "?page=index";
            loadOwnerData();
        };

        function loadOwnerData() {
            google.script.run.withSuccessHandler(data => {
                document.getElementById('profit').innerText = "Rp " + data.profit.toLocaleString();
                document.getElementById('omzet').innerText = "Rp " + data.omzet.toLocaleString();
                renderChart(data.omzet, data.profit);
            }).getOwnerReport();
        }

        function renderChart(o, p) {
            new Chart(document.getElementById('chart'), {
                type: 'doughnut',
                data: {
                    datasets: [{ data: [p, o-p], backgroundColor: ['#f43f5e', 'rgba(255,255,255,0.05)'], borderWidth: 0 }]
                },
                options: { cutout: '85%' }
            });
        }
    </script>
</body>
</html>
