<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Owner Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-6 lg:p-12 min-h-screen overflow-x-hidden">

    <header class="max-w-6xl mx-auto flex justify-between items-end mb-12">
        <div>
            <p class="text-[10px] font-black text-rose-500 uppercase tracking-[0.4em] mb-2 italic">Executive Summary</p>
            <h1 class="text-4xl font-black uppercase italic tracking-tighter text-white">Dashboard <span class="text-rose-500">Utama</span></h1>
        </div>
        <button onclick="logout()" class="text-[10px] font-bold text-slate-500 uppercase border border-slate-700 px-6 py-2 rounded-full hover:bg-rose-600 hover:text-white transition-all">Keluar</button>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="glass-card p-8 rounded-[3rem] relative overflow-hidden group">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-emerald-500 blur-[80px] opacity-20 group-hover:opacity-40 transition-all"></div>
            <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-4">Omzet Hari Ini</p>
            <h2 id="txt-sales" class="text-4xl font-black italic tracking-tighter">Rp 0</h2>
        </div>

        <div class="glass-card p-8 rounded-[3rem] relative overflow-hidden group">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-rose-500 blur-[80px] opacity-20 group-hover:opacity-40 transition-all"></div>
            <p class="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-4">Pengeluaran Hari Ini</p>
            <h2 id="txt-expense" class="text-4xl font-black italic tracking-tighter text-rose-500">Rp 0</h2>
        </div>

        <div class="ali-gradient p-8 rounded-[3rem] shadow-2xl shadow-rose-900/20 relative overflow-hidden">
            <p class="text-[10px] font-black text-white/60 uppercase tracking-widest mb-4">Profit Bersih (Net)</p>
            <h2 id="txt-profit" class="text-4xl font-black italic tracking-tighter">Rp 0</h2>
        </div>

        <div class="lg:col-span-2 glass-card p-10 rounded-[3.5rem] flex flex-col h-[400px]">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 flex justify-between">
                <span>Rincian Pengeluaran</span>
                <span class="text-rose-500 italic">Live Update</span>
            </h3>
            <div id="expense-list" class="flex-1 overflow-y-auto pr-4 space-y-4 custom-scrollbar">
                </div>
        </div>

        <div class="glass-card p-10 rounded-[3.5rem] flex flex-col h-[400px]">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Peringatan Stok</h3>
            <div id="low-stock-list" class="flex-1 overflow-y-auto pr-4 space-y-4 custom-scrollbar text-center">
                </div>
            <button onclick="location.reload()" class="mt-6 w-full bg-white/5 hover:bg-white/10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Refresh Laporan</button>
        </div>

    </main>

    <footer class="mt-16 text-center">
        <p class="text-[9px] font-bold text-slate-600 uppercase tracking-[0.5em] italic">ALI POS Intelligence &bull; Business Management System &bull; 2026</p>
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRdufqkLXutBxdcinua_EgZ99q7CmLIhCCBOez8U3peAIQkAKNk1DPwWHWFxNhulEYaA/exec";
        let session = JSON.parse(localStorage.getItem('ali_session'));

        window.onload = () => {
            if (!session || session.role !== 'owner') window.location.href = "index.html";
            loadOwnerData();
        };

        async function loadOwnerData() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=ownerFullStats");
                const d = await res.json();

                // 1. Update Nominal
                document.getElementById('txt-sales').innerText = "Rp " + d.sales.toLocaleString();
                document.getElementById('txt-expense').innerText = "Rp " + d.expense.toLocaleString();
                document.getElementById('txt-profit').innerText = "Rp " + d.profit.toLocaleString();

                // 2. Render Pengeluaran
                const expDiv = document.getElementById('expense-list');
                if(d.expenses.length === 0) {
                    expDiv.innerHTML = `<p class="text-center py-20 text-slate-600 italic text-xs uppercase font-bold border border-dashed border-slate-800 rounded-3xl">Belum ada pengeluaran hari ini</p>`;
                } else {
                    expDiv.innerHTML = d.expenses.map(e => `
                        <div class="flex justify-between items-center p-5 bg-white/5 rounded-2xl border border-white/5 hover:border-rose-500/30 transition-all">
                            <div>
                                <p class="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-1">${e.kategori}</p>
                                <p class="font-bold text-slate-300 text-sm italic uppercase">${e.info}</p>
                            </div>
                            <span class="font-black text-lg italic tracking-tighter">- Rp ${e.jumlah.toLocaleString()}</span>
                        </div>
                    `).join('');
                }

                // 3. Render Stok Rendah
                const stockDiv = document.getElementById('low-stock-list');
                if(d.lowStock.length === 0) {
                    stockDiv.innerHTML = `<p class="text-slate-600 italic py-10">Semua stok aman</p>`;
                } else {
                    stockDiv.innerHTML = d.lowStock.map(p => `
                        <div class="p-4 bg-rose-500/10 rounded-2xl border border-rose-500/20 mb-2">
                            <p class="font-black uppercase italic text-[11px] text-rose-500">${p.nama}</p>
                            <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase">Sisa: ${p.stok} PCS</p>
                        </div>
                    `).join('');
                }

            } catch (err) {
                console.error(err);
                alert("Gagal memuat data owner!");
            }
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
