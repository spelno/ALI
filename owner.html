<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owner</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIv5TIc1e4yWI12pM_VN6bHHlsFHnKUyCEgFCyRMN3RfhQYvC-TkvrF6mkoQaOpjWuAg/exec";
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user || user.role !== "owner"){
  location="index.html";
}
</script>

<div class="flex justify-between mb-5">
  <h2 class="text-2xl font-bold">Dashboard Owner</h2>
  <button onclick="logout()" class="bg-gray-400 text-white px-3 py-1 rounded">Logout</button>
</div>

<div class="grid grid-cols-3 gap-4">
  <div class="bg-white p-5 rounded shadow">
    <h3>Total Sales</h3>
    <p id="sales" class="text-xl font-bold"></p>
  </div>

  <div class="bg-white p-5 rounded shadow">
    <h3>Transaksi</h3>
    <p id="trx" class="text-xl font-bold"></p>
  </div>

  <div class="bg-white p-5 rounded shadow">
    <h3>Rata-rata</h3>
    <p id="avg" class="text-xl font-bold"></p>
  </div>
</div>

<script>
async function load(){
  let res = await fetch(API_URL+"?action=ownerFullStats");
  let d = await res.json();

  sales.innerText = d.sales;
  trx.innerText = d.transaksi;
  avg.innerText = Math.round(d.rata2);
}

function logout(){
  sessionStorage.clear();
  location="index.html";
}

load();
setInterval(load,5000);
</script>

</body>
</html>
