<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ALI - Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfbf7; }
        .owner-header { border-bottom: 2px solid #d4af37; padding-bottom: 20px; margin-bottom: 30px; }
        .ali-card { background: white; border-radius: 2rem; border: 1px solid rgba(212,175,55,0.2); }
    </style>
</head>
<body class="p-8">
    <header class="owner-header flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-black text-slate-800 italic uppercase tracking-tighter">Welcome Back, <span id="nama-owner" style="color:#b8860b">Chief</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Executive Overview | Notes of OD System</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Estimasi Profit Hari Ini</p>
            <h2 class="text-3xl font-black text-emerald-600 italic">Rp 4.500.000</h2>
        </div>
    </header>

    <div class="grid grid-cols-3 gap-8">
        <div class="ali-card p-10 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Valuasi Stok Barang</p>
            <h3 class="text-2xl font-black italic">Rp 128.450.000</h3>
        </div>
    </div>
    <script>
        window.onload = () => {
            const nama = sessionStorage.getItem('ali_user_name');
            if(nama) document.getElementById('nama-owner').innerText = nama;
        };
    </script>
</body>
</html>
