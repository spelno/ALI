<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI - Owner Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .owner-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="owner-gradient text-white p-8 pb-32 rounded-b-[3rem] shadow-2xl">
        <div class="max-w-5xl mx-auto flex justify-between items-start">
            <div>
                <p class="text-rose-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1">Executive Summary</p>
                <h1 class="text-3xl font-black italic tracking-tighter">ALI RETAIL <span class="font-light">GROUP</span></h1>
            </div>
            <button onclick="logout()" class="bg-white/10 p-3 rounded-2xl hover:bg-white/20 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 -mt-20">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Total Omzet</p>
                <h2 id="owner-omzet" class="text-3xl font-black text-slate-800 tracking-tighter">Rp 0</h2>
                <div class="mt-4 flex items-center text-xs font-bold text-emerald-500">
                    <span id="trx-count">0</span> Transaksi Berhasil
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border-t-4 border-rose-500">
                <div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center mb-6">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Estimasi Laba Bersih</p>
                <h2 id="owner-profit" class="text-3xl font-black text-rose-600 tracking-tighter">Rp 0</h2>
                <div class="mt-4 flex items-center text-xs font-bold text-slate-400">
                    Berdasarkan HPP Produk
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50">
                <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mb-6">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Produk Keluar</p>
                <h2 id="owner-items" class="text-3xl font-black text-slate-800 tracking-tighter">0</h2>
                <div class="mt-4 flex items-center text-xs font-bold text-amber-600">
                    Item Fisik & Digital
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-10 rounded-[3rem] shadow-sm">
                <h3 class="text-lg font-black mb-8 uppercase tracking-tight italic">Komposisi Keuangan</h3>
                <canvas id="profitChart" height="250"></canvas>
            </div>

            <div class="glass-card p-10 rounded-[3rem] shadow-sm flex flex-col justify-center items-center text-center">
                <h3 class="text-lg font-black mb-4 uppercase tracking-tight italic">Quick Actions</h3>
                <div class="grid grid-cols-2 gap-4 w-full">
                    <button onclick="location.href='admin.html'" class="p-6 bg-slate-100 rounded-[2rem] font-bold text-slate-600 hover:bg-slate-800 hover:text-white transition-all">
                        Kelola Stok
                    </button>
                    <button onclick="location.href='kasir.html'" class="p-6 bg-rose-50 rounded-[2rem] font-bold text-rose-600 hover:bg-rose-500 hover:text-white transition-all">
                        Mode Kasir
                    </button>
                    <button onclick="fetchOwnerData()" class="col-span-2 p-6 border-2 border-slate-100 rounded-[2rem] font-bold text-slate-400 hover:border-rose-500 hover:text-rose-500 transition-all">
                        Refresh Data
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-lg glass-card py-4 px-8 rounded-full shadow-2xl flex justify-between items-center border border-white">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sistem Online</span>
        </div>
        <span id="last-update" class="text-[9px] font-bold text-slate-300">Update: -</span>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw90m874qVkVJEaiGWf6Z6EqfA33y663LEpFwkH36vv0Ab8tZLrYmgvQUtaGXgvFvX7Xw/exec";
        let profitChart;

        // Cek login saat masuk
        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('ali_user'));
            if (!user || user.role.toLowerCase() !== 'owner') {
                window.location.href = "index.html";
            }
            fetchOwnerData();
        };

        async function fetchOwnerData() {
            const btn = document.querySelector('button[onclick="fetchOwnerData()"]');
            btn.innerText = "LOADING...";
            
            try {
                const res = await fetch(`${API_URL}?action=getOwnerReport`);
                const data = await res.json();

                // Update Angka
                document.getElementById('owner-omzet').innerText = "Rp " + data.omzet.toLocaleString();
                document.getElementById('owner-profit').innerText = "Rp " + data.profit.toLocaleString();
                document.getElementById('owner-items').innerText = data.totalItemTerjual.toLocaleString();
                document.getElementById('trx-count').innerText = data.transaksiCount;
                document.getElementById('last-update').innerText = "Terakhir Update: " + new Date().toLocaleTimeString();

                updateChart(data.omzet, data.profit);
            } catch (e) {
                alert("Gagal memuat data laporan!");
            } finally {
                btn.innerText = "Refresh Data";
            }
        }

        function updateChart(omzet, profit) {
            const modal = omzet - profit; // Bagian dari omzet yang merupakan modal
            const ctx = document.getElementById('profitChart').getContext('2d');
            
            if (profitChart) profitChart.destroy();

            profitChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Laba Bersih', 'Modal Barang'],
                    datasets: [{
                        data: [profit, modal],
                        backgroundColor: ['#e11d48', '#e2e8f0'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { weight: 'bold' } } }
                    },
                    cutout: '70%'
                }
            });
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
