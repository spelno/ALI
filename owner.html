<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALI OWNER - Mobile Command</title>
    <script>
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session || session.role.toLowerCase().trim() !== 'owner') {
            window.location.href = "index.html"; 
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; color: #0f172a; 
            -webkit-tap-highlight-color: transparent;
        }
        .card { 
            background: white; border: 1px solid #e2e8f0;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05);
            border-radius: 1.5rem;
        }
        .accent-card {
            background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);
            color: white; border-radius: 1.5rem;
        }
        /* Responsif Chart Height */
        .chart-container { position: relative; height: 180px; width: 100%; }
        @media (max-width: 640px) {
            .card { border-radius: 1.25rem; padding: 1.5rem !important; }
            h2 { font-size: 2.25rem !important; }
        }
    </style>
</head>
<body class="p-4 md:p-10 pb-20">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-6 md:mb-10">
            <div>
                <h1 class="text-2xl md:text-3xl font-black italic tracking-tighter uppercase text-slate-900">ALI <span class="text-rose-500">OWNER</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Mobile Intelligence</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openModal()" class="w-10 h-10 md:w-auto md:px-6 md:py-3 bg-slate-900 text-white rounded-xl flex items-center justify-center hover:bg-rose-600 transition-all">
                    <span class="hidden md:inline text-[10px] font-black uppercase tracking-widest">+ Biaya</span>
                    <svg class="w-5 h-5 md:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                </button>
                <button onclick="logout()" class="p-2.5 bg-white border border-slate-200 rounded-xl">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 md:gap-6 mb-6">
            <div class="md:col-span-5 accent-card p-6 md:p-10 shadow-xl shadow-rose-200 flex flex-col justify-between">
                <div>
                    <p class="text-rose-100 text-[9px] font-black uppercase tracking-widest mb-1 opacity-80">Laba Bersih (Real-time)</p>
                    <h2 id="profit" class="text-4xl md:text-5xl font-black italic tracking-tighter">Rp 0</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-white/20">
                    <div>
                        <p class="text-[8px] font-bold text-rose-200 uppercase mb-0.5">Omzet</p>
                        <p id="omzet" class="text-sm md:text-base font-extrabold text-white leading-tight">Rp 0</p>
                    </div>
                    <div>
                        <p class="text-[8px] font-bold text-rose-200 uppercase mb-0.5">OPEX</p>
                        <p id="biaya" class="text-sm md:text-base font-extrabold text-white leading-tight">Rp 0</p>
                    </div>
                </div>
            </div>

            <div class="md:col-span-7 card p-6 md:p-10 flex flex-col justify-between">
                <div class="flex justify-between items-start mb-6">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 italic">Analisis Produk</h3>
                    <div class="bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-100 text-right">
                        <p class="text-[7px] font-bold text-emerald-600 uppercase tracking-widest">Margin</p>
                        <p id="margin" class="text-sm font-black text-emerald-700 italic">0%</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <p class="text-rose-500 text-[9px] font-black uppercase mb-3 tracking-widest">Top Selling</p>
                        <div id="top-products" class="space-y-2.5 text-xs font-bold text-slate-600 italic">Memuat...</div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-slate-400 text-[9px] font-black uppercase mb-2 tracking-widest">Stock Warning</p>
                        <div id="dead-products" class="space-y-2 text-[11px] font-bold text-slate-500 italic">Memuat...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
            <div class="card p-6 h-full flex flex-col justify-between">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-slate-400 italic mb-4">Traffic (Jam Rame)</h3>
                <div class="chart-container"><canvas id="chartPeak"></canvas></div>
                <p class="text-[9px] text-slate-400 mt-2 italic">Puncak: <span id="peak-time" class="text-slate-900 font-bold">--:00</span></p>
            </div>

            <div class="card p-6 h-full">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-slate-400 italic mb-4">Metode Bayar</h3>
                <div class="space-y-2.5" id="pay-list">Memuat...</div>
                <div class="mt-5 pt-4 border-t border-slate-50">
                    <p class="text-[8px] text-slate-400 uppercase font-black">Admin / Kasir</p>
                    <p id="last-cashier" class="text-xs font-black text-rose-600 italic mt-0.5">---</p>
                </div>
            </div>

            <div class="card p-6 bg-rose-50 border-rose-100 h-full">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-rose-500 italic mb-4">Void Monitor</h3>
                <div id="void-list" class="space-y-3 h-32 overflow-y-auto pr-1 text-[10px] font-bold text-rose-900/70 italic">
                    Memuat...
                </div>
            </div>
        </div>
    </div>

    <div id="modalExpense" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-6 z-50">
        <div class="bg-white p-8 md:p-10 rounded-t-[2rem] md:rounded-[2.5rem] w-full max-w-md shadow-2xl transition-all">
            <h3 class="text-lg md:text-xl font-black italic uppercase mb-6 text-slate-900 text-center md:text-left">Input <span class="text-rose-500">Biaya OPEX</span></h3>
            <div class="space-y-4">
                <input type="text" id="exDesc" placeholder="Deskripsi (Listrik, Gaji, dll)" class="w-full bg-slate-50 p-4 rounded-xl outline-none border border-slate-200 font-bold text-sm">
                <input type="number" pattern="\d*" id="exAmount" placeholder="Jumlah Rp" class="w-full bg-slate-50 p-4 rounded-xl outline-none border border-slate-200 font-bold text-sm">
                <div class="flex flex-col-reverse md:flex-row gap-3 mt-4">
                    <button onclick="closeModal()" class="w-full p-4 font-black uppercase text-[10px] text-slate-400">Tutup</button>
                    <button onclick="submitExpense()" id="btnEx" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black uppercase text-[10px] shadow-lg shadow-slate-200">Simpan Data</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL /exec ANDA DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbz_0PFppB7sNg1jiy_u3iKJFNrd5ply8rLfIRaeEMILmIQVVRkgl_m1Fe1hJSa4J_x8mQ/exec"; 
        let chartPeak;

        async function init() {
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getOwnerReport" }) });
                const r = await res.json();
                if(r.status === "success") {
                    const d = r.data;
                    document.getElementById('profit').innerText = "Rp " + d.profit.toLocaleString();
                    document.getElementById('omzet').innerText = "Rp " + d.omzet.toLocaleString();
                    document.getElementById('biaya').innerText = "Rp " + d.biaya.toLocaleString();
                    document.getElementById('margin').innerText = d.margin + "%";
                    document.getElementById('last-cashier').innerText = d.lastCashier;
                    document.getElementById('top-products').innerHTML = d.topProducts.map((p,i)=>`
                        <div class="flex justify-between items-center border-b border-slate-50 pb-1.5">
                            <span><span class="text-rose-500 mr-1.5">#${i+1}</span> ${p.nama}</span>
                            <span class="text-[10px] text-slate-400">${p.qty}</span>
                        </div>`).join('');
                    document.getElementById('dead-products').innerHTML = d.deadStock.map(p=>`
                        <div class="flex justify-between"><span>⚠️ ${p.nama}</span><span>${p.stok}</span></div>`).join('');
                    document.getElementById('pay-list').innerHTML = Object.keys(d.payments).map(k=>`
                        <div class="flex justify-between text-[11px] font-bold text-slate-600">
                            <span>${k}</span><span>Rp ${d.payments[k].toLocaleString()}</span>
                        </div>`).join('');
                    
                    if(d.voids.length > 0) {
                        document.getElementById('void-list').innerHTML = d.voids.map(v=>`
                            <div class="p-2 border-b border-rose-100">🚫 ${v.barang} (${v.kasir})<br><span class="text-[8px] opacity-60">${v.alasan}</span></div>`).join('');
                    } else {
                        document.getElementById('void-list').innerHTML = "<p class='text-center opacity-30 mt-10'>No Void</p>";
                    }
                    renderPeakChart(d.peakHours);
                }
            } catch(e) { console.error(e); }
        }

        function renderPeakChart(hours) {
            const ctx = document.getElementById('chartPeak').getContext('2d');
            if(chartPeak) chartPeak.destroy();
            chartPeak = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(hours).map(h => h + ":00"),
                    datasets: [{ data: Object.values(hours), borderColor: '#f43f5e', tension: 0.4, fill: false, borderWidth: 2.5, pointRadius: 0 }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }, 
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { size: 7 } } } } 
                }
            });
            const peakHour = Object.keys(hours).reduce((a, b) => hours[a] > hours[b] ? a : b, 0);
            document.getElementById('peak-time').innerText = peakHour + ":00";
        }

        function openModal() { document.getElementById('modalExpense').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modalExpense').classList.add('hidden'); }
        
        async function submitExpense() {
            const desc = document.getElementById('exDesc').value, amount = document.getElementById('exAmount').value;
            if(!desc || !amount) return alert("Isi lengkap!");
            document.getElementById('btnEx').innerText = "MENYIMPAN...";
            await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "addExpense", desc, amount, cat: "Operasional", admin: session.nama })});
            document.getElementById('btnEx').innerText = "SIMPAN DATA";
            closeModal(); init();
        }
        function logout() { sessionStorage.removeItem('ali_session_v4'); window.location.href = "index.html"; }
        window.onload = init;
    </script>
</body>
</html>
