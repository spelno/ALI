<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Executive <span class="text-rose-500">Ali POS</span></h1>
            <button onclick="location.href='index.html'" class="bg-white/5 px-6 py-2 rounded-xl text-[10px] font-black hover:bg-rose-500 transition-all uppercase tracking-widest">Logout</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="space-y-6">
                <div class="bg-white/5 p-10 rounded-[3rem] border border-white/5">
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-2">Estimasi Profit</p>
                    <h2 id="profit" class="text-5xl font-black text-rose-500 tracking-tighter italic">Rp 0</h2>
                </div>
                <div class="bg-white/5 p-10 rounded-[3rem] border border-white/5">
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-2">History Transaksi Terbaru</p>
                    <div id="history-list" class="space-y-4 mt-6 text-sm">
                        </div>
                </div>
            </div>

            <div class="bg-white/5 p-12 rounded-[4rem] border border-white/5 flex flex-col items-center">
                <h3 class="text-[10px] font-black uppercase text-slate-500 mb-10 tracking-[0.3em]">Profit Margin Analysis</h3>
                <div class="w-64 h-64"><canvas id="chart"></canvas></div>
                <div class="mt-12 text-center">
                    <p id="omzet" class="text-2xl font-bold tracking-tighter italic">Omzet: Rp 0</p>
                    <p class="text-slate-600 text-[10px] font-black uppercase mt-2 tracking-widest">Total Penjualan Kotor</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwO5xgXJK55TMBH6G8MuMVwdNxni2jwGj8MvV5yR3LO-AYfWWEsvgsCMlQnWusg9f-UPg/exec"; 

        async function loadOwnerData() {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getOwnerReport" })});
            const result = await res.json();
            
            if(result.status === "success") {
                const data = result.data;
                document.getElementById('profit').innerText = "Rp " + data.profit.toLocaleString();
                document.getElementById('omzet').innerText = "Omzet: Rp " + data.omzet.toLocaleString();
                
                // Render History
                document.getElementById('history-list').innerHTML = data.history.map(h => `
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <div><span class="text-slate-500 text-[10px] mr-2">${h.waktu}</span><span class="font-bold">${h.nama}</span></div>
                        <div class="text-rose-500 font-black italic">Rp ${h.total.toLocaleString()}</div>
                    </div>
                `).join('');

                renderChart(data.omzet, data.profit);
            }
        }

        function renderChart(o, p) {
            new Chart(document.getElementById('chart'), {
                type: 'doughnut',
                data: { datasets: [{ data: [p, o-p], backgroundColor: ['#f43f5e', 'rgba(255,255,255,0.03)'], borderWidth: 0 }] },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        }
        window.onload = loadOwnerData;
    </script>
</body>
</html>
