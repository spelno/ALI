<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALI POS - Billing Terminal</title>
    
    <script>
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session) { window.location.replace("index.html"); }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 1fr 350px; height: 100vh; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-layout">
        <main class="flex flex-col bg-white overflow-hidden shadow-sm">
            <header class="p-6 border-b border-slate-100 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-black italic tracking-tighter text-slate-900 uppercase">ALI <span class="text-rose-600">POS</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Kasir: <span id="nama-admin">---</span></p>
                </div>
                <button onclick="logout()" class="p-3 text-slate-300 hover:text-rose-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </header>

            <div id="cart-items" class="flex-1 overflow-y-auto custom-scroll p-6 space-y-4">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center opacity-30 italic">
                    <p class="font-bold tracking-widest">KERANJANG KOSONG</p>
                </div>
            </div>

            <footer class="p-6 border-t border-slate-100 bg-slate-50/80">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Total Belanja</span>
                    <span id="total-tagihan" class="text-4xl font-black italic tracking-tighter text-slate-900">Rp 0</span>
                </div>
                <button onclick="prosesBayar()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-rose-600 transition-all active:scale-95">
                    BAYAR SEKARANG
                </button>
            </footer>
        </main>

        <aside class="flex flex-col border-l border-slate-200 overflow-hidden bg-slate-50">
            <div class="p-4 bg-white border-b border-slate-200">
                <input type="text" id="search" onkeyup="filterProduct()" placeholder="Cari barang..." class="w-full bg-slate-100 border-none px-4 py-3 rounded-xl text-xs font-bold focus:ring-2 focus:ring-rose-500 outline-none">
            </div>
            <div id="product-list" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-3">
                </div>
        </aside>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxrJ3CEUi6noMxD-7dDdPieSNHg_1pcvG-V37rpQsGzv8itNAOus2x_hICslTeHXJx3aA/exec"; 
        let cart = [];
        let allProducts = [];

        window.onload = function() {
            document.getElementById('nama-admin').innerText = session.nama;
            loadProducts();
        };

        async function loadProducts() {
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getAdminData" }) });
                const r = await res.json();
                if(r.status === "success") {
                    allProducts = r.products;
                    renderProducts(allProducts);
                }
            } catch(e) { console.error("Data gagal dimuat"); }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => `
                <div onclick="addToCart('${p[0]}', '${p[1]}', ${p[6]})" class="bg-white p-4 rounded-xl border border-slate-200 hover:border-rose-400 cursor-pointer shadow-sm transition-all active:scale-95 group">
                    <h4 class="font-bold text-[10px] text-slate-800 leading-tight uppercase mb-1 group-hover:text-rose-600">${p[1]}</h4>
                    <p class="text-slate-900 font-black text-xs italic">Rp ${Number(p[6]).toLocaleString('id-ID')}</p>
                </div>
            `).join('');
        }

        function addToCart(barcode, nama, harga) {
            const idx = cart.findIndex(i => i.barcode === barcode);
            // Pastikan harga adalah Number agar ribuan muncul
            const fixedHarga = Number(harga);

            if(idx > -1) {
                cart[idx].qty++;
            } else {
                cart.push({ barcode, nama, harga: fixedHarga, qty: 1 });
            }
            // Trigger update UI secara paksa
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cart-items');
            const empty = document.getElementById('empty-state');
            let total = 0;
            
            if(cart.length === 0) { 
                empty.style.display = "flex";
                container.innerHTML = ""; 
                container.appendChild(empty);
            } else { 
                empty.style.display = "none";
                container.innerHTML = cart.map((item, i) => {
                    const subtotal = item.harga * item.qty;
                    total += subtotal;
                    return `
                    <div class="flex justify-between items-center p-4 border border-slate-100 rounded-2xl bg-white shadow-sm">
                        <div class="flex-1">
                            <p class="text-xs font-black text-slate-800 uppercase">${item.nama}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">@ Rp ${item.harga.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="flex items-center bg-slate-100 rounded-lg p-1">
                                <button onclick="adjustQty(${i},-1)" class="w-8 h-8 font-bold text-slate-500 hover:text-rose-600">-</button>
                                <span class="w-8 text-center text-xs font-black">${item.qty}</span>
                                <button onclick="adjustQty(${i},1)" class="w-8 h-8 font-bold text-slate-500 hover:text-rose-600">+</button>
                            </div>
                            <p class="w-28 text-right font-black text-sm italic text-rose-600">Rp ${subtotal.toLocaleString('id-ID')}</p>
                        </div>
                    </div>`;
                }).join('');
            }
            document.getElementById('total-tagihan').innerText = "Rp " + total.toLocaleString('id-ID');
        }

        function adjustQty(i, v) {
            cart[i].qty += v;
            if(cart[i].qty <= 0) cart.splice(i, 1);
            updateUI();
        }

        function filterProduct() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allProducts.filter(p => p[1].toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function logout() {
            sessionStorage.removeItem('ali_session_v4');
            window.location.replace("index.html");
        }

        function prosesBayar() {
            if(cart.length === 0) return alert("Keranjang masih kosong!");
            // Tambahkan modal bayar atau kirim data ke GS di sini
            alert("Memproses total: Rp " + document.getElementById('total-tagihan').innerText);
        }
    </script>
</body>
</html>
