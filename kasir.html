<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasir Premium</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.slide-panel{
  position: fixed;
  top:0;
  right:-100%;
  width:40%;
  height:100%;
  background:white;
  transition:0.3s;
  z-index:50;
}
.slide-panel.open{ right:0; }

.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#333;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  opacity:0;
  transform:translateY(-10px);
  transition:0.3s;
}
.toast.show{
  opacity:1;
  transform:translateY(0);
}
</style>

</head>

<body class="bg-gray-100 h-screen flex overflow-hidden">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIv5TIc1e4yWI12pM_VN6bHHlsFHnKUyCEgFCyRMN3RfhQYvC-TkvrF6mkoQaOpjWuAg/exec";
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user || user.role !== "kasir"){
  location="index.html";
}
</script>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- CART -->
<div class="w-1/2 bg-white p-6 flex flex-col">

  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold">🧾 Keranjang</h2>
    <div>
      <button onclick="openPanel()" class="bg-blue-500 text-white px-3 py-1 rounded mr-2">
        + Barang
      </button>
      <button onclick="logout()" class="bg-gray-400 text-white px-3 py-1 rounded">
        Logout
      </button>
    </div>
  </div>

  <div id="cart" class="flex-1 overflow-auto"></div>

  <div class="border-t pt-4">
    <h3 class="text-2xl font-bold mb-3">
      Total: Rp <span id="total">0</span>
    </h3>

    <button onclick="bayar()" class="bg-green-500 text-white p-3 w-full rounded mb-2">
      💳 Bayar
    </button>

    <button onclick="requestVoid()" class="bg-red-500 text-white p-3 w-full rounded">
      ❌ Void (Butuh Approval)
    </button>
  </div>

</div>

<!-- SLIDE KATALOG -->
<div id="panel" class="slide-panel p-5">

  <div class="flex justify-between mb-3">
    <h2 class="text-xl font-bold">Katalog</h2>
    <button onclick="closePanel()">✖</button>
  </div>

  <div id="produk" class="grid grid-cols-2 gap-3"></div>

</div>

<script>
let cartData = [];

/* =====================
   TOAST NOTIFIKASI
===================== */
function showToast(msg, color="#333"){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = color;
  t.classList.add("show");

  setTimeout(()=>t.classList.remove("show"),2000);
}

/* =====================
   PANEL
===================== */
function openPanel(){
  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
}

/* =====================
   LOAD PRODUK
===================== */
async function loadProduk(){
  let res = await fetch(API_URL+"?action=products");
  let data = await res.json();

  produk.innerHTML = data.map(p=>`
    <div onclick='add("${p.Barcode}","${p.Nama_Barang}",${p.Harga_Jual})'
      class="p-3 bg-gray-50 rounded shadow cursor-pointer hover:bg-blue-100">
      <b>${p.Nama_Barang}</b><br>
      Rp ${p.Harga_Jual}
    </div>
  `).join("");
}

/* =====================
   CART
===================== */
function add(b,n,h){
  cartData.push({Barcode:b,Nama_Barang:n,Qty:1,Harga_Jual:h});
  renderCart();
  showToast("Produk ditambahkan","green");
}

function renderCart(){
  let total = 0;

  cart.innerHTML = cartData.map(c=>{
    total += c.Qty*c.Harga_Jual;

    return `
    <div class="flex justify-between border-b py-2">
      <span>${c.Nama_Barang}</span>
      <span>${c.Qty}</span>
    </div>`;
  }).join("");

  totalEl.innerText = total;
}

/* =====================
   BAYAR
===================== */
async function bayar(){
  await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"saveTransaction",
      cart:cartData,
      cashierName:user.nama,
      role:user.role,
      method:"Cash"
    })
  });

  cartData=[];
  renderCart();
  showToast("Transaksi berhasil","green");
}

/* =====================
   APPROVAL
===================== */
async function requestVoid(){
  await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"requestApproval",
      actionType:"VOID",
      requestBy:user.nama,
      method:"remote",
      refId:"manual"
    })
  });

  showToast("Menunggu approval admin","orange");
}

/* =====================
   LOGOUT
===================== */
function logout(){
  sessionStorage.clear();
  location="index.html";
}

const totalEl = document.getElementById("total");

loadProduk();
</script>

</body>
</html>
