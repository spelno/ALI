<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS</title>
    
    <script>
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session) { window.location.replace("index.html"); }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .layout-utama { display: grid; grid-template-columns: 1fr 350px; height: 100vh; }
        .scroll-kecil::-webkit-scrollbar { width: 4px; }
        .scroll-kecil::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="layout-utama">
        <div class="flex flex-col bg-white border-r">
            <div class="p-6 border-b flex justify-between items-center">
                <h1 class="font-black italic text-xl uppercase">ALI <span class="text-rose-600">POS</span></h1>
                <p class="text-[10px] font-bold text-slate-400">ADMIN: <span id="user-aktif" class="text-slate-900">...</span></p>
            </div>

            <div id="keranjang-list" class="flex-1 overflow-y-auto p-6 space-y-4 scroll-kecil">
                </div>

            <div class="p-6 border-t bg-slate-50">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-xs font-bold text-slate-400 uppercase">Total Bayar</span>
                    <span id="total-angka" class="text-4xl font-black italic text-slate-900">Rp 0</span>
                </div>
                <button onclick="bayar()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black hover:bg-rose-600 transition-all">BAYAR SEKARANG</button>
            </div>
        </div>

        <div class="flex flex-col bg-slate-50 overflow-hidden">
            <div class="p-4 bg-white border-b">
                <input type="text" id="cari" placeholder="Cari barang..." class="w-full bg-slate-100 border-none px-4 py-3 rounded-xl text-xs font-bold outline-none">
            </div>
            <div id="produk-grid" class="flex-1 overflow-y-auto p-4 space-y-2 scroll-kecil">
                </div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxrJ3CEUi6noMxD-7dDdPieSNHg_1pcvG-V37rpQsGzv8itNAOus2x_hICslTeHXJx3aA/exec"; // GANTI DENGAN URL EXEC ANDA
        let dataKeranjang = [];

        window.onload = function() {
            document.getElementById('user-aktif').innerText = session.nama;
            muatBarang();
        };

        async function muatBarang() {
            const res = await fetch(URL_SCRIPT, { method: "POST", body: JSON.stringify({ action: "getAdminData" }) });
            const json = await res.json();
            const container = document.getElementById('produk-grid');
            
            container.innerHTML = json.products.map(p => {
                // Konversi harga ke angka agar bisa dikali
                let hargaBersih = String(p[6]).replace(/[^0-9]/g, ''); 
                return `
                <div onclick="tambahKeKeranjang('${p[0]}', '${p[1]}', ${hargaBersih})" class="bg-white p-4 rounded-xl border border-slate-200 cursor-pointer hover:border-rose-500 shadow-sm active:scale-95 transition-all">
                    <h4 class="font-bold text-[10px] uppercase text-slate-700 leading-tight">${p[1]}</h4>
                    <p class="text-rose-600 font-black text-xs italic mt-1">Rp ${Number(hargaBersih).toLocaleString('id-ID')}</p>
                </div>`;
            }).join('');
        }

        function tambahKeKeranjang(id, nama, harga) {
            const ketemu = dataKeranjang.find(item => item.id === id);
            if(ketemu) {
                ketemu.qty++;
            } else {
                dataKeranjang.push({ id, nama, harga: Number(harga), qty: 1 });
            }
            gambarUlangKeranjang();
        }

        function gambarUlangKeranjang() {
            const box = document.getElementById('keranjang-list');
            let total = 0;
            
            box.innerHTML = dataKeranjang.map((item, i) => {
                let sub = item.harga * item.qty;
                total += sub;
                return `
                <div class="flex justify-between items-center p-4 bg-white border border-slate-100 rounded-2xl shadow-sm">
                    <div class="flex-1">
                        <p class="text-xs font-black text-slate-800 uppercase">${item.nama}</p>
                        <p class="text-[10px] font-bold text-slate-400 mt-1">@ Rp ${item.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="ubahQty(${i},-1)" class="w-8 h-8 bg-slate-100 rounded-lg font-bold">-</button>
                        <span class="font-black text-xs">${item.qty}</span>
                        <button onclick="ubahQty(${i},1)" class="w-8 h-8 bg-slate-100 rounded-lg font-bold">+</button>
                        <p class="w-24 text-right font-black text-sm italic text-rose-600">Rp ${sub.toLocaleString('id-ID')}</p>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('total-angka').innerText = "Rp " + total.toLocaleString('id-ID');
        }

        function ubahQty(idx, n) {
            dataKeranjang[idx].qty += n;
            if(dataKeranjang[idx].qty <= 0) dataKeranjang.splice(idx, 1);
            gambarUlangKeranjang();
        }

        function logout() {
            sessionStorage.removeItem('ali_session_v4');
            window.location.replace("index.html");
        }

        function bayar() {
            if(dataKeranjang.length === 0) return alert("Pilih barang!");
            alert("Berhasil! Total: " + document.getElementById('total-tagihan').innerText);
        }
    </script>
</body>
</html>
