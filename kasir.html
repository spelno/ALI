<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALI POS Kasir</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
.slide-panel{
  position:fixed; top:0; right:-100%;
  width:40%; height:100%;
  background:white;
  transition:0.3s;
  z-index:50;
}
.slide-panel.open{ right:0; }

.toast{
  position:fixed;
  top:20px; right:20px;
  background:#333; color:white;
  padding:12px 18px;
  border-radius:10px;
  opacity:0; transition:0.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body class="bg-gray-100 h-screen flex overflow-hidden">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIv5TIc1e4yWI12pM_VN6bHHlsFHnKUyCEgFCyRMN3RfhQYvC-TkvrF6mkoQaOpjWuAg/exec";
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user || user.role !== "kasir"){
  location="index.html";
}
</script>

<div id="toast" class="toast"></div>

<!-- LEFT CART -->
<div class="w-1/2 bg-white p-6 flex flex-col">

  <div class="flex justify-between mb-4">
    <h2 class="text-2xl font-bold">🧾 Keranjang</h2>
    <div>
      <button onclick="openPanel()" class="bg-blue-500 text-white px-3 py-1 rounded mr-2">+ Barang</button>
      <button onclick="startScan()" class="bg-purple-500 text-white px-3 py-1 rounded mr-2">📷 Scan</button>
      <button onclick="logout()" class="bg-gray-400 text-white px-3 py-1 rounded">Logout</button>
    </div>
  </div>

  <div id="cart" class="flex-1 overflow-auto"></div>

  <div class="border-t pt-4">
    <h3 class="text-2xl font-bold">Total: Rp <span id="total">0</span></h3>

    <button onclick="bayar()" class="bg-green-500 text-white p-3 w-full rounded mt-3">💳 Bayar</button>
    <button onclick="printStruk()" class="bg-blue-500 text-white p-3 w-full rounded mt-2">🧾 Print</button>
  </div>

</div>

<!-- RIGHT PANEL -->
<div id="panel" class="slide-panel p-5">
  <div class="flex justify-between mb-3">
    <h2 class="text-xl font-bold">Katalog</h2>
    <button onclick="closePanel()">✖</button>
  </div>
  <div id="produk" class="grid grid-cols-2 gap-3"></div>
</div>

<!-- SCANNER -->
<div id="scanner" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
  <div class="bg-white p-4 rounded">
    <div id="reader" style="width:300px"></div>
    <button onclick="stopScan()" class="mt-3 bg-red-500 text-white p-2 w-full">Tutup</button>
  </div>
</div>

<script>
let cartData=[];
let produkList=[];
let offlineQueue = JSON.parse(localStorage.getItem("offlineQueue") || "[]");

const beep = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

/* ================= TOAST ================= */
function showToast(msg,color="#333"){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.background=color;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* ================= PANEL ================= */
function openPanel(){ panel.classList.add("open"); }
function closePanel(){ panel.classList.remove("open"); }

/* ================= LOAD PRODUK ================= */
async function loadProduk(){
  let res = await fetch(API_URL+"?action=products");
  produkList = await res.json();

  produk.innerHTML = produkList.map(p=>`
    <div onclick='add("${p.Barcode}")'
      class="p-3 bg-gray-50 rounded shadow cursor-pointer hover:bg-blue-100">
      <b>${p.Nama_Barang}</b><br>Rp ${p.Harga_Jual}
    </div>
  `).join("");
}

/* ================= ADD ================= */
function add(barcode){
  let p = produkList.find(x=>x.Barcode==barcode);
  if(!p) return showToast("Produk tidak ditemukan","red");

  cartData.push({...p, Qty:1});
  beep.play();
  renderCart();
}

/* ================= CART ================= */
function renderCart(){
  let total=0;

  cart.innerHTML = cartData.map(c=>{
    total+=c.Qty*c.Harga_Jual;
    return `<div class="flex justify-between border-b py-2">
      <span>${c.Nama_Barang}</span>
      <span>${c.Qty}</span>
    </div>`;
  }).join("");

  totalEl.innerText = total;
}

/* ================= BAYAR ================= */
async function bayar(){

  let trxData = {
    action:"saveTransaction",
    cart:cartData,
    cashierName:user.nama,
    role:user.role,
    method:"Cash"
  };

  if(navigator.onLine){
    try{
      let res = await fetch(API_URL,{
        method:"POST",
        body: JSON.stringify(trxData)
      });

      let d = await res.json();
      window.lastInvoice = d.invoice;

      showToast("Transaksi sukses","green");

    }catch(e){
      saveOffline(trxData);
    }
  }else{
    saveOffline(trxData);
  }

  beep.play();
  cartData=[];
  renderCart();
}

/* ================= OFFLINE ================= */
function saveOffline(data){
  offlineQueue.push(data);
  localStorage.setItem("offlineQueue", JSON.stringify(offlineQueue));
  showToast("Disimpan offline","orange");
}

async function syncOffline(){
  if(!offlineQueue.length) return;

  let success=[];

  for(let trx of offlineQueue){
    try{
      await fetch(API_URL,{
        method:"POST",
        body: JSON.stringify(trx)
      });
      success.push(trx);
    }catch(e){
      break;
    }
  }

  offlineQueue = offlineQueue.filter(x=>!success.includes(x));
  localStorage.setItem("offlineQueue", JSON.stringify(offlineQueue));

  showToast("Sync selesai","green");
}

/* ================= PRINT ================= */
function printStruk(){
  let html = `
  <div style="width:250px;font-family:monospace">
    <h3 style="text-align:center">ALI POS</h3>
    <hr>
    ${cartData.map(c=>`
      ${c.Nama_Barang}<br>
      ${c.Qty} x ${c.Harga_Jual}
    `).join("")}
    <hr>
    Total: Rp ${totalEl.innerText}
    <br>Invoice: ${window.lastInvoice || "-"}
  </div>`;

  let w = window.open();
  w.document.write(html);
  w.print();
}

/* ================= SCANNER ================= */
let scanner;

function startScan(){
  document.getElementById("scanner").classList.remove("hidden");

  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode:"environment" },
    { fps:10 },
    (code)=>{
      stopScan();
      add(code);
      showToast("Barcode terbaca","green");
    }
  );
}

function stopScan(){
  scanner.stop();
  document.getElementById("scanner").classList.add("hidden");
}

/* ================= NETWORK ================= */
window.addEventListener("offline", ()=>{
  showToast("Mode Offline","orange");
});

window.addEventListener("online", ()=>{
  showToast("Online kembali","green");
  syncOffline();
});

/* ================= LOGOUT ================= */
function logout(){
  sessionStorage.clear();
  location="index.html";
}

const totalEl = document.getElementById("total");

loadProduk();
if(navigator.onLine) syncOffline();
</script>

</body>
</html>
