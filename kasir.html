<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxCpN-bBvYv1QFkn_yYwmB9X1a0Bz4uUDESpQhmlLt7iiiZzcVu5DRUGlD7hNPNrkIpGQ/exec"; 
    let products = [], cart = [], currentMethod = 'Cash';
    const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));

    window.onload = () => { 
        if(!session) window.location.replace("index.html");
        document.getElementById('u-name').innerText = session.nama;
        fetchData(); 
        startRemoteScanListener(); 
    };

    async function fetchData() {
        const res = await fetch(`${API_URL}?action=getProducts`);
        products = await res.json();
    }

    function startRemoteScanListener() {
        setInterval(async () => {
            try {
                const res = await fetch(`${API_URL}?action=checkScan`);
                const data = await res.json();
                if (data.barcode && data.barcode !== "-") addToCart(data.barcode);
            } catch(e) {}
        }, 1500);
    }

    function addToCart(bc) {
        const p = products.find(x => x.Barcode == bc);
        if(!p) return document.getElementById('error-sound').play();
        
        document.getElementById('beep-sound').play();
        const ex = cart.find(c => c.Barcode == bc);
        if(ex) ex.Qty++; else cart.push({...p, Qty: 1});
        updateUI();
    }

    async function handleTransaction() {
        if (cart.length === 0) return alert("Keranjang kosong!");
        const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
        const cashIn = document.getElementById('cash-in').value;

        if (currentMethod === 'Cash' && (!cashIn || cashIn < total)) return alert("Uang kurang!");

        const btn = document.getElementById('btn-pay');
        btn.disabled = true; btn.innerText = "PROSES...";

        let imgBase = null;
        const fileInput = document.getElementById('evidence-file');
        if (fileInput.files.length > 0) imgBase = await toBase64(fileInput.files[0]);

        const payload = {
            action: "saveTransaction",
            admin: session.nama,
            method: currentMethod,
            cart: cart,
            imageContent: imgBase ? imgBase.split(',')[1] : null
        };

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.status === "success") {
                alert("Berhasil!");
                cart = []; updateUI();
                document.getElementById('cash-in').value = '';
            }
        } catch (e) { alert("Koneksi Error!"); }
        finally { btn.disabled = false; btn.innerText = "Selesai & Cetak"; }
    }

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // Fungsi UI lainnya (updateUI, setMethod, dll) tetap seperti sebelumnya
</script>
