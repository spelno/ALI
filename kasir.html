<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; }
        /* Reset Sidebar */
        .sidebar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            color: #94a3b8;
            transition: 0.3s;
            border-radius: 12px;
        }
        .sidebar-item:hover { background: #f8fafc; color: #e11d48; }
        .sidebar-active { background: #e11d48 !important; color: white !important; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-20 bg-white border-r flex flex-col items-center py-8 gap-4 shadow-sm z-50">
        <div class="font-bold text-rose-600 mb-4">ALI</div>
        
        <nav class="flex flex-col gap-2 w-full px-2">
            <a href="admin.html" class="sidebar-item" title="Dashboard">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </a>
            <a href="#" class="sidebar-item sidebar-active" title="Kasir">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            </a>
            <button onclick="toggleCatalog()" class="sidebar-item" title="Katalog">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <a href="inventory.html" class="sidebar-item" title="Inventory">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </a>
        </nav>

        <button onclick="logout()" class="mt-auto sidebar-item hover:text-rose-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-6 overflow-hidden">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 uppercase tracking-tight">Keranjang Belanja</h2>
        <div class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            <div id="cart-list" class="flex-1 overflow-y-auto p-6">
                </div>
            <div class="p-4 bg-slate-50 border-t">
                <input type="text" id="barcode-scan" onkeypress="handleManualInput(event)" autofocus placeholder="Input Barcode / Scan..." class="w-full bg-white border border-slate-300 rounded-xl py-4 px-6 text-xl outline-none focus:ring-2 focus:ring-rose-500 transition-all">
            </div>
        </div>
    </main>

    <aside class="w-80 bg-white border-l p-6 flex flex-col">
        <div class="mb-8 text-right">
            <p class="text-xs text-slate-400 font-bold uppercase mb-1">Total</p>
            <h1 id="total-display" class="text-4xl font-bold text-rose-600">Rp 0</h1>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setMethod('Cash')" id="m-cash" class="py-3 rounded-lg border-2 border-rose-500 bg-rose-50 text-rose-600 font-bold text-xs">CASH</button>
                <button onclick="setMethod('Transfer')" id="m-transfer" class="py-3 rounded-lg border border-slate-200 text-slate-400 font-bold text-xs">TF</button>
                <button onclick="setMethod('QRIS')" id="m-qris" class="py-3 rounded-lg border border-slate-200 text-slate-400 font-bold text-xs">QRIS</button>
            </div>

            <div class="bg-slate-100 p-6 rounded-xl">
                <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Bayar</label>
                <input type="number" id="cash-in" oninput="calculateChange()" class="w-full bg-transparent text-2xl font-bold outline-none border-b border-slate-300 focus:border-rose-500 pb-1">
                <div class="flex justify-between mt-4">
                    <span class="text-xs text-slate-400">Kembali</span>
                    <span id="change-display" class="font-bold text-emerald-600 text-lg">Rp 0</span>
                </div>
            </div>

            <button onclick="handleTransaction()" id="btn-pay" class="w-full bg-rose-600 text-white font-bold py-5 rounded-xl shadow-lg hover:bg-rose-700 transition-all">SIMPAN TRANSAKSI</button>
        </div>
    </aside>

    <div id="catalog-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] p-10 flex items-center justify-center">
        <div class="bg-white w-full max-w-4xl h-[80vh] rounded-3xl p-8 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold uppercase">Katalog Produk</h3>
                <button onclick="toggleCatalog()" class="text-slate-400 hover:text-black text-2xl">✕</button>
            </div>
            <div id="catalog-grid" class="grid grid-cols-3 gap-4 overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwDX934LugMyjWFT-CXrVYoEQDfajg_aBYBe1y5G2M8p6VM8ymX0Wc9Z9341KKxIpQgjQ/exec"; // Pastikan Link /exec terbaru
        let products = [], cart = [], currentMethod = 'Cash';

        window.onload = fetchData;

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}?action=getProducts`);
                products = await res.json();
                renderCatalog();
            } catch (e) { alert("Gagal mengambil data produk dari server."); }
        }

        function handleManualInput(e) { if(e.key === 'Enter') { addToCart(e.target.value); e.target.value = ''; } }

        function addToCart(bc) {
            const p = products.find(x => x.Barcode.toString() === bc.toString());
            if(!p) return;
            const existing = cart.find(c => c.Barcode.toString() === bc.toString());
            if(existing) { existing.Qty += 1; } else { cart.push({...p, Qty: 1}); }
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map(item => {
                const sub = item.Harga_Jual * item.Qty; total += sub;
                return `<div class="flex justify-between py-4 border-b border-slate-100 items-center">
                    <div><p class="font-bold text-slate-800">${item.Nama_Barang}</p><p class="text-[10px] text-slate-400">${item.Barcode}</p></div>
                    <div class="flex items-center gap-8">
                        <span class="font-bold text-slate-400">x${item.Qty}</span>
                        <span class="font-bold text-rose-600">Rp ${sub.toLocaleString()}</span>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-display').innerText = `Rp ${total.toLocaleString()}`;
            calculateChange();
        }

        function calculateChange() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value || 0;
            document.getElementById('change-display').innerText = `Rp ${Math.max(0, cash - total).toLocaleString()}`;
        }

        function toggleCatalog() { document.getElementById('catalog-modal').classList.toggle('hidden'); }

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = products.map(p => `
                <button onclick="addToCart('${p.Barcode}')" class="p-6 border border-slate-100 rounded-2xl text-left hover:border-rose-500 transition-all bg-slate-50">
                    <p class="font-bold text-slate-800 h-10 overflow-hidden leading-tight mb-2">${p.Nama_Barang}</p>
                    <p class="text-rose-600 font-bold">Rp ${p.Harga_Jual.toLocaleString()}</p>
                </button>
            `).join('');
        }

        async function handleTransaction() {
            if (cart.length === 0) return alert("Pilih barang terlebih dahulu.");
            const btn = document.getElementById('btn-pay');
            btn.disabled = true; btn.innerText = "SEDANG MENYIMPAN...";

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "saveTransaction", cart: cart, method: currentMethod, admin: "Kasir" }) 
                });
                const result = await res.json();
                if (result.status === "success") {
                    alert("Transaksi Berhasil!");
                    cart = []; updateUI();
                    document.getElementById('cash-in').value = '';
                } else { alert("Gagal: " + result.message); }
            } catch (e) { alert("Gagal terhubung ke server. Cek URL API atau koneksi internet."); }
            finally { btn.disabled = false; btn.innerText = "SIMPAN TRANSAKSI"; }
        }

        function setMethod(m) {
            currentMethod = m;
            ['m-cash', 'm-transfer', 'm-qris'].forEach(id => {
                document.getElementById(id).className = "py-3 rounded-lg border border-slate-200 text-slate-400 font-bold text-xs";
            });
            document.getElementById('m-'+m.toLowerCase()).className = "py-3 rounded-lg border-2 border-rose-500 bg-rose-50 text-rose-600 font-bold text-xs";
        }

        function logout() { window.location.replace("index.html"); }
    </script>
</body>
</html>
