<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALI POS - Glassmorphism Terminal</title>
    
    <script>
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));
        if (!session) { window.location.replace("index.html"); }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); 
            height: 100vh; overflow: hidden; 
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
        }
        .main-layout { display: grid; grid-template-columns: 1fr 380px; height: 100vh; gap: 1px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div class="main-layout rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/50">
        
        <main class="flex flex-col glass-panel overflow-hidden">
            <header class="p-8 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter text-slate-900 uppercase">ALI <span class="text-rose-600">POS</span></h1>
                    <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-[0.2em] mt-1">Operator: <span id="nama-admin" class="text-slate-900">---</span></p>
                </div>
                <button onclick="logout()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/50 hover:bg-rose-500 hover:text-white transition-all shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </header>

            <div id="cart-items" class="flex-1 overflow-y-auto custom-scroll px-8 py-2 space-y-4">
                </div>

            <footer class="p-8 bg-white/30 border-t border-white/50">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-xs font-black uppercase tracking-widest text-slate-400">Total Tagihan</span>
                    <span id="total-tagihan" class="text-5xl font-black italic tracking-tighter text-slate-900">Rp 0</span>
                </div>
                <button onclick="prosesBayar()" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black uppercase tracking-[0.2em] shadow-xl hover:bg-rose-600 transition-all active:scale-[0.98]">
                    Selesaikan Transaksi
                </button>
            </footer>
        </main>

        <aside class="flex flex-col bg-white/80 border-l border-white/50 overflow-hidden">
            <div class="p-6">
                <input type="text" id="search" onkeyup="filterProduct()" placeholder="Cari Nama Barang..." class="w-full bg-slate-200/50 border-none px-6 py-4 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-rose-500 outline-none placeholder:text-slate-400">
            </div>
            
            <div id="product-list" class="flex-1 overflow-y-auto custom-scroll px-6 pb-6 space-y-3">
                </div>
        </aside>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxrJ3CEUi6noMxD-7dDdPieSNHg_1pcvG-V37rpQsGzv8itNAOus2x_hICslTeHXJx3aA/exec"; 
        let cart = [];
        let allProducts = [];

        window.onload = function() {
            document.getElementById('nama-admin').innerText = session.nama;
            loadProducts();
        };

        async function loadProducts() {
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getAdminData" }) });
                const r = await res.json();
                if(r.status === "success") {
                    allProducts = r.products;
                    renderProducts(allProducts);
                }
            } catch(e) { console.error("Gagal Muat"); }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => {
                const price = Number(p[6]);
                return `
                <div onclick="addToCart('${p[0]}', '${p[1]}', ${price})" class="bg-white p-5 rounded-2xl border border-slate-100 hover:border-rose-400 cursor-pointer shadow-sm transition-all active:scale-95 group">
                    <h4 class="font-bold text-[11px] text-slate-800 leading-tight uppercase mb-1 group-hover:text-rose-600">${p[1]}</h4>
                    <p class="text-slate-900 font-black text-sm italic">Rp ${price.toLocaleString('id-ID')}</p>
                </div>`;
            }).join('');
        }

        function addToCart(barcode, nama, harga) {
            const idx = cart.findIndex(i => i.barcode === barcode);
            if(idx > -1) {
                cart[idx].qty++;
            } else {
                cart.push({ barcode, nama, harga: Number(harga), qty: 1 });
            }
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cart-items');
            let total = 0;
            
            if(cart.length === 0) {
                container.innerHTML = `<div class="h-full flex items-center justify-center opacity-20 font-black tracking-[0.3em] italic">KERANJANG KOSONG</div>`;
            } else {
                container.innerHTML = cart.map((item, i) => {
                    const subtotal = item.harga * item.qty;
                    total += subtotal;
                    return `
                    <div class="flex justify-between items-center p-5 bg-white/60 border border-white rounded-[1.5rem] shadow-sm">
                        <div class="flex-1">
                            <p class="text-[13px] font-black text-slate-800 uppercase leading-none">${item.nama}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-2">Harga: Rp ${item.harga.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="flex items-center bg-slate-200/50 rounded-xl p-1">
                                <button onclick="adjustQty(${i},-1)" class="w-8 h-8 font-black text-slate-400 hover:text-rose-600">-</button>
                                <span class="w-10 text-center text-xs font-black">${item.qty}</span>
                                <button onclick="adjustQty(${i},1)" class="w-8 h-8 font-black text-slate-400 hover:text-rose-600">+</button>
                            </div>
                            <p class="w-32 text-right font-black text-lg italic text-rose-600">Rp ${subtotal.toLocaleString('id-ID')}</p>
                        </div>
                    </div>`;
                }).join('');
            }
            document.getElementById('total-tagihan').innerText = "Rp " + total.toLocaleString('id-ID');
        }

        function adjustQty(i, v) {
            cart[i].qty += v;
            if(cart[i].qty <= 0) cart.splice(i, 1);
            updateUI();
        }

        function filterProduct() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allProducts.filter(p => p[1].toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function logout() {
            sessionStorage.removeItem('ali_session_v4');
            window.location.replace("index.html");
        }

        function prosesBayar() {
            if(cart.length === 0) return;
            alert("Total Akhir: " + document.getElementById('total-tagihan').innerText);
        }
    </script>
</body>
</html>
