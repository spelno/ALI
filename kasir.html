<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .ali-red { background: #e11d48; }
        .ali-red-text { color: #e11d48; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #catalog-popup { transition: 0.4s ease; z-index: 1000; }
        @media print { body > *:not(#print-receipt) { display: none; } #print-receipt { display: block; } }
        #print-receipt { display: none; font-family: monospace; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-20 bg-white border-r flex flex-col items-center py-8 gap-6 shadow-sm">
        <div class="text-xl font-black ali-red-text italic">ALI</div>
        <button onclick="toggleCatalog()" class="p-4 rounded-2xl bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <button onclick="window.location.href='admin.html'" class="p-4 rounded-2xl bg-slate-50 text-slate-500 hover:bg-rose-500 hover:text-white transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        </button>
        <button onclick="logout()" class="mt-auto p-4 text-slate-300 hover:text-rose-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-8 overflow-hidden">
        <header class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-3xl font-black text-slate-800 italic">KERANJANG BELANJA</h2>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest"><span id="u-name">-</span> | <span id="u-role">-</span></p>
            </div>
            <button onclick="clearCart()" class="text-xs font-bold text-slate-400 hover:text-rose-600 uppercase">Kosongkan</button>
        </header>

        <div class="flex-1 bg-white rounded-[2rem] border shadow-sm overflow-hidden flex flex-col">
            <div id="cart-list" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                </div>
            <div class="p-6 bg-slate-50 border-t">
                <input type="text" id="barcode-scan" autofocus placeholder="SCAN BARCODE DISINI..." class="w-full bg-white border-2 rounded-2xl py-5 px-8 text-2xl font-black ali-red-text focus:border-rose-500 outline-none uppercase tracking-widest shadow-inner">
            </div>
        </div>
    </main>

    <aside class="w-96 bg-white border-l p-10 flex flex-col shadow-lg">
        <div class="text-center mb-10">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Bayar</p>
            <h1 id="total-display" class="text-5xl font-black ali-red-text tracking-tighter">Rp 0</h1>
        </div>

        <div class="space-y-6 flex-1">
            <div class="bg-slate-50 p-6 rounded-3xl border">
                <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Tunai (Rp)</label>
                <input type="number" id="cash-in" oninput="calculateChange()" class="w-full bg-transparent text-3xl font-black outline-none border-b-2 border-slate-200 focus:border-rose-500 mb-4">
                <div class="flex justify-between items-center text-emerald-600 font-bold">
                    <span class="text-[10px] uppercase">Kembali</span>
                    <span id="change-display" class="text-xl font-black">Rp 0</span>
                </div>
            </div>
            <button onclick="processCheckout()" id="btn-pay" class="w-full ali-red hover:bg-rose-700 text-white font-black py-6 rounded-3xl text-xl shadow-xl transition-all active:scale-95">SELESAI & CETAK</button>
        </div>
    </aside>

    <div id="catalog-popup" class="fixed top-0 right-0 w-[500px] h-full bg-white shadow-2xl translate-x-full flex flex-col">
        <div class="p-8 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-black uppercase italic">Katalog Produk</h3>
            <button onclick="toggleCatalog()" class="text-slate-400 hover:text-rose-600">✕</button>
        </div>
        <div class="p-4 border-b">
            <input type="text" id="search-input" oninput="filterCatalog()" placeholder="Cari nama barang..." class="w-full p-3 rounded-xl border outline-none focus:ring-2 focus:ring-rose-500">
        </div>
        <div id="catalog-grid" class="flex-1 overflow-y-auto p-6 grid grid-cols-2 gap-4 custom-scrollbar">
            </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzpgV1UNRgD-w1asu5dR8VjQt9GMuoPrZIaCO-VCqwBXDFOCPIc_YjUIjB5f5tZB5HrDA/exec"; // <--- GANTI INI
        let products = [], cart = [];
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));

        if(!session) window.location.replace("index.html");
        document.getElementById('u-name').innerText = session.nama;
        document.getElementById('u-role').innerText = session.role;

        window.onload = () => { fetchData(); fetchSettings(); };

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}?action=getProducts`);
                products = await res.json();
                renderCatalog(products);
            } catch(e) { console.log("Gagal muat produk"); }
        }

        async function fetchSettings() {
            try {
                const res = await fetch(`${API_URL}?action=getSettings`);
                const s = await res.json();
                window.tokoSettings = s;
            } catch(e) {}
        }

        function toggleCatalog() {
            document.getElementById('catalog-popup').classList.toggle('translate-x-full');
            document.getElementById('search-input').focus();
        }

        function renderCatalog(list) {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = list.map(p => `
                <div onclick="addToCart('${p.Barcode}')" class="bg-slate-50 p-4 rounded-2xl border hover:border-rose-500 cursor-pointer transition-all active:scale-95 group">
                    <p class="text-[8px] font-black text-slate-400 uppercase">${p.Satuan || ''}</p>
                    <h5 class="font-bold text-xs mb-2 h-8 overflow-hidden group-hover:text-rose-600">${p.Nama_Barang}</h5>
                    <p class="font-black ali-red-text">Rp ${Number(p.Harga_Jual).toLocaleString('id-ID')}</p>
                </div>
            `).join('');
        }

        function filterCatalog() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderCatalog(products.filter(p => p.Nama_Barang.toLowerCase().includes(q)));
        }

        function addToCart(bc) {
            const p = products.find(x => x.Barcode == bc);
            if (!p) return;
            const exist = cart.find(c => c.Barcode == bc);
            if (exist) exist.Qty++; else cart.push({...p, Qty: 1});
            updateUI();
            document.getElementById('barcode-scan').value = '';
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                const sub = item.Harga_Jual * item.Qty;
                total += sub;
                return `
                <div class="flex items-center justify-between py-4 border-b">
                    <div class="flex-1"><p class="font-bold text-slate-800">${item.Nama_Barang}</p><p class="text-[10px] text-slate-400">${item.Barcode}</p></div>
                    <div class="w-24 text-center text-sm">Rp ${Number(item.Harga_Jual).toLocaleString('id-ID')}</div>
                    <div class="w-16 text-center font-bold">x${item.Qty}</div>
                    <div class="w-28 text-right font-black ali-red-text">Rp ${sub.toLocaleString('id-ID')}</div>
                    <button onclick="removeFromCart(${i})" class="ml-4 text-slate-300 hover:text-rose-600 text-xl">×</button>
                </div>`;
            }).join('');
            document.getElementById('total-display').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            calculateChange();
        }

        function calculateChange() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value || 0;
            const change = cash - total;
            document.getElementById('change-display').innerText = `Rp ${change >= 0 ? change.toLocaleString('id-ID') : 0}`;
        }

        async function processCheckout() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value;
            if (cart.length === 0 || cash < total) return alert("Periksa belanjaan/uang!");

            document.getElementById('btn-pay').innerText = "PROSES...";
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveTransaction', admin: session.nama, cart: cart }) });
                alert("Transaksi Berhasil!");
                cart = []; updateUI(); document.getElementById('cash-in').value = '';
                fetchData(); // Refresh stok
            } catch(e) { alert("Gagal Simpan"); }
            document.getElementById('btn-pay').innerText = "SELESAI & CETAK";
        }

        document.getElementById('barcode-scan').onkeypress = (e) => { if(e.key === 'Enter') addToCart(e.target.value); };
        function removeFromCart(i) { cart.splice(i, 1); updateUI(); }
        function clearCart() { cart = []; updateUI(); }
        function logout() { sessionStorage.clear(); window.location.replace("index.html"); }
    </script>
</body>
</html>
