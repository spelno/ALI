<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI - POS System Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .ali-red { background-color: #e11d48; }
        .ali-red-text { color: #e11d48; }
        
        @media print {
            body > *:not(#print-receipt) { display: none !important; }
            #print-receipt { display: block !important; position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 10px; background: white; color: black; }
        }

        #print-receipt { display: none; }
        .cart-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 50px; align-items: center; border-bottom: 1px solid #f1f5f9; padding: 1.2rem 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #catalog-popup { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="main-app" class="flex flex-1 overflow-hidden transition-opacity duration-500">
        
        <aside class="w-20 bg-white border-r border-slate-200 flex flex-col items-center py-8 gap-8 shadow-sm">
            <div class="text-xl font-black ali-red-text italic mb-4">ALI</div>
            <button onclick="toggleCatalog()" class="p-4 rounded-2xl bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white transition-all group" title="Buka Katalog">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <button onclick="window.location.href='admin.html'" class="p-4 rounded-2xl bg-slate-50 text-slate-500 hover:bg-rose-500 hover:text-white transition-all" title="Cek Stok">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </button>
            <button onclick="logout()" class="mt-auto p-4 text-slate-300 hover:text-rose-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
            </button>
        </aside>

        <main class="flex-1 flex flex-col p-8 overflow-hidden bg-[#f8fafc]">
            <header class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-4xl font-black text-slate-800 uppercase italic tracking-tighter">KERANJANG BELANJA</h2>
                    <p class="text-slate-400 font-bold text-xs uppercase tracking-widest"><span id="u-name">-</span> | <span id="u-role">-</span></p>
                </div>
                <button onclick="clearCart()" class="text-xs font-black text-slate-400 hover:text-rose-600 uppercase tracking-widest transition-colors">Kosongkan List</button>
            </header>

            <div class="flex-1 bg-white rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                <div class="cart-row px-10 bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <span>Nama Produk</span>
                    <span class="text-center">Harga</span>
                    <span class="text-center">Qty</span>
                    <span class="text-right">Total</span>
                    <span></span>
                </div>
                <div id="cart-list" class="flex-1 overflow-y-auto px-10 custom-scrollbar">
                    </div>
                <div class="p-6 bg-slate-50 border-t border-slate-200">
                    <input type="text" id="barcode-scan" autofocus placeholder="INPUT BARCODE DISINI..." class="w-full bg-white border-2 border-slate-200 rounded-2xl py-5 px-10 text-2xl font-black ali-red-text focus:border-rose-500 outline-none shadow-inner tracking-widest uppercase">
                </div>
            </div>
        </main>

        <aside class="w-[420px] bg-white border-l border-slate-200 p-10 flex flex-col shadow-[-10px_0_30px_rgba(0,0,0,0.02)]">
            <div class="text-center mb-12">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Total Pembayaran</p>
                <h1 id="total-display" class="text-6xl font-black ali-red-text tracking-tighter">Rp 0</h1>
            </div>

            <div class="space-y-6 flex-1 flex flex-col">
                <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-4">Uang Tunai (Rp)</label>
                    <input type="number" id="cash-in" onkeyup="calculateChange()" placeholder="0" class="w-full bg-transparent text-4xl font-black text-slate-800 outline-none border-b-2 border-slate-200 focus:border-rose-500 transition-all mb-4">
                    <div class="flex justify-between items-center text-emerald-600 font-bold">
                        <span class="text-[10px] uppercase">Kembalian</span>
                        <span id="change-display" class="text-xl font-black">Rp 0</span>
                    </div>
                </div>

                <button onclick="processCheckout()" id="btn-pay" class="w-full ali-red hover:bg-rose-700 text-white font-black py-8 rounded-[2.2rem] text-2xl shadow-xl shadow-rose-600/30 transition-all active:scale-95 mt-auto">
                    SELESAI & CETAK
                </button>
            </div>
        </aside>
    </div>

    <div id="catalog-popup" class="fixed top-0 right-0 w-[550px] h-full bg-white z-[500] shadow-[-30px_0_60px_rgba(0,0,0,0.1)] translate-x-full flex flex-col">
        <header class="p-8 border-b flex justify-between items-center">
            <h3 class="text-xl font-black italic uppercase tracking-tight">Katalog Produk</h3>
            <button onclick="toggleCatalog()" class="p-3 bg-slate-100 rounded-full hover:bg-rose-500 hover:text-white transition-all">✕</button>
        </header>
        <div class="p-6 bg-slate-50 border-b">
            <input type="text" id="search-input" onkeyup="filterSearch()" placeholder="Cari nama barang..." class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-rose-500">
        </div>
        <div id="catalog-grid" class="flex-1 overflow-y-auto p-6 grid grid-cols-2 gap-4 custom-scrollbar"></div>
    </div>

    <div id="print-receipt" class="font-mono text-[11px]">
        <center>
            <h2 id="st-nama" style="font-size:15px; font-weight:bold;"></h2>
            <p id="st-alamat" style="margin:0;"></p>
            <p id="st-telp" style="margin:0;"></p>
            <p>===============================</p>
        </center>
        <div id="print-items"></div>
        <p>===============================</p>
        <div id="print-totals"></div>
        <center><p id="st-footer" style="margin-top:20px;"></p></center>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxrJ3CEUi6noMxD-7dDdPieSNHg_1pcvG-V37rpQsGzv8itNAOus2x_hICslTeHXJx3aA/exec"; 
        let products = [];
        let cart = [];
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));

        if(!session) window.location.replace("index.html");
        document.getElementById('u-name').innerText = session.nama;
        document.getElementById('u-role').innerText = session.role;

        async function init() {
            await fetchSettings();
            await fetchData();
        }

        async function fetchSettings() {
            const res = await fetch(`${API_URL}?action=getSettings`);
            const s = await res.json();
            document.getElementById('st-nama').innerText = s.Nama_Toko || "ALI POS";
            document.getElementById('st-alamat').innerText = s.Alamat_Toko || "";
            document.getElementById('st-telp').innerText = s.Telepon || "";
            document.getElementById('st-footer').innerText = s.Pesan_Kaki || "Terima Kasih";
        }

        async function fetchData() {
            const res = await fetch(`${API_URL}?action=getProducts`);
            products = await res.json();
            renderCatalog(products);
        }

        function toggleCatalog() {
            const el = document.getElementById('catalog-popup');
            el.classList.toggle('translate-x-full');
            document.getElementById('search-input').focus();
        }

        function renderCatalog(list) {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = list.map(p => `
                <div onclick="addToCart('${p.Barcode}')" class="bg-slate-50 p-5 rounded-2xl border border-slate-100 hover:border-rose-500 cursor-pointer shadow-sm transition-all active:scale-95">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">${p.Satuan}</p>
                    <h5 class="font-bold text-slate-800 text-xs mb-3 h-8 overflow-hidden">${p.Nama_Barang}</h5>
                    <p class="font-black ali-red-text text-sm">Rp ${Number(p.Harga_Jual).toLocaleString()}</p>
                </div>`).join('');
        }

        function addToCart(bc) {
            const p = products.find(x => x.Barcode == bc);
            if (!p) return;
            const exist = cart.find(c => c.Barcode == bc);
            if (exist) { exist.Qty++; } else { cart.push({...p, Qty: 1}); }
            updateUI();
            document.getElementById('barcode-scan').value = '';
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                const sub = item.Harga_Jual * item.Qty;
                total += sub;
                return `
                <div class="cart-row text-sm font-bold text-slate-700">
                    <span class="flex flex-col"><span class="text-slate-900">${item.Nama_Barang}</span><span class="text-[9px] text-slate-400 uppercase">${item.Barcode}</span></span>
                    <span class="text-center text-slate-400">Rp ${Number(item.Harga_Jual).toLocaleString()}</span>
                    <span class="text-center">${item.Qty}</span>
                    <span class="text-right ali-red-text">Rp ${sub.toLocaleString()}</span>
                    <button onclick="removeFromCart(${i})" class="text-slate-300 hover:text-rose-600 font-bold text-lg">×</button>
                </div>`;
            }).join('');
            document.getElementById('total-display').innerText = `Rp ${total.toLocaleString()}`;
            calculateChange();
        }

        function calculateChange() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value || 0;
            const change = cash - total;
            document.getElementById('change-display').innerText = `Rp ${change >= 0 ? change.toLocaleString() : 0}`;
        }

        async function processCheckout() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value;
            if (cart.length === 0 || cash < total) return alert("Cek keranjang/uang!");

            // ISI DATA KE STRUK SEBELUM PRINT
            document.getElementById('print-items').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between"><span>${i.Nama_Barang} x${i.Qty}</span><span>${(i.Qty*i.Harga_Jual).toLocaleString()}</span></div>`).join('');
            document.getElementById('print-totals').innerHTML = `<div style="display:flex; justify-content:space-between; font-weight:bold"><span>TOTAL</span><span>Rp ${total.toLocaleString()}</span></div>`;
            
            window.print();
            cart = []; updateUI(); document.getElementById('cash-in').value = '';
        }

        document.getElementById('barcode-scan').onkeypress = (e) => { if(e.key === 'Enter') addToCart(e.target.value); };
        function filterSearch() {
            const v = document.getElementById('search-input').value.toLowerCase();
            renderCatalog(products.filter(p => p.Nama_Barang.toLowerCase().includes(v)));
        }
        function removeFromCart(i) { cart.splice(i, 1); updateUI(); }
        function clearCart() { cart = []; updateUI(); }
        function logout() { sessionStorage.clear(); window.location.replace("index.html"); }

        init();
    </script>
</body>
</html>
