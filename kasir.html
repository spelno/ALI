<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Kasir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow: hidden; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        #catalog-panel { transition: 0.4s; width: 0; opacity: 0; }
        #catalog-panel.open { width: 400px; opacity: 1; border-left: 2px solid #e2e8f0; }
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 100% !important; }
        }
    </style>
</head>
<body class="h-screen flex">
    <aside class="w-20 bg-white border-r flex flex-col items-center py-8 gap-10 z-[100]">
        <div class="w-12 h-12 ali-gradient rounded-2xl flex items-center justify-center text-white font-black italic shadow-lg">A</div>
        <button onclick="toggleCatalog()" class="p-4 rounded-2xl text-slate-400 hover:bg-slate-100 hover:text-rose-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
        </button>
        <button onclick="location.reload()" class="mt-auto p-4 text-rose-500 font-black text-[10px] uppercase italic">Keluar</button>
    </aside>

    <main class="flex-1 flex flex-col p-8 bg-slate-50">
        <header class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-black text-slate-800 uppercase italic tracking-tighter">Shopping <span class="text-rose-600">Cart</span></h2>
            <div id="cashier-display" class="px-4 py-2 rounded-full bg-white shadow-sm text-[10px] font-black uppercase border italic text-rose-600">...</div>
        </header>

        <input type="text" id="barcode-scan" onkeydown="handleBarcode(event)" placeholder="Scan Barcode / Cari Nama..." 
            class="w-full p-6 bg-white border-2 border-slate-100 rounded-[2rem] font-bold text-xl outline-none focus:border-rose-500 shadow-sm mb-6">

        <div id="cart-list" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>

        <div class="mt-8 p-10 bg-white rounded-[3rem] shadow-2xl flex justify-between items-center border border-slate-100">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1 italic">Total Tagihan</p>
                <p id="total-amount" class="text-5xl font-black italic text-rose-600 tracking-tighter">Rp 0</p>
            </div>
            <button onclick="openPaymentModal()" class="ali-gradient text-white px-16 py-6 rounded-[2rem] font-black uppercase italic shadow-xl text-lg">Bayar (F9)</button>
        </div>
    </main>

    <section id="catalog-panel" class="bg-white flex flex-col h-screen overflow-hidden">
        <div class="p-8 border-b flex justify-between items-center">
            <h3 class="font-black uppercase italic text-slate-800">Katalog</h3>
            <button onclick="toggleCatalog()">✕</button>
        </div>
        <div id="catalog-grid" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    </section>

    <div id="modal-pay" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[200] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-10 rounded-[4rem] shadow-2xl space-y-6">
            <div class="text-center"><h2 id="pay-total-display" class="text-4xl font-black text-slate-800 italic">Rp 0</h2></div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="setMethod('Tunai')" id="btn-cash" class="p-4 border-2 rounded-2xl font-black text-[10px] uppercase italic active border-rose-600 text-rose-600 bg-rose-50">💵 Tunai</button>
                <button onclick="setMethod('QRIS')" id="btn-qris" class="p-4 border-2 rounded-2xl font-black text-[10px] uppercase italic">📱 QRIS</button>
            </div>
            <div id="cash-section" class="space-y-4">
                <input type="number" id="input-cash" oninput="calcChange()" placeholder="Jumlah Uang" class="w-full p-6 bg-slate-50 border-2 rounded-[2.5rem] text-3xl font-black text-emerald-600 text-center outline-none">
                <div class="bg-rose-50 p-6 rounded-[2.5rem] text-center"><h3 id="txt-change" class="text-3xl font-black text-rose-600 italic">Rp 0</h3></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closePaymentModal()" class="py-5 text-slate-400 font-black uppercase text-[10px]">Batal</button>
                <button onclick="submitTransaction()" id="btn-finish" class="ali-gradient py-5 text-white rounded-[2rem] font-black uppercase italic shadow-lg">Selesaikan</button>
            </div>
        </div>
    </div>

    <div id="modal-receipt" onclick="location.reload()" class="hidden fixed inset-0 bg-slate-900/95 z-[300] flex items-center justify-center p-6 cursor-pointer overflow-y-auto">
        <div id="receipt-print-area" class="bg-white p-8 font-mono text-[11px] text-slate-800 shadow-2xl">
            <div class="text-center mb-4">
                <h2 class="font-bold text-lg uppercase" id="r-store-name">...</h2>
                <p id="r-address" class="leading-tight">...</p>
                <div class="border-b border-dashed my-4 border-slate-300"></div>
            </div>
            <div class="flex justify-between"><span>Inv:</span><span id="r-inv" class="font-bold"></span></div>
            <div class="flex justify-between mb-4"><span>Kasir:</span><span id="r-cashier"></span></div>
            <div id="r-items" class="space-y-2 mb-4 border-t border-dashed pt-4 border-slate-300"></div>
            <div class="border-t border-dashed mb-4 border-slate-300 pt-4">
                <div class="flex justify-between font-bold text-sm"><span>TOTAL:</span><span id="r-total"></span></div>
                <div class="flex justify-between"><span>METODE:</span><span id="r-method"></span></div>
            </div>
            <div class="text-center italic mt-6 border-t border-dashed pt-4 border-slate-300" id="r-footer">...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1EKtMiInb5-NqqoaOJzPzNcSRhLmgcfWqmQfIPQkamq1yWUym8aeBv2WvWQyz_NDnLw/exec"; 
        let products = [], cart = [], storeSettings = {}, currentMethod = "Tunai";
        let session = JSON.parse(localStorage.getItem('ali_session')) || {nama: "Staff"};

        window.onload = async () => {
            document.getElementById('cashier-display').innerText = "Kasir: " + session.nama;
            await Promise.all([loadSettings(), loadProducts()]);
            document.getElementById('barcode-scan').focus();
        };

        async function loadSettings() {
            const res = await fetch(SCRIPT_URL + "?action=settings");
            storeSettings = await res.json();
            document.getElementById('receipt-print-area').style.width = (storeSettings.Lebar_Kertas || 58) + "mm";
        }

        async function loadProducts() {
            const res = await fetch(SCRIPT_URL + "?action=products");
            products = await res.json();
            renderCatalog(products);
        }

        function handleBarcode(e) {
            if (e.key === "Enter") {
                const val = e.target.value.toLowerCase();
                const p = products.find(i => i.Barcode == val || i.Nama_Barang.toLowerCase().includes(val));
                if (p) { addItem(p); e.target.value = ""; }
            }
        }

        function addItem(p) {
            const exist = cart.find(i => i.Barcode == p.Barcode);
            if (exist) exist.Qty++; else cart.push({ ...p, Qty: 1 });
            renderCart();
        }

        function renderCart() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            document.getElementById('total-amount').innerText = "Rp " + total.toLocaleString();
            document.getElementById('cart-list').innerHTML = cart.map((item, idx) => `
                <div class="flex justify-between items-center bg-white p-6 rounded-[2.5rem] border">
                    <div class="flex gap-4 items-center">
                        <div class="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl flex items-center justify-center font-black">${item.Qty}</div>
                        <p class="font-black uppercase italic text-xs">${item.Nama_Barang}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black italic">Rp ${(item.Harga_Jual * item.Qty).toLocaleString()}</span>
                        <button onclick="cart.splice(${idx},1);renderCart()" class="text-slate-300 hover:text-rose-500">✕</button>
                    </div>
                </div>`).join('');
        }

        function setMethod(m) {
            currentMethod = m;
            document.getElementById('cash-section').classList.toggle('hidden', m === 'QRIS');
            document.querySelectorAll('#modal-pay button').forEach(b => b.classList.remove('border-rose-600', 'text-rose-600', 'bg-rose-50'));
            event.target.classList.add('border-rose-600', 'text-rose-600', 'bg-rose-50');
        }

        async function submitTransaction() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('input-cash').value || 0;
            if (currentMethod === 'Tunai' && cash < total) return alert("Uang Kurang!");

            document.getElementById('btn-finish').innerText = "PROSES...";
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "saveTransaction", cart: cart, cashierName: session.nama, method: currentMethod })
            });
            const r = await res.json();
            if(r.status === "success") showReceipt(r.invoice, total, cash);
        }

        function showReceipt(inv, total, cash) {
            document.getElementById('modal-pay').classList.add('hidden');
            document.getElementById('modal-receipt').classList.remove('hidden');
            document.getElementById('r-store-name').innerText = storeSettings.Nama_Toko;
            document.getElementById('r-address').innerText = storeSettings.Alamat_Toko;
            document.getElementById('r-footer').innerText = storeSettings.Footer_Struk;
            document.getElementById('r-inv').innerText = inv;
            document.getElementById('r-cashier').innerText = session.nama;
            document.getElementById('r-method').innerText = currentMethod;
            document.getElementById('r-total').innerText = "Rp " + total.toLocaleString();
            document.getElementById('r-items').innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.Nama_Barang} x${i.Qty}</span><span>${(i.Harga_Jual * i.Qty).toLocaleString()}</span></div>`).join('');
            setTimeout(() => { window.print(); }, 500);
        }

        function renderCatalog(d) {
            document.getElementById('catalog-grid').innerHTML = d.map(p => `
                <div onclick='addItem(${JSON.stringify(p)})' class="p-5 bg-slate-50 rounded-3xl border-2 border-transparent hover:border-rose-500 cursor-pointer">
                    <p class="font-black text-xs uppercase italic">${p.Nama_Barang}</p>
                    <p class="text-[10px] font-bold text-slate-400 mt-1">Rp ${p.Harga_Jual.toLocaleString()}</p>
                </div>`).join('');
        }

        function toggleCatalog() { document.getElementById('catalog-panel').classList.toggle('open'); }
        function openPaymentModal() {
            if(!cart.length) return;
            document.getElementById('pay-total-display').innerText = document.getElementById('total-amount').innerText;
            document.getElementById('modal-pay').classList.remove('hidden');
            document.getElementById('input-cash').focus();
        }
        function closePaymentModal() { document.getElementById('modal-pay').classList.add('hidden'); }
        function calcChange() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('input-cash').value || 0;
            document.getElementById('txt-change').innerText = "Rp " + Math.max(0, cash - total).toLocaleString();
        }
    </script>
</body>
</html>
