<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System - Notes of OD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; padding: 14px; border-radius: 12px; color: #94a3b8; transition: 0.2s; }
        .nav-btn:hover { background: #f1f5f9; color: #e11d48; }
        .nav-active { background: #e11d48 !important; color: white !important; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .thermal-font { font-family: 'Courier New', Courier, monospace; line-height: 1.2; }
    </style>
</head>
<body class="h-screen flex overflow-hidden" onclick="closeReceipt()">

    <aside class="w-20 bg-white border-r flex flex-col items-center py-8 gap-4 z-50 shadow-sm" onclick="event.stopPropagation()">
        <div class="font-black text-rose-600 mb-8 text-xl italic tracking-tighter uppercase">OD</div>
        <nav class="flex flex-col gap-4 w-full px-2">
            <button onclick="switchMainView('pos')" id="tab-pos" class="nav-btn nav-active">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="text-[8px] font-bold mt-1 uppercase tracking-tighter text-center leading-none">Katalog</span>
            </button>
            <button onclick="switchMainView('inventory')" id="tab-inventory" class="nav-btn">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                <span class="text-[8px] font-bold mt-1 uppercase tracking-tighter text-center leading-none">Stok</span>
            </button>
        </nav>
        <button onclick="logout()" class="mt-auto nav-btn hover:text-rose-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-8 overflow-hidden bg-white relative" onclick="event.stopPropagation()">
        
        <div id="view-pos" class="flex flex-col h-full">
            <header class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-extrabold tracking-tighter text-slate-800 uppercase italic">Katalog Belanja</h2>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Total Tagihan</p>
                    <h1 id="total-display" class="text-5xl font-black text-rose-600 tracking-tighter">Rp 0</h1>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto custom-scrollbar border-y border-slate-50 py-4" id="cart-list"></div>
            
            <div class="mt-8 grid grid-cols-12 gap-4">
                <div class="col-span-8">
                    <input type="text" id="barcode-scan" onkeypress="handleManualInput(event)" autofocus placeholder="SCAN BARCODE..." class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-5 px-8 text-2xl font-bold text-rose-600 outline-none focus:border-rose-500 transition-all shadow-sm">
                </div>
                <div class="col-span-4 bg-slate-50 rounded-2xl border border-slate-100 px-6 flex flex-col justify-center shadow-sm">
                    <span class="text-[9px] font-bold text-slate-400 uppercase">Tunai Pelanggan</span>
                    <input type="number" id="cash-in" oninput="calculateChange()" class="bg-transparent font-bold text-xl outline-none w-full text-slate-700" placeholder="0">
                </div>
            </div>

            <div class="mt-4 flex justify-between items-center bg-slate-50 p-6 rounded-2xl border border-slate-100">
                <div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kembalian</span>
                    <span id="change-display" class="text-2xl font-black text-emerald-500 block italic">Rp 0</span>
                </div>
                <button onclick="handleTransaction()" id="btn-pay" class="bg-rose-600 text-white font-black px-12 py-5 rounded-2xl shadow-lg hover:bg-rose-700 active:scale-95 transition-all uppercase text-lg italic tracking-tighter">Selesaikan Transaksi</button>
            </div>
        </div>

        <div id="view-inventory" class="hidden flex flex-col h-full bg-white">
            <header class="mb-6 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-extrabold tracking-tighter text-slate-800 uppercase italic">Inventory</h2>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Cek Stok Barang</p>
                </div>
                <div class="w-80">
                    <input type="text" id="search-inventory" oninput="filterInventory()" placeholder="Cari nama atau barcode..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3 px-6 text-sm font-semibold outline-none focus:border-rose-500 shadow-sm">
                </div>
            </header>
            <div class="flex-1 overflow-y-auto border border-slate-100 rounded-3xl custom-scrollbar shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 sticky top-0 z-10">
                        <tr class="border-b border-slate-100">
                            <th class="p-5 font-bold text-slate-400 uppercase text-[10px]">Barcode</th>
                            <th class="p-5 font-bold text-slate-400 uppercase text-[10px]">Produk</th>
                            <th class="p-5 font-bold text-slate-400 uppercase text-[10px] text-center">Stok</th>
                            <th class="p-5 font-bold text-slate-400 uppercase text-[10px] text-right">Harga</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <aside id="panel-catalog-aside" class="w-[340px] bg-white border-l flex flex-col overflow-hidden transition-all duration-300" onclick="event.stopPropagation()">
        <div class="p-6 border-b"><h3 class="font-bold text-xs uppercase tracking-widest text-slate-400 italic">Quick Access</h3></div>
        <div id="catalog-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3 custom-scrollbar bg-slate-50/30"></div>
    </aside>

    <div id="receipt-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[200] items-center justify-center p-4 cursor-pointer">
        <div class="bg-white w-[300px] p-6 shadow-2xl thermal-font text-slate-800 cursor-default" onclick="event.stopPropagation()" id="thermal-paper">
            <div id="receipt-content"></div>
            <div class="mt-8 border-t border-dashed border-slate-300 pt-4 text-center">
                <p id="footer-setting" class="text-[10px] uppercase font-bold tracking-widest">TERIMA KASIH</p>
                <p class="text-[9px] mt-2 text-slate-400 tracking-tighter leading-none italic">Klik dimana saja untuk kembali ke kasir</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbycvAdLRpd9bIM3KL4-5ZeW6660B8wcu072SXflpOUfIAcYL8gqg9KTKUMrtZsoiVTUZA/exec"; 
        let products = [], cart = [], settings = {};

        window.onload = async () => {
            await fetchSettings();
            await fetchData();
        };

        async function fetchSettings() {
            try {
                const res = await fetch(`${API_URL}?action=getSettings`);
                settings = await res.json(); // Format: { storeName: "B&B Comfort", address: "Bitung", footer: "Barang tidak dapat ditukar" }
            } catch (e) { console.error("Settings fail"); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}?action=getProducts`);
                products = await res.json();
                renderCatalog(); 
                renderInventory();
            } catch (e) { console.error("Data fail"); }
        }

        function switchMainView(view) {
            document.getElementById('view-pos').classList.toggle('hidden', view !== 'pos');
            document.getElementById('view-inventory').classList.toggle('hidden', view !== 'inventory');
            document.getElementById('panel-catalog-aside').classList.toggle('hidden', view === 'inventory');
            
            document.getElementById('tab-pos').className = view === 'pos' ? 'nav-btn nav-active' : 'nav-btn';
            document.getElementById('tab-inventory').className = view === 'inventory' ? 'nav-btn nav-active' : 'nav-btn';
            
            if(view === 'pos') setTimeout(() => document.getElementById('barcode-scan').focus(), 100);
        }

        function handleManualInput(e) { if(e.key === 'Enter') { addToCart(e.target.value); e.target.value = ''; } }

        function addToCart(bc) {
            const p = products.find(x => x.Barcode.toString() === bc.toString());
            if(!p) return;
            const existing = cart.find(c => c.Barcode.toString() === bc.toString());
            if(existing) { existing.Qty += 1; } else { cart.push({...p, Qty: 1}); }
            updateUI();
            if(document.getElementById('view-pos').classList.contains('hidden')) switchMainView('pos');
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                const sub = item.Harga_Jual * item.Qty; total += sub;
                return `<div class="flex justify-between items-center py-4 px-2 group hover:bg-slate-50 rounded-xl transition-all">
                    <div class="flex-1 leading-tight"><p class="font-bold text-slate-800 text-sm uppercase">${item.Nama_Barang}</p><p class="text-[9px] text-slate-300 font-bold tracking-widest">${item.Barcode}</p></div>
                    <div class="flex items-center gap-6"><span class="font-black text-slate-300 italic">x${item.Qty}</span><span class="font-bold text-rose-600 w-24 text-right italic">Rp ${sub.toLocaleString()}</span><button onclick="removeItem(${idx})" class="text-slate-200 hover:text-rose-500">✕</button></div>
                </div>`;
            }).join('');
            document.getElementById('total-display').innerText = `Rp ${total.toLocaleString()}`;
            calculateChange();
        }

        function removeItem(i) { cart.splice(i, 1); updateUI(); }

        function calculateChange() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value || 0;
            document.getElementById('change-display').innerText = `Rp ${Math.max(0, cash - total).toLocaleString()}`;
        }

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = products.map(p => `
                <button onclick="addToCart('${p.Barcode}')" class="p-4 bg-white border border-slate-100 rounded-2xl text-left hover:border-rose-500 transition-all shadow-sm group">
                    <p class="font-bold text-slate-800 text-[10px] uppercase leading-tight h-8 overflow-hidden mb-1 group-hover:text-rose-600">${p.Nama_Barang}</p>
                    <p class="text-rose-600 font-black text-[11px] italic">Rp ${p.Harga_Jual.toLocaleString()}</p>
                </button>
            `).join('');
        }

        function renderInventory(data = products) {
            const body = document.getElementById('inventory-table-body');
            body.innerHTML = data.map(p => `<tr class="hover:bg-slate-50 transition-colors"><td class="p-5 text-[10px] font-bold text-slate-400 tracking-wider">${p.Barcode}</td><td class="p-5 font-bold text-slate-700 uppercase text-xs">${p.Nama_Barang}</td><td class="p-5 text-center"><span class="px-3 py-1 ${p.Stok < 5 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'} rounded-lg font-black text-xs">${p.Stok}</span></td><td class="p-5 text-right font-bold text-slate-700 text-xs italic">Rp ${p.Harga_Jual.toLocaleString()}</td></tr>`).join('');
        }

        function filterInventory() {
            const val = document.getElementById('search-inventory').value.toLowerCase();
            const filtered = products.filter(p => p.Nama_Barang.toLowerCase().includes(val) || p.Barcode.toString().includes(val));
            renderInventory(filtered);
        }

        async function handleTransaction() {
            if (cart.length === 0) return;
            const btn = document.getElementById('btn-pay');
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value || 0;
            const change = Math.max(0, cash - total);

            btn.disabled = true; btn.innerText = "MENYIMPAN...";
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "saveTransaction", cart: cart, method: "Cash", admin: "OD" }) 
                });
                const result = await res.json();
                if (result.status === "success") {
                    const d = { invoice: result.invoice, items: [...cart], total, cash, change, date: new Date().toLocaleString('id-ID') };
                    showThermalReceipt(d);
                    cart = []; updateUI(); document.getElementById('cash-in').value = '';
                    fetchData();
                }
            } catch (e) { alert("Koneksi Error"); }
            finally { btn.disabled = false; btn.innerText = "Selesaikan Transaksi"; }
        }

        function showThermalReceipt(d) {
            const modal = document.getElementById('receipt-modal');
            const storeName = settings.storeName || "Notes of OD";
            const address = settings.address || "Bitung, Sulawesi Utara";
            const footer = settings.footer || "TERIMA KASIH";
            
            document.getElementById('footer-setting').innerText = footer;
            document.getElementById('receipt-content').innerHTML = `
                <div class="text-center mb-4">
                    <p class="font-black text-xl italic uppercase">${storeName}</p>
                    <p class="text-[9px] uppercase tracking-tighter">${address}</p>
                    <p class="text-[9px] mt-1 tracking-tighter italic">No: ${d.invoice}</p>
                </div>
                <div class="text-[10px] space-y-1 mb-4">
                    <p class="flex justify-between"><span>Tgl:</span> <span>${d.date}</span></p>
                    <p class="flex justify-between"><span>Admin:</span> <span>OD</span></p>
                    <p class="border-t border-dashed border-slate-300 mt-2"></p>
                </div>
                <div class="text-[11px] space-y-2 mb-4">
                    ${d.items.map(i => `
                        <div>
                            <p class="uppercase font-bold">${i.Nama_Barang}</p>
                            <div class="flex justify-between text-[10px] italic">
                                <span>${i.Qty} x ${i.Harga_Jual.toLocaleString()}</span>
                                <span>${(i.Qty*i.Harga_Jual).toLocaleString()}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="border-t border-dashed border-slate-300 pt-3 space-y-1 text-[11px]">
                    <p class="flex justify-between font-black"><span>TOTAL</span> <span>Rp ${d.total.toLocaleString()}</span></p>
                    <p class="flex justify-between"><span>TUNAI</span> <span>Rp ${Number(d.cash).toLocaleString()}</span></p>
                    <p class="flex justify-between font-bold text-emerald-600"><span>KEMBALI</span> <span>Rp ${d.change.toLocaleString()}</span></p>
                </div>
            `;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { window.print(); }, 500);
        }

        function closeReceipt() { 
            const m = document.getElementById('receipt-modal');
            if (!m.classList.contains('hidden')) { m.classList.add('hidden'); m.classList.remove('flex'); }
        }

        function logout() { window.location.replace("index.html"); }
    </script>
</body>
</html>
