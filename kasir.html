<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALI POS - Kasir Terminal</title>
    
    <script>
        (function() {
            // Ambil "Kunci" dari index.html
            const sessionData = sessionStorage.getItem('ali_session_v4');
            
            // PROTEKSI KETAT: Jika kunci tidak ada, langsung tendang ke login
            if (!sessionData) {
                window.location.replace("index.html");
                return;
            }

            // Simpan data user ke variabel global agar bisa dipakai di struk/transaksi
            window.currentUser = JSON.parse(sessionData);
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .pos-grid { display: grid; grid-template-columns: 1fr 380px; height: 100vh; }
        @media (max-width: 1024px) { .pos-grid { grid-template-columns: 1fr; } .cart-panel { display: none; } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="pos-grid">
        <main class="flex flex-col p-6 overflow-hidden">
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">ALI <span class="text-rose-600">KASIR</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Aktif: <span id="nama-admin" class="text-rose-500 italic">---</span></p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="barcode-input" placeholder="Scan Barcode / Cari..." class="bg-white border border-slate-200 px-4 py-3 rounded-xl text-sm font-bold w-64 focus:ring-2 focus:ring-rose-500 outline-none">
                    <button onclick="logout()" class="p-3 bg-white border border-slate-200 rounded-xl hover:bg-rose-50 text-slate-400 hover:text-rose-600 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </header>

            <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 overflow-y-auto custom-scroll pr-2 pb-20">
                <div class="p-10 text-center col-span-full opacity-20 italic">Memuat data produk...</div>
            </div>
        </main>

        <aside class="cart-panel bg-white border-l border-slate-200 flex flex-col p-6 shadow-2xl">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 italic">Keranjang Belanja</h3>
            
            <div id="cart-items" class="flex-1 overflow-y-auto custom-scroll space-y-4 mb-6 pr-2">
                </div>

            <div class="border-t border-dashed border-slate-200 pt-6 space-y-3">
                <div class="flex justify-between text-slate-400 font-bold text-sm">
                    <span>Subtotal</span>
                    <span id="subtotal">Rp 0</span>
                </div>
                <div class="flex justify-between items-end pt-2">
                    <span class="text-xs font-black uppercase text-slate-900">Total Akhir</span>
                    <span id="total-tagihan" class="text-3xl font-black italic tracking-tighter text-rose-600">Rp 0</span>
                </div>
                
                <button onclick="prosesBayar()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest mt-4 hover:bg-rose-600 transition-all shadow-lg active:scale-95">
                    BAYAR SEKARANG
                </button>
            </div>
        </aside>
    </div>

    <div id="modal-bayar" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-6 z-50">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-black italic uppercase mb-6">Pilih <span class="text-rose-600">Metode Bayar</span></h2>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="finalSelesai('Cash')" class="p-4 border-2 border-slate-100 rounded-2xl font-bold hover:border-rose-500 hover:bg-rose-50 transition-all text-left flex justify-between">💵 Tunai / Cash <span>➔</span></button>
                <button onclick="finalSelesai('QRIS')" class="p-4 border-2 border-slate-100 rounded-2xl font-bold hover:border-rose-500 hover:bg-rose-50 transition-all text-left flex justify-between">📱 QRIS / E-Wallet <span>➔</span></button>
                <button onclick="finalSelesai('Transfer')" class="p-4 border-2 border-slate-100 rounded-2xl font-bold hover:border-rose-500 hover:bg-rose-50 transition-all text-left flex justify-between">🏦 Transfer Bank <span>➔</span></button>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Batal</button>
        </div>
    </div>

    <script>
        // MASUKKAN URL /exec ANDA DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbxrJ3CEUi6noMxD-7dDdPieSNHg_1pcvG-V37rpQsGzv8itNAOus2x_hICslTeHXJx3aA/exec"; 
        let cart = [];

        // 2. INISIALISASI (IDENTITAS KASIR OTOMATIS)
        window.onload = function() {
            // Tampilkan nama kasir dari hasil login index.html
            document.getElementById('nama-admin').innerText = window.currentUser.nama;
            
            // Jalankan fungsi muat produk Anda
            loadProducts();
        };

        async function loadProducts() {
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getAdminData" }) });
                const r = await res.json();
                if(r.status === "success") {
                    renderProducts(r.products);
                }
            } catch(e) { console.error("Gagal muat produk"); }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => `
                <div onclick="addToCart('${p[0]}', '${p[1]}', ${p[6]})" class="bg-white p-4 rounded-2xl border border-slate-100 hover:border-rose-300 transition-all cursor-pointer group shadow-sm">
                    <div class="w-full h-24 bg-slate-50 rounded-xl mb-3 flex items-center justify-center text-slate-300 font-bold text-[8px] uppercase">No Image</div>
                    <h4 class="font-bold text-xs text-slate-800 mb-1 leading-tight h-8 overflow-hidden">${p[1]}</h4>
                    <p class="text-rose-600 font-black text-sm italic">Rp ${p[6].toLocaleString()}</p>
                    <p class="text-[9px] text-slate-400 mt-1 uppercase font-bold">Stok: ${p[7]}</p>
                </div>
            `).join('');
        }

        function addToCart(barcode, nama, harga) {
            const index = cart.findIndex(item => item.barcode === barcode);
            if(index > -1) {
                cart[index].qty++;
            } else {
                cart.push({ barcode, nama, harga, qty: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map((item, i) => {
                total += item.harga * item.qty;
                return `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <div class="flex-1">
                        <p class="text-[10px] font-bold text-slate-800 leading-tight">${item.nama}</p>
                        <p class="text-[9px] text-rose-500 font-black italic">@ Rp ${item.harga.toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="adjustQty(${i}, -1)" class="w-6 h-6 bg-white border border-slate-200 rounded-md text-xs font-bold">-</button>
                        <span class="text-xs font-black">${item.qty}</span>
                        <button onclick="adjustQty(${i}, 1)" class="w-6 h-6 bg-white border border-slate-200 rounded-md text-xs font-bold">+</button>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('subtotal').innerText = "Rp " + total.toLocaleString();
            document.getElementById('total-tagihan').innerText = "Rp " + total.toLocaleString();
        }

        function adjustQty(index, val) {
            cart[index].qty += val;
            if(cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
        }

        function prosesBayar() {
            if(cart.length === 0) return alert("Keranjang masih kosong!");
            document.getElementById('modal-bayar').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-bayar').classList.add('hidden'); }

        async function finalSelesai(metode) {
            // Logika simpan transaksi ke Google Sheets
            // window.currentUser.nama dipakai sebagai ID Kasir
            alert("Transaksi " + metode + " Berhasil Disimpan!");
            cart = [];
            updateCartUI();
            closeModal();
        }

        // 3. FUNGSI LOGOUT (HAPUS KUNCI)
        function logout() {
            sessionStorage.removeItem('ali_session_v4');
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
