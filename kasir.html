<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Kasir Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; overflow: hidden; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .panel-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* Animasi Katalog */
        #catalog-panel { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .catalog-closed { width: 0; opacity: 0; transform: translateX(20px); pointer-events: none; }
        .catalog-open { width: 450px; opacity: 1; transform: translateX(0); }
    </style>
</head>
<body class="h-screen flex">

    <aside class="w-20 bg-white border-r flex flex-col items-center py-8 gap-10 z-[100] shadow-sm">
        <div class="w-12 h-12 ali-gradient rounded-2xl flex items-center justify-center text-white font-black italic shadow-lg">A</div>
        <nav class="flex flex-col gap-6">
            <div class="p-4 rounded-2xl bg-rose-600 text-white shadow-lg shadow-rose-200 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
            </div>
            <button onclick="toggleCatalog()" class="p-4 rounded-2xl text-slate-400 hover:bg-slate-100 hover:text-rose-600 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
            </button>
        </nav>
        <button onclick="logout()" class="mt-auto p-4 text-rose-500 font-black text-[10px] uppercase italic tracking-widest">Keluar</button>
    </aside>

    <main class="flex-1 flex flex-col p-8 bg-slate-50 relative overflow-hidden">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-black text-slate-800 uppercase italic tracking-tighter">Shopping <span class="text-rose-600">Cart</span></h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kasir: <span id="cashier-name" class="text-slate-600">...</span></p>
            </div>
            <div id="status-koneksi" class="px-4 py-2 rounded-full bg-emerald-50 text-emerald-500 text-[10px] font-black uppercase flex items-center gap-2 border border-emerald-100">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div> System Online
            </div>
        </header>

        <div class="mb-6">
            <input type="text" id="barcode-scan" onkeydown="handleBarcode(event)" placeholder="Scan Barcode di sini atau ketik manual..." 
                class="w-full p-6 bg-white border-2 border-slate-100 rounded-[2rem] font-bold text-xl outline-none focus:border-rose-500 shadow-sm transition-all text-slate-700">
        </div>

        <div class="flex-1 overflow-y-auto pr-4 custom-scrollbar space-y-3" id="cart-list">
            <div class="h-full flex flex-col items-center justify-center text-slate-300 italic opacity-50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <p>Belum ada item. Scan barang untuk memulai.</p>
            </div>
        </div>

        <div class="mt-8 p-10 bg-white rounded-[3rem] shadow-2xl flex justify-between items-center border border-slate-100">
            <div class="flex gap-12">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Item</p>
                    <p id="total-qty" class="text-2xl font-black italic">0 PCS</p>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Subtotal</p>
                    <p id="total-amount" class="text-4xl font-black italic text-rose-600 tracking-tighter">Rp 0</p>
                </div>
            </div>
            <button onclick="prosesCheckout()" class="ali-gradient text-white px-12 py-6 rounded-[2rem] font-black uppercase italic tracking-widest shadow-xl shadow-rose-200 active:scale-95 transition-all">
                Bayar Sekarang (F9)
            </button>
        </div>
    </main>

    <section id="catalog-panel" class="catalog-closed bg-white border-l shadow-2xl flex flex-col h-screen z-50">
        <div class="p-8 border-b flex justify-between items-center bg-slate-50/50">
            <h3 class="font-black uppercase italic tracking-tighter text-slate-800">Katalog <span class="text-rose-600">Produk</span></h3>
            <button onclick="toggleCatalog()" class="text-slate-400 hover:text-rose-600">✕</button>
        </div>
        
        <div class="p-6">
            <input type="text" id="search-catalog" oninput="filterKatalog()" placeholder="Cari barang..." 
                class="w-full p-4 bg-slate-100 border-none rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-rose-500/20">
        </div>

        <div id="catalog-grid" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 gap-4 custom-scrollbar">
            </div>
    </section>

    <div id="modal-struk" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[200] flex items-center justify-center">
        <div class="bg-white p-8 rounded-[3rem] w-[350px] shadow-2xl relative">
            <div id="struk-area" class="font-mono text-[12px] text-slate-800"></div>
            <button onclick="location.reload()" class="w-full mt-8 ali-gradient text-white py-5 rounded-2xl font-black uppercase italic text-xs">Selesai & Reset</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAWigC7Nut3LCbGgOFMzKAZuvQPgRs3bNEw9IGGVc2KHy5UVsK4Wttq5CQnHXyiax3BA/exec";
        let products = [];
        let cart = [];
        let session = JSON.parse(localStorage.getItem('ali_session'));

        window.onload = () => {
            if (!session) window.location.href = "index.html";
            document.getElementById('cashier-name').innerText = session.nama;
            loadProducts();
            document.getElementById('barcode-scan').focus();
        };

        // --- FUNGSI CORE ---
        async function loadProducts() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=products");
                products = await res.json();
                renderKatalog(products);
            } catch (e) { console.error("Load failed"); }
        }

        function toggleCatalog() {
            const panel = document.getElementById('catalog-panel');
            panel.classList.toggle('catalog-closed');
            panel.classList.toggle('catalog-open');
        }

        function handleBarcode(e) {
            if (e.key === "Enter") {
                const code = e.target.value;
                const p = products.find(i => i.Barcode == code);
                if (p) {
                    addItem(p);
                    e.target.value = "";
                } else {
                    alert("Barang tidak ditemukan!");
                }
            }
        }

        function addItem(product) {
            const inCart = cart.find(i => i.Barcode == product.Barcode);
            if (inCart) {
                inCart.Qty++;
            } else {
                cart.push({ ...product, Qty: 1 });
            }
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            if (cart.length === 0) {
                list.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300 italic opacity-50">Belum ada item.</div>`;
                return;
            }

            list.innerHTML = cart.map((item, idx) => `
                <div class="flex justify-between items-center bg-white p-6 rounded-[2rem] shadow-sm border border-white hover:border-rose-200 transition-all">
                    <div class="flex gap-6 items-center">
                        <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center text-rose-600 font-black italic text-xl">${item.Qty}</div>
                        <div>
                            <p class="font-black uppercase italic text-slate-800">${item.Nama_Barang}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${item.Barcode}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-8">
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Total</p>
                            <p class="font-black text-lg italic tracking-tighter">Rp ${(item.Harga_Jual * item.Qty).toLocaleString()}</p>
                        </div>
                        <button onclick="removeItem(${idx})" class="text-slate-200 hover:text-rose-500">✕</button>
                    </div>
                </div>
            `).join('');

            const totalAmount = cart.reduce((sum, i) => sum + (i.Harga_Jual * i.Qty), 0);
            const totalQty = cart.reduce((sum, i) => sum + i.Qty, 0);
            document.getElementById('total-amount').innerText = "Rp " + totalAmount.toLocaleString();
            document.getElementById('total-qty').innerText = totalQty + " PCS";
        }

        function renderKatalog(data) {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = data.map(p => `
                <div onclick="addItem(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-rose-500 cursor-pointer transition-all">
                    <p class="font-black text-xs uppercase italic text-slate-800 leading-tight">${p.Nama_Barang}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Rp ${p.Harga_Jual.toLocaleString()}</span>
                        <span class="text-[9px] font-black text-rose-500 uppercase italic">Stok: ${p.Stok}</span>
                    </div>
                </div>
            `).join('');
        }

        function filterKatalog() {
            const q = document.getElementById('search-catalog').value.toLowerCase();
            const filtered = products.filter(p => p.Nama_Barang.toLowerCase().includes(q) || p.Barcode.toString().includes(q));
            renderKatalog(filtered);
        }

        function removeItem(idx) { cart.splice(idx, 1); updateUI(); }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }
        document.onkeydown = (e) => { if(e.key === "F9") prosesCheckout(); };

        // Modul Checkout & Struk (Gunakan yang sama dengan versi sebelumnya)
        async function prosesCheckout() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, i) => sum + (i.Harga_Jual * i.Qty), 0);
            const bayar = prompt("Total: Rp " + total.toLocaleString() + "\nJumlah Bayar:");
            if (!bayar || parseInt(bayar) < total) return alert("Pembayaran kurang!");

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "saveTransaction", cart: cart, cashierName: session.nama })
                });
                const r = await res.json();
                if(r.status === "success") {
                    document.getElementById('modal-struk').classList.remove('hidden');
                    document.getElementById('struk-area').innerText = "Invoice: " + r.invoice + "\nTotal: " + total;
                    // Detail struk bisa diperpanjang sesuai kebutuhan
                }
            } catch(e) { alert("Server Error"); }
        }
    </script>
</body>
</html>
