<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .active-link { background-color: #e11d48; color: white !important; shadow: 0 10px 15px rgba(225, 29, 72, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <audio id="beep-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
    <audio id="error-sound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3" preload="auto"></audio>

    <aside class="w-20 bg-white border-r flex flex-col items-center py-10 gap-6 z-50">
        <div class="text-xl font-black text-rose-600 mb-6 italic">ALI</div>
        
        <nav class="flex flex-col gap-4">
            <button onclick="window.location.href='admin.html'" class="p-4 rounded-2xl text-slate-400 hover:bg-slate-50 transition-all" title="Dashboard">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </button>
            <button class="active-link p-4 rounded-2xl shadow-lg shadow-rose-100" title="Kasir">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            </button>
            <button onclick="toggleCatalog()" class="p-4 rounded-2xl text-slate-400 hover:bg-slate-50 transition-all" title="Katalog">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <button onclick="window.location.href='inventory.html'" class="p-4 rounded-2xl text-slate-400 hover:bg-slate-50 transition-all" title="Inventory">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </button>
        </nav>

        <button onclick="logout()" class="mt-auto p-4 text-slate-300 hover:text-rose-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-8 overflow-hidden">
        <header class="flex justify-between items-end mb-8">
            <h2 class="text-4xl font-black text-slate-800 tracking-tighter">KERANJANG</h2>
            <button onclick="clearCart()" class="text-xs font-bold text-slate-400 hover:text-rose-600 uppercase tracking-widest">Reset List</button>
        </header>

        <div class="flex-1 bg-white rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            <div id="cart-list" class="flex-1 overflow-y-auto p-10 custom-scrollbar"></div>
            <div class="p-6 bg-slate-50 border-t">
                <input type="text" id="barcode-scan" onkeypress="handleManualInput(event)" autofocus placeholder="SCAN BARCODE..." class="w-full bg-white border-2 border-slate-200 rounded-2xl py-5 px-10 text-2xl font-black text-rose-600 focus:border-rose-500 outline-none shadow-inner transition-all">
            </div>
        </div>
    </main>

    <aside class="w-96 bg-white border-l p-10 flex flex-col shadow-lg overflow-y-auto custom-scrollbar">
        <div class="mb-10 text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Belanja</p>
            <h1 id="total-display" class="text-5xl font-black text-rose-600 tracking-tighter italic">Rp 0</h1>
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Metode Bayar</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setMethod('Cash')" id="m-cash" class="py-4 rounded-xl border-2 border-rose-500 bg-rose-50 text-rose-600 font-bold text-[10px]">CASH</button>
                    <button onclick="setMethod('Transfer')" id="m-transfer" class="py-4 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-[10px]">TF</button>
                    <button onclick="setMethod('QRIS')" id="m-qris" class="py-4 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-[10px]">QRIS</button>
                </div>
            </div>

            <div id="evidence-area" class="hidden p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                <input type="file" id="evidence-file" accept="image/*" class="hidden" onchange="document.getElementById('file-name').innerText='FILE SIAP'">
                <button onclick="document.getElementById('evidence-file').click()" class="bg-white px-4 py-2 rounded-lg border text-[10px] font-bold">Upload Bukti</button>
                <p id="file-name" class="text-[10px] text-emerald-500 mt-2 font-bold italic"></p>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2rem]">
                <label class="text-[10px] font-black text-slate-500 uppercase block mb-2">Bayar Tunai</label>
                <input type="number" id="cash-in" oninput="calculateChange()" class="w-full bg-transparent text-white text-4xl font-black outline-none border-b-2 border-slate-800 focus:border-rose-500 py-2">
                <div class="flex justify-between mt-6 text-emerald-400">
                    <span class="text-[10px] font-black uppercase">Kembali</span>
                    <span id="change-display" class="text-2xl font-black">Rp 0</span>
                </div>
            </div>

            <button onclick="handleTransaction()" id="btn-pay" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-black py-6 rounded-[2rem] text-xl shadow-xl transition-all active:scale-95 uppercase italic">Simpan & Cetak</button>
        </div>
    </aside>

    <div id="catalog-modal" class="hidden fixed inset-0 bg-white/95 z-[100] p-10 overflow-hidden">
        <div class="max-w-6xl mx-auto h-full flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black uppercase italic">Katalog Produk</h2>
                <button onclick="toggleCatalog()" class="p-2 bg-slate-100 rounded-full">✕</button>
            </div>
            <div id="catalog-grid" class="grid grid-cols-4 gap-4 overflow-y-auto pr-2 custom-scrollbar"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwDX934LugMyjWFT-CXrVYoEQDfajg_aBYBe1y5G2M8p6VM8ymX0Wc9Z9341KKxIpQgjQ/exec"; // <--- GANTI INI
        let products = [], cart = [], currentMethod = 'Cash';

        window.onload = () => { fetchData(); };

        async function fetchData() {
            const res = await fetch(`${API_URL}?action=getProducts`);
            products = await res.json();
            renderCatalog();
        }

        function handleManualInput(e) { if(e.key === 'Enter') { addToCart(e.target.value); e.target.value = ''; } }

        function addToCart(bc) {
            const p = products.find(x => x.Barcode.toString() === bc.toString());
            if(!p) return document.getElementById('error-sound').play();
            
            document.getElementById('beep-sound').play();
            const existing = cart.find(c => c.Barcode.toString() === bc.toString());
            if(existing) { existing.Qty += 1; } else { cart.push({...p, Qty: 1}); }
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map(item => {
                const sub = item.Harga_Jual * item.Qty; total += sub;
                return `<div class="flex justify-between py-6 border-b border-slate-50 items-center px-4 rounded-xl hover:bg-slate-50 transition-all">
                    <div class="flex-1"><b class="text-slate-800 text-lg uppercase">${item.Nama_Barang}</b><br><small class="text-slate-300 font-bold">${item.Barcode}</small></div>
                    <div class="w-20 text-center font-black text-slate-400 italic text-lg">x${item.Qty}</div>
                    <div class="w-40 text-right text-rose-600 font-black text-xl italic">Rp ${sub.toLocaleString()}</div>
                </div>`;
            }).join('');
            document.getElementById('total-display').innerText = `Rp ${total.toLocaleString()}`;
            calculateChange();
        }

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = products.map(p => `
                <button onclick="addToCart('${p.Barcode}')" class="bg-white border-2 border-slate-50 p-6 rounded-3xl text-left hover:border-rose-500 transition-all group">
                    <h4 class="font-bold text-slate-800 uppercase mb-2 group-hover:text-rose-600">${p.Nama_Barang}</h4>
                    <p class="font-black text-rose-600 italic">Rp ${p.Harga_Jual.toLocaleString()}</p>
                </button>
            `).join('');
        }

        function calculateChange() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value || 0;
            document.getElementById('change-display').innerText = `Rp ${Math.max(0, cash - total).toLocaleString()}`;
        }

        function setMethod(m) {
            currentMethod = m;
            ['m-cash', 'm-transfer', 'm-qris'].forEach(id => document.getElementById(id).className = "py-4 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-[10px]");
            document.getElementById('m-'+m.toLowerCase()).className = "py-4 rounded-xl border-2 border-rose-500 bg-rose-50 text-rose-600 font-bold text-[10px]";
            document.getElementById('evidence-area').classList.toggle('hidden', m === 'Cash');
            if(m !== 'Cash') document.getElementById('cash-in').value = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            calculateChange();
        }

        function toggleCatalog() { document.getElementById('catalog-modal').classList.toggle('hidden'); }

        async function handleTransaction() {
            if (cart.length === 0) return alert("Keranjang kosong");
            const btn = document.getElementById('btn-pay');
            btn.disabled = true; btn.innerText = "MENYIMPAN...";
            
            const payload = {
                action: "saveTransaction", admin: "Admin", method: currentMethod,
                cart: cart, imageContent: null
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === "success") {
                    printReceipt(result.invoice);
                    cart = []; updateUI();
                    document.getElementById('cash-in').value = '';
                    alert("Selesai");
                }
            } catch (e) { alert("Gagal Simpan"); }
            finally { btn.disabled = false; btn.innerText = "Simpan & Cetak"; }
        }

        function printReceipt(inv) {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const win = window.open('', '_blank', 'width=300,height=400');
            const content = `STRUK PEMBAYARAN\nInv: ${inv}\n${new Date().toLocaleString()}\n--------------------------\n${cart.map(i => `${i.Nama_Barang} x${i.Qty}\nRp ${(i.Qty*i.Harga_Jual).toLocaleString()}`).join('\n')}\n--------------------------\nTOTAL: Rp ${total.toLocaleString()}`;
            win.document.write('<pre>' + content + '</pre>');
            win.print(); win.close();
        }

        function logout() { window.location.replace("index.html"); }
    </script>
</body>
</html>
