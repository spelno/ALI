<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasir</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex h-screen">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIv5TIc1e4yWI12pM_VN6bHHlsFHnKUyCEgFCyRMN3RfhQYvC-TkvrF6mkoQaOpjWuAg/exec";
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user || user.role !== "kasir"){
  window.location.href = "index.html";
}
</script>

<!-- LEFT CART -->
<div class="w-1/2 bg-white p-5 flex flex-col">
  <div class="flex justify-between mb-3">
    <h2 class="text-xl font-bold">Keranjang</h2>
    <button onclick="logout()" class="bg-gray-400 text-white px-3 py-1 rounded">Logout</button>
  </div>

  <div id="cart" class="flex-1 overflow-auto"></div>

  <div class="mt-4 border-t pt-3">
    <h3 class="text-xl font-bold">Total: Rp <span id="total">0</span></h3>

    <button onclick="bayar()" class="mt-3 bg-green-500 text-white p-3 w-full rounded">
      Bayar
    </button>

    <button onclick="requestVoid()" class="mt-2 bg-red-500 text-white p-3 w-full rounded">
      Void (Approval)
    </button>
  </div>
</div>

<!-- RIGHT KATALOG -->
<div class="w-1/2 p-5 overflow-auto">
  <h2 class="text-xl font-bold mb-3">Katalog</h2>
  <div id="produk" class="grid grid-cols-2 gap-3"></div>
</div>

<script>
let cartData = [];

async function loadProduk(){
  let res = await fetch(API_URL+"?action=products");
  let data = await res.json();

  produk.innerHTML = data.map(p=>`
    <div onclick='add("${p.Barcode}","${p.Nama_Barang}",${p.Harga_Jual})'
      class="p-3 bg-white shadow rounded cursor-pointer hover:bg-blue-50">
      <b>${p.Nama_Barang}</b><br>
      Rp ${p.Harga_Jual}
    </div>
  `).join("");
}

function add(b,n,h){
  cartData.push({Barcode:b,Nama_Barang:n,Qty:1,Harga_Jual:h});
  renderCart();
}

function renderCart(){
  let total = 0;

  cart.innerHTML = cartData.map(c=>{
    total += c.Qty*c.Harga_Jual;
    return `
      <div class="flex justify-between border-b py-1">
        <span>${c.Nama_Barang}</span>
        <span>${c.Qty}</span>
      </div>
    `;
  }).join("");

  document.getElementById("total").innerText = total;
}

async function bayar(){
  await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"saveTransaction",
      cart:cartData,
      cashierName:user.nama,
      role:user.role,
      method:"Cash"
    })
  });

  alert("Transaksi berhasil");
  cartData=[];
  renderCart();
}

async function requestVoid(){
  await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"requestApproval",
      actionType:"VOID",
      requestBy:user.nama,
      method:"remote",
      refId:"manual"
    })
  });

  alert("Menunggu approval");
}

function logout(){
  sessionStorage.clear();
  location="index.html";
}

loadProduk();
</script>

</body>
</html>
