<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; overflow: hidden; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; padding: 14px; border-radius: 12px; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .nav-active { background: #e11d48 !important; color: white !important; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-24 bg-white border-r flex flex-col items-center py-8 gap-6 z-50">
        <div class="w-12 h-12 bg-rose-500 rounded-2xl flex items-center justify-center text-white font-black italic">A</div>
        <div class="nav-btn nav-active"><small class="text-[8px] font-black uppercase mt-1">Kasir</small></div>
        <div onclick="window.location.href='https://script.google.com/macros/s/AKfycbxrgdByXykW5NWaOLm6FgOMMKydJQE6G9v6By_aotRst3FV7TGEjnR7fv-8RDhtUYVnwQ/exec'" class="mt-auto nav-btn text-rose-500"><small class="text-[8px] font-black uppercase italic mt-1">Keluar</small></div>
    </aside>

    <main class="flex-1 flex flex-col p-8 overflow-hidden">
        <header class="flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Kasir Aktif</p>
                <h2 class="text-2xl font-black text-slate-800 uppercase italic leading-none">Halo, <span id="nama-display" class="text-rose-500">User</span></h2>
            </div>
            <h1 id="total-display" class="text-5xl font-black text-rose-600 tracking-tighter italic">Rp 0</h1>
        </header>
        </main>
    <script>
        window.onload = () => {
            const nama = sessionStorage.getItem('ali_user_name');
            if(nama) document.getElementById('nama-display').innerText = nama;
        };
    </script>
</body>
</html>
