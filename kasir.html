<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI - POS Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .ali-red { background: #e11d48; }
        .ali-red-text { color: #e11d48; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @media print { body > *:not(#print-receipt) { display: none !important; } #print-receipt { display: block !important; width: 58mm; font-family: monospace; font-size: 10px; } }
        #print-receipt { display: none; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <audio id="beep-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
    <audio id="error-sound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3" preload="auto"></audio>

    <aside class="w-20 bg-white border-r flex flex-col items-center py-8 gap-6 shadow-sm">
        <div class="text-xl font-black ali-red-text italic mb-4">ALI</div>
        
        <button onclick="toggleCatalog()" class="p-4 rounded-2xl bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        
        <button onclick="showScannerQR()" class="p-4 rounded-2xl bg-amber-50 text-amber-600 hover:bg-amber-500 hover:text-white transition-all" title="Hubungkan HP sebagai Scanner">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v1m0 11v1m4-8h1m-11 0h1m3-2a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        </button>

        <button onclick="window.location.href='admin.html'" class="p-4 rounded-2xl bg-slate-50 text-slate-500 hover:bg-rose-500 hover:text-white transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        </button>
        
        <button onclick="logout()" class="mt-auto p-4 text-slate-300 hover:text-rose-600 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-8 overflow-hidden">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-4xl font-black text-slate-800 italic uppercase tracking-tighter">KERANJANG</h2>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest"><span id="u-name">-</span> | KASIR</p>
            </div>
            <button onclick="clearCart()" class="text-[10px] font-black text-slate-400 hover:text-rose-600 uppercase tracking-widest border-b border-transparent hover:border-rose-600 transition-all">Kosongkan List</button>
        </header>

        <div class="flex-1 bg-white rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            <div id="cart-list" class="flex-1 overflow-y-auto p-10 custom-scrollbar">
                </div>
            <div class="p-6 bg-slate-50 border-t">
                <input type="text" id="barcode-scan" autofocus placeholder="INPUT BARCODE / SCAN..." class="w-full bg-white border-2 border-slate-200 rounded-2xl py-5 px-10 text-2xl font-black ali-red-text focus:border-rose-500 outline-none shadow-inner transition-all">
            </div>
        </div>
    </main>

    <aside class="w-96 bg-white border-l p-10 flex flex-col shadow-lg overflow-y-auto custom-scrollbar">
        <div class="text-center mb-10">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Belanja</p>
            <h1 id="total-display" class="text-5xl font-black ali-red-text tracking-tighter">Rp 0</h1>
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Metode Bayar</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setMethod('Cash')" id="m-cash" class="py-4 rounded-2xl border-2 border-rose-500 bg-rose-50 text-rose-600 font-bold text-[10px] shadow-sm">CASH</button>
                    <button onclick="setMethod('Transfer')" id="m-transfer" class="py-4 rounded-2xl border-2 border-slate-100 text-slate-400 font-bold text-[10px]">TRANSFER</button>
                    <button onclick="setMethod('QRIS')" id="m-qris" class="py-4 rounded-2xl border-2 border-slate-100 text-slate-400 font-bold text-[10px]">QRIS</button>
                </div>
            </div>

            <div id="evidence-area" class="hidden p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 text-center transition-all">
                <input type="file" id="evidence-file" accept="image/*" capture="camera" class="hidden">
                <button onclick="document.getElementById('evidence-file').click()" class="bg-white px-4 py-3 rounded-xl border-2 border-slate-100 text-[10px] font-black text-slate-600 hover:border-rose-500 shadow-sm uppercase">Ambil Foto Bukti</button>
                <p id="file-name" class="text-[9px] text-emerald-500 mt-2 font-black italic"></p>
            </div>

            <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-100">
                <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Nominal Bayar</label>
                <input type="number" id="cash-in" oninput="calculateChange()" class="w-full bg-transparent text-4xl font-black outline-none border-b-2 border-slate-200 focus:border-rose-500 py-2">
                <div class="flex justify-between mt-6 text-emerald-600">
                    <span class="text-[10px] font-black uppercase tracking-widest">Kembali</span>
                    <span id="change-display" class="text-2xl font-black">Rp 0</span>
                </div>
            </div>

            <button onclick="handleTransaction()" id="btn-pay" class="w-full ali-red hover:bg-rose-700 text-white font-black py-7 rounded-[2rem] text-xl shadow-xl shadow-rose-200 transition-all active:scale-95 uppercase tracking-tighter italic">Selesai & Cetak</button>
        </div>
    </aside>

    <div id="scanner-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[2000] p-6 backdrop-blur-sm">
        <div class="bg-white p-10 rounded-[3rem] max-w-sm w-full text-center shadow-2xl border border-slate-100">
            <h3 class="font-black italic text-xl mb-2 uppercase tracking-tighter">Hubungkan HP</h3>
            <p class="text-[10px] text-slate-400 font-bold mb-8 uppercase tracking-widest">Arahkan kamera HP ke QR Code ini untuk scan barcode nirkabel</p>
            <div class="bg-slate-50 p-6 rounded-[2.5rem] mb-8 flex justify-center border shadow-inner">
                <img id="qr-image" src="" class="w-48 h-48 mix-blend-multiply">
            </div>
            <button onclick="toggleScannerModal()" class="w-full py-5 bg-slate-100 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-200 transition-all">Tutup</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby8rnCAKcuZUmIwKkrl0n0nhH5Dz2gYecbSbsTIzE2r_cpWC5gKCxRg1sYSpL-L3EgRQQ/exec"; 
        const SCANNER_URL = "https://script.google.com/macros/s/AKfycbyjkm8RMgwOgXz9Pa3YOUhEl4CV1u2vAMBbjXtucJK-LaMn1SzSfphMin_6pzxiaGwhAA/exec?mode=scanner"; // Masukkan URL file scanner.html Anda
        
        let products = [], cart = [], currentMethod = 'Cash';
        const session = JSON.parse(sessionStorage.getItem('ali_session_v4'));

        if(!session) window.location.replace("index.html");
        document.getElementById('u-name').innerText = session.nama;

        window.onload = () => { fetchData(); startRemoteScanListener(); };

        // 1. Remote Scan Listener (Dengar dari HP)
        function startRemoteScanListener() {
            setInterval(async () => {
                try {
                    const res = await fetch(`${API_URL}?action=checkScan`);
                    const data = await res.json();
                    if (data.barcode && data.barcode !== "-") {
                        addToCart(data.barcode);
                    }
                } catch(e) {}
            }, 1500);
        }

        // 2. Ambil Data Produk
        async function fetchData() {
            const res = await fetch(`${API_URL}?action=getProducts`);
            products = await res.json();
        }

        // 3. Masukkan ke Keranjang + Suara
        function addToCart(bc) {
            const p = products.find(x => x.Barcode == bc);
            const beep = document.getElementById('beep-sound');
            const error = document.getElementById('error-sound');

            if(!p) {
                error.currentTime = 0; error.play();
                alert("Barang tidak ditemukan!");
                return;
            }

            beep.currentTime = 0; beep.play(); // Efek suara Beep

            const ex = cart.find(c => c.Barcode == bc);
            if(ex) ex.Qty++; else cart.push({...p, Qty: 1});
            
            updateUI();
            document.getElementById('barcode-scan').value = '';
            document.getElementById('barcode-scan').focus();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                const sub = item.Harga_Jual * item.Qty; total += sub;
                return `
                    <div class="flex justify-between py-6 border-b border-slate-50 items-center hover:bg-slate-50 transition-all px-4 rounded-xl">
                        <div class="flex-1">
                            <b class="text-slate-800 text-lg tracking-tight">${item.Nama_Barang}</b><br>
                            <small class="text-[10px] font-black text-slate-300 uppercase tracking-widest">${item.Barcode}</small>
                        </div>
                        <div class="w-24 text-center font-black text-slate-400 tracking-widest">x${item.Qty}</div>
                        <div class="w-40 text-right ali-red-text font-black text-xl tracking-tighter">Rp ${sub.toLocaleString()}</div>
                    </div>`;
            }).join('');
            document.getElementById('total-display').innerText = `Rp ${total.toLocaleString()}`;
            calculateChange();
        }

        function calculateChange() {
            const total = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            const cash = document.getElementById('cash-in').value || 0;
            const change = Math.max(0, cash - total);
            document.getElementById('change-display').innerText = `Rp ${change.toLocaleString()}`;
        }

        function setMethod(m) {
            currentMethod = m;
            ['m-cash', 'm-transfer', 'm-qris'].forEach(id => {
                document.getElementById(id).className = "py-4 rounded-2xl border-2 border-slate-100 text-slate-400 font-bold text-[10px]";
            });
            document.getElementById('m-'+m.toLowerCase()).className = "py-4 rounded-2xl border-2 border-rose-500 bg-rose-50 text-rose-600 font-bold text-[10px] shadow-sm";
            
            const area = document.getElementById('evidence-area');
            if(m !== 'Cash') {
                area.classList.remove('hidden');
                document.getElementById('cash-in').value = cart.reduce((s, i) => s + (i.Harga_Jual * i.Qty), 0);
            } else {
                area.classList.add('hidden');
                document.getElementById('cash-in').value = '';
            }
            calculateChange();
        }

        function showScannerQR() {
            document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(SCANNER_URL)}`;
            toggleScannerModal();
        }

        function toggleScannerModal() { document.getElementById('scanner-modal').classList.toggle('hidden'); }

        document.getElementById('evidence-file').onchange = (e) => {
            if(e.target.files.length > 0) document.getElementById('file-name').innerText = "✓ FOTO TERSIMPAN";
        };

        async function handleTransaction() {
            // Logika simpan transaksi seperti sebelumnya...
            // (Tambahkan fetch POST ke API_URL dengan action saveTransaction)
        }

        document.getElementById('barcode-scan').onkeypress = (e) => { if(e.key === 'Enter') addToCart(e.target.value); };
        function clearCart() { if(confirm("Bersihkan keranjang?")) { cart = []; updateUI(); } }
        function logout() { sessionStorage.clear(); window.location.replace("index.html"); }
        function toggleCatalog() { /* Fungsi Katalog... */ }
    </script>
</body>
</html>
