<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }
        .ali-red { background-color: #e11d48; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl">
        <div class="w-16 h-16 ali-red rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-rose-500/30">
            <span class="text-3xl font-black text-white italic">A</span>
        </div>
        
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black tracking-tight uppercase">Sistem Terintegrasi ALI</h1>
            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest mt-2">Pilih Akses Anda</p>
        </div>

        <div id="login-form" class="space-y-4">
            <input type="text" id="user-in" placeholder="Username" 
                class="w-full bg-slate-100 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-rose-500 font-bold">
            
            <input type="password" id="pass-in" placeholder="Password" 
                class="w-full bg-slate-100 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-rose-500 font-bold">
            
            <button onclick="handleLogin()" id="btn-login" 
                class="w-full ali-red text-white font-black py-5 rounded-2xl shadow-xl shadow-rose-600/20 active:scale-95 transition-all mt-4">
                MASUK KE DASHBOARD
            </button>
        </div>

        <p class="text-center text-[10px] text-slate-300 font-bold mt-10 tracking-widest uppercase">
            &copy; 2026 ALI Retail & Tech
        </p>
    </div>

    <script>
        const API_URL = "URL_DEPLOY_API_ANDA"; // GANTI DENGAN URL GAS ANDA

        async function handleLogin() {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pass-in').value;
            const btn = document.getElementById('btn-login');

            if(!u || !p) return alert("Harap isi username dan password!");

            btn.innerText = "VERIFIKASI...";
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'login', username: u, password: p }) 
                });
                const data = await res.json();

                if (data.status === 'success') {
                    const role = data.user.role.toLowerCase();
                    
                    // Simpan data user ke Session Storage (untuk sementara)
                    sessionStorage.setItem('ali_user', JSON.stringify(data.user));

                    // LOGIKA PENGARAHAN (REDIRECT)
                    if (role === 'owner') {
                        window.location.href = "owner.html";
                    } else if (role === 'admin') {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "kasir.html";
                    }
                } else {
                    alert("Akses Ditolak! Cek kembali akun Anda.");
                }
            } catch (e) {
                alert("Gagal terhubung ke server!");
            } finally {
                btn.innerText = "MASUK KE DASHBOARD";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
