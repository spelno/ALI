<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALI POS Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-white flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-80">
  <h2 class="text-2xl font-bold mb-6 text-center">ALI POS</h2>

  <input id="user" class="w-full mb-3 p-3 border rounded-lg" placeholder="Username">
  <input id="pass" type="password" class="w-full mb-4 p-3 border rounded-lg" placeholder="Password">

  <button onclick="login()" class="w-full bg-blue-500 text-white p-3 rounded-lg">
    Masuk
  </button>

  <p id="status" class="text-sm mt-3 text-center text-red-500"></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxTzI2e5nv9P8q9FVcvj2q4AoxSKBzqVLz32AaEL4pWaBLd_qr1Ol3RWD_8VYrsuOsfVA/exec";

async function login(){
  const statusEl = document.getElementById("status");
  statusEl.innerText = "Loading...";

  try{
    let res = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        action:"login",
        username: document.getElementById("user").value.trim(),
        password: document.getElementById("pass").value.trim()
      })
    });

    console.log("Response:", res);

    let text = await res.text();
    console.log("Raw:", text);

    let data = JSON.parse(text);

    if(data.status==="success"){
      sessionStorage.setItem("user", JSON.stringify(data.user));

      if(data.user.role==="kasir") location="kasir.html";
      if(data.user.role==="admin") location="admin.html";
      if(data.user.role==="owner") location="owner.html";

    }else{
      statusEl.innerText = data.message || "Login gagal";
    }

  }catch(err){
    statusEl.innerText = "Tidak bisa konek ke server";
    console.error("ERROR:", err);
  }
}
</script>

</body>
</html>
