<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ALI Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-sm p-10 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-rose-500 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-3xl font-black italic shadow-lg shadow-rose-500/30">A</div>
            <h1 class="text-xl font-extrabold tracking-tighter uppercase">Integrated System</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Silakan Login ke Akun Anda</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="user" placeholder="Username" class="w-full bg-slate-100 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-rose-500 font-bold">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-100 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-rose-500 font-bold">
            <button onclick="doLogin()" id="btnLogin" class="w-full bg-rose-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-rose-600/20 active:scale-95 transition-all">MASUK DASHBOARD</button>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP ANDA DISINI (URL yang didapat setelah Deploy)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzrV9DNZGgrLFQl9U-wjGjqVyatSYlbVQXY3Bj9koXuNHWtDgEsxrns4bQ9h0RRXE420w/exec"; 

        async function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('btnLogin');

            if(!u || !p) return alert("Isi data!");
            
            btn.innerText = "VERIFIKASI...";
            btn.disabled = true;

            try {
                // Panggil fungsi doPost di Code.gs
                google.script.run.withSuccessHandler(function(res) {
                    const data = JSON.parse(res);
                    if(data.status === "success") {
                        const role = data.user.role.toLowerCase().trim();
                        sessionStorage.setItem('ali_user', JSON.stringify(data.user));
                        
                        // REDIRECT BERDASARKAN ROLE
                        // Sistem akan memanggil kembali doGet dengan parameter ?page=
                        window.top.location.href = WEB_APP_URL + "?page=" + role;
                    } else {
                        alert("Gagal! Cek Username/Password.");
                        btn.innerText = "MASUK DASHBOARD";
                        btn.disabled = false;
                    }
                }).doPostJSON(JSON.stringify({ action: "login", username: u, password: p }));
            } catch(e) {
                alert("Error koneksi!");
                btn.innerText = "MASUK DASHBOARD";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
