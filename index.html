<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALI POS Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-white flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-80">
  <h2 class="text-2xl font-bold mb-6 text-center">ALI POS</h2>

  <input id="user" class="w-full mb-3 p-3 border rounded-lg" placeholder="Username">
  <input id="pass" type="password" class="w-full mb-4 p-3 border rounded-lg" placeholder="Password">

  <button onclick="login()" class="w-full bg-blue-500 text-white p-3 rounded-lg">
    Masuk
  </button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIv5TIc1e4yWI12pM_VN6bHHlsFHnKUyCEgFCyRMN3RfhQYvC-TkvrF6mkoQaOpjWuAg/exec";

async function login(){
  let res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"login",
      username: user.value,
      password: pass.value
    })
  });

  let data = await res.json();

  if(data.status==="success"){
    sessionStorage.setItem("user", JSON.stringify(data.user));

    if(data.user.role==="kasir") location="kasir.html";
    if(data.user.role==="admin") location="admin.html";
    if(data.user.role==="owner") location="owner.html";

  }else{
    alert("Login gagal");
  }
}
</script>

</body>
</html>
