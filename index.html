<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 text-slate-800">
    <div class="bg-white w-full max-w-sm p-10 rounded-[3rem] shadow-2xl">
        <div class="text-center mb-10">
            <div class="w-20 h-20 ali-gradient rounded-[2.5rem] mx-auto mb-6 flex items-center justify-center text-white text-4xl font-black italic shadow-2xl shadow-rose-500/40">A</div>
            <h1 class="text-2xl font-black tracking-tighter uppercase">ALI <span class="text-rose-500">POS</span></h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Notes of OD System</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Username" class="w-full p-5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-rose-500 font-bold transition-all">
            <input type="password" id="pass" placeholder="Password" class="w-full p-5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-rose-500 font-bold transition-all">
            <button id="btn-login" onclick="prosesLogin()" class="w-full ali-gradient text-white font-black py-5 rounded-3xl shadow-xl shadow-rose-500/20 uppercase italic tracking-widest transition-all active:scale-95">Masuk Dashboard</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz-JIFWGlLyvXGr928CzfCsyWOTIkdzp8T4qGWaLDSUQRJ-kOzek9jn4vqT3NVTcvg7ug/exec"; // GANTI DENGAN LINK .exec ANDA

        async function prosesLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const b = document.getElementById('btn-login');

            if(!u || !p) return alert("Silakan isi Username dan Password!");

            b.innerText = "VERIFIKASI...";
            b.disabled = true;

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", username: u, password: p }) });
                const r = await res.json();

                if (r.status === "success") {
                    sessionStorage.setItem('ali_user_name', r.user.nama);
                    window.location.href = API_URL + "?action=" + r.user.role;
                } else {
                    alert(r.message);
                    b.innerText = "Masuk Dashboard";
                    b.disabled = false;
                }
            } catch (err) {
                alert("Koneksi Error!");
                b.innerText = "Masuk Dashboard";
                b.disabled = false;
            }
        }
        document.onkeydown = (e) => { if(e.key === "Enter") prosesLogin(); };
    </script>
</body>
</html>
