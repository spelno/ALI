<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ALI Admin - Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #f8fafc; font-family: sans-serif; }</style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic text-slate-800 underline decoration-rose-500">ADMIN <span class="text-rose-500">STOCK</span></h1>
            <button onclick="location.href='index.html'" class="text-xs font-bold text-slate-400">LOGOUT</button>
        </header>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-bold text-slate-400 uppercase">
                        <th class="p-6">Produk</th><th>Kategori</th><th>Stok</th><th class="text-right p-6">Status</th>
                    </tr>
                </thead>
                <tbody id="body" class="divide-y divide-slate-50 font-bold text-slate-700">
                    </tbody>
            </table>
        </div>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyUfnbfn_A0D7Gnop7CBjGzmBwuPbt-5KurG1YoWbazcgWKExqLQB4z-agQPZrtUctFtw/exec"; // <--- GANTI INI
        async function load() {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getAdminData" })});
            const r = await res.json();
            if(r.status === "success") {
                document.getElementById('body').innerHTML = r.products.map(p => `
                    <tr>
                        <td class="p-6">${p[1]}<br><span class="text-[9px] text-slate-300 uppercase">${p[0]}</span></td>
                        <td><span class="bg-slate-100 px-2 py-1 rounded text-[9px]">${p[2]}</span></td>
                        <td>${p[6]} ${p[7]}</td>
                        <td class="text-right p-6 italic text-emerald-500">Aman</td>
                    </tr>
                `).join('');
            }
        }
        window.onload = load;
    </script>
</body>
</html>
