<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #1e293b; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        input:focus { border-color: #e11d48 !important; box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div class="glass-card w-full max-w-sm p-10 rounded-[3rem] shadow-2xl border border-white/20">
        <div class="text-center mb-10">
            <div class="w-20 h-20 ali-gradient rounded-[2.5rem] mx-auto mb-6 flex items-center justify-center text-white text-4xl font-black italic shadow-2xl shadow-rose-500/40">A</div>
            <h1 class="text-2xl font-black tracking-tighter uppercase italic">ALI <span class="text-rose-500">POS</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Secure Login System</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block">Username</label>
                <input type="text" id="username" placeholder="User ID" 
                    class="w-full bg-slate-50 rounded-2xl p-4 border border-slate-100 font-bold outline-none transition-all">
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block">Password</label>
                <input type="password" id="password" placeholder="••••••••" 
                    class="w-full bg-slate-50 rounded-2xl p-4 border border-slate-100 font-bold outline-none transition-all">
            </div>

            <button onclick="prosesLogin()" id="btn-login" 
                class="w-full ali-gradient text-white font-black py-5 rounded-2xl shadow-xl shadow-rose-600/30 active:scale-95 transition-all mt-6 uppercase italic tracking-widest text-sm">
                Masuk Dashboard
            </button>
        </div>

        <p class="text-center mt-10 text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
            &copy; 2026 Developed for ALI Business Group
        </p>
    </div>

    <script>
        /** * KUNCI UTAMA: API URL tidak diisi manual.
         * Kode di bawah ini mengambil URL dari Code.gs secara otomatis.
         */
        const SCRIPT_URL = "<?= scriptUrl ?>";

        // Cek Session saat reload
        window.onload = () => {
            const session = JSON.parse(localStorage.getItem('ali_user_session'));
            if (session && session.role) {
                // Jika session ada, langsung arahkan ke dashboard
                window.location.href = SCRIPT_URL + "?action=" + session.role;
            }
        };

        async function prosesLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');

            if (!user || !pass) {
                alert("Lengkapi data login!");
                return;
            }

            btn.innerText = "VERIFIKASI...";
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "login",
                        username: user,
                        password: pass
                    })
                });

                const result = await response.json();

                if (result.status === "success") {
                    // Simpan data user ke localStorage (Session tetap ada meski reload)
                    localStorage.setItem('ali_user_session', JSON.stringify(result.user));
                    
                    // Arahkan sesuai role
                    window.location.href = SCRIPT_URL + "?action=" + result.user.role;
                } else {
                    alert(result.message);
                    btn.innerText = "Masuk Dashboard";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Gagal terhubung ke server!");
                btn.innerText = "Masuk Dashboard";
                btn.disabled = false;
            }
        }

        document.onkeydown = (e) => { if(e.key === "Enter") prosesLogin(); };
    </script>
</body>
</html>
