<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }</style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm p-10 rounded-[3rem] shadow-2xl">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-rose-500 rounded-[2.5rem] mx-auto mb-6 flex items-center justify-center text-white text-4xl font-black italic shadow-xl shadow-rose-500/30">A</div>
            <h1 class="text-2xl font-black tracking-tighter uppercase text-slate-800">ALI <span class="text-rose-500">SYSTEM</span></h1>
        </div>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Username" class="w-full bg-slate-50 rounded-2xl p-4 outline-none border border-slate-100 font-bold transition-all">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-50 rounded-2xl p-4 outline-none border border-slate-100 font-bold transition-all">
            <button onclick="prosesLogin()" id="btn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all mt-6 uppercase tracking-widest text-xs">Masuk Dashboard</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzngfS166yOXl0-zRa7lHC2pijAvpfgPWQ5UAKl3D4J8B9DjCh4OoYclmGGw6mn-0NJYg/exec"; 

        async function prosesLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const b = document.getElementById('btn');
            if(!u || !p) return alert("Username & Password wajib diisi!");
            
            b.innerText = "MENGECEK...";
            b.disabled = true;

            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "login", username: u, password: p })});
                const r = await res.json();
                
                if (r.status === "success") {
                    // PENTING: Gunakan nama variabel yang unik agar tidak bentrok
                    sessionStorage.setItem('ali_session_v4', JSON.stringify(r.user));
                    
                    const role = r.user.role.toLowerCase().trim();
                    if (role === "owner") { window.location.href = "owner.html"; }
                    else if (role === "admin") { window.location.href = "admin.html"; }
                    else if (role === "kasir") { window.location.href = "kasir.html"; }
                } else {
                    alert("Gagal: " + r.message);
                    b.innerText = "Masuk Dashboard"; b.disabled = false;
                }
            } catch (err) { alert("Koneksi bermasalah!"); b.innerText = "Masuk Dashboard"; b.disabled = false; }
        }
    </script>
</body>
</html>
