<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI POS - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }
        .ali-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 text-slate-800">

    <div class="bg-white w-full max-w-sm p-10 rounded-[3rem] shadow-2xl">
        <div class="text-center mb-10">
            <div class="w-20 h-20 ali-gradient rounded-[2.5rem] mx-auto mb-6 flex items-center justify-center text-white text-4xl font-black italic shadow-2xl shadow-rose-500/40">A</div>
            <h1 class="text-2xl font-black tracking-tighter uppercase">ALI <span class="text-rose-500">POS</span></h1>
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mt-2">Authentication Portal</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="user" placeholder="Username" class="w-full bg-slate-50 rounded-2xl p-4 outline-none border border-slate-100 font-bold transition-all focus:ring-2 focus:ring-rose-500/20">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-50 rounded-2xl p-4 outline-none border border-slate-100 font-bold transition-all focus:ring-2 focus:ring-rose-500/20">
            
            <button onclick="prosesLogin()" id="btn" class="w-full ali-gradient text-white font-black py-5 rounded-2xl shadow-xl shadow-rose-600/30 active:scale-95 transition-all mt-6 uppercase tracking-widest text-sm">
                Masuk Dashboard
            </button>
        </div>
    </div>

    <script>
        // PENTING: GANTI DENGAN URL /exec TERBARU ANDA DARI APPS SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbzngfS166yOXl0-zRa7lHC2pijAvpfgPWQ5UAKl3D4J8B9DjCh4OoYclmGGw6mn-0NJYg/exec";

        async function prosesLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const b = document.getElementById('btn');

            if(!u || !p) {
                alert("Harap isi username dan password!");
                return;
            }

            b.innerText = "VERIFIKASI...";
            b.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", username: u, password: p })
                });
                
                const resJson = await res.json();

                if (resJson.status === "success") {
                    // Simpan session agar dikenali oleh Satpam di halaman tujuan
                    sessionStorage.setItem('ali_session_v4', JSON.stringify(resJson.user));
                    
                    // LOGIKA PEMISAHAN DASHBOARD BERDASARKAN ROLE
                    const role = resJson.user.role.toLowerCase().trim();
                    
                    if (role === "owner") {
                        window.location.href = "owner.html";
                    } else if (role === "admin") {
                        window.location.href = "admin.html";
                    } else if (role === "kasir") {
                        window.location.href = "kasir.html";
                    } else {
                        alert("Role '" + role + "' tidak memiliki akses halaman!");
                        b.innerText = "Masuk Dashboard";
                        b.disabled = false;
                    }
                } else {
                    alert("Login Gagal: " + resJson.message);
                    b.innerText = "Masuk Dashboard";
                    b.disabled = false;
                }
            } catch (err) {
                alert("Gagal terhubung ke server. Cek koneksi internet!");
                b.innerText = "Masuk Dashboard";
                b.disabled = false;
            }
        }

        // Memungkinkan login dengan menekan tombol Enter di keyboard
        document.onkeydown = (e) => { if(e.key === "Enter") prosesLogin(); };
    </script>
</body>
</html>
